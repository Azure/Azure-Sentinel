name: Sync upstream

on:
  schedule:
    - cron: '0 6 * * 1'  # Mondays 6am UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: master
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch upstream
        run: |
          git remote add upstream https://github.com/Azure/Azure-Sentinel.git
          git fetch upstream master

      - name: Merge upstream into master
        run: |
          git merge upstream/master --no-edit
          git push origin master

      - name: Rebase master-internal onto master
        run: |
          git fetch origin master-internal
          git checkout master-internal
          git rebase origin/master
          git push origin master-internal --force-with-lease
