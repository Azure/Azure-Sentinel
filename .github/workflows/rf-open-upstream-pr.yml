name: Open upstream PR

on:
  issue_comment:
    types: [created]

jobs:
  open-upstream-pr:
    if: |
      github.event.issue.pull_request != null &&
      github.event.comment.body == '/upstream-pr'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write

    steps:
      - name: Get PR branch name
        id: pr-info
        uses: actions/github-script@v7
        with:
          result-encoding: string
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.head.ref);

      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: master-rf
          fetch-depth: 1
          filter: blob:none
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Fetch master and PR branch
        run: |
          git fetch origin master --depth=1 --filter=blob:none
          git fetch origin ${{ steps.pr-info.outputs.branch }} --depth=50 --filter=blob:none

      - name: Derive upstream branch name
        id: derive
        run: |
          CURRENT="${{ steps.pr-info.outputs.branch }}"
          STRIPPED="${CURRENT#rf/}"
          UPSTREAM="feat/${STRIPPED}"
          echo "upstream_branch=$UPSTREAM" >> "$GITHUB_OUTPUT"

      - name: Delete upstream branch if it already exists
        uses: actions/github-script@v7
        with:
          script: |
            const branch = '${{ steps.derive.outputs.upstream_branch }}';
            try {
              await github.rest.git.deleteRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `heads/${branch}`,
              });
              core.info(`Deleted existing branch ${branch}.`);
            } catch (e) {
              if (e.status === 422 || e.status === 404) {
                // Branch didn't exist — nothing to do
              } else {
                throw e;
              }
            }

      - name: Cherry-pick commits onto upstream branch
        id: cherry-pick
        run: |
          chmod +x rf-scripts/lib/cherry-pick-to-upstream.sh
          set +e
          COMMIT_LIST=$(./rf-scripts/lib/cherry-pick-to-upstream.sh \
            "${{ steps.pr-info.outputs.branch }}" \
            "${{ steps.derive.outputs.upstream_branch }}")
          EXIT_CODE=$?
          set -e
          echo "$COMMIT_LIST"
          # Make commit list available to later steps (escape for multiline)
          EOF=$(dd if=/dev/urandom bs=15 count=1 status=none | base64)
          echo "commit_list<<$EOF" >> "$GITHUB_OUTPUT"
          echo "$COMMIT_LIST" >> "$GITHUB_OUTPUT"
          echo "$EOF" >> "$GITHUB_OUTPUT"
          exit $EXIT_CODE

      - name: Comment on failure
        if: failure() && steps.cherry-pick.conclusion == 'failure'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: [
                '`/upstream-pr` failed — cherry-pick conflict.',
                '',
                'Please run the script locally to resolve:',
                '```',
                './rf-scripts/upstream-pr.sh',
                '```',
              ].join('\n'),
            });

      - name: Push upstream branch
        id: push
        run: |
          TMP_FILE=$(mktemp)
          git push -u origin "${{ steps.derive.outputs.upstream_branch }}" 2>&1 | tee "$TMP_FILE"
          OUTPUT=$(cat "$TMP_FILE")
          rm -f "$TMP_FILE"
          PR_URL=$(echo "$OUTPUT" | grep -oE "https://github.com/.+/.+/pull/new/[^[:space:]]+" || true)
          echo "pr_url=$PR_URL" >> "$GITHUB_OUTPUT"

      - name: Comment success and close PR
        uses: actions/github-script@v7
        with:
          script: |
            const upstreamBranch = '${{ steps.derive.outputs.upstream_branch }}';
            const prUrl = '${{ steps.push.outputs.pr_url }}';
            const commitList = `${{ steps.cherry-pick.outputs.commit_list }}`;

            const prLink = prUrl
              ? `[Open PR towards Microsoft](${prUrl})`
              : `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${upstreamBranch}`;

            const body = [
              '`/upstream-pr` succeeded. :rocket:',
              '',
              `**Upstream branch:** [${upstreamBranch}](https://github.com/${context.repo.owner}/${context.repo.repo}/tree/${upstreamBranch})`,
              `**Next steps:** ${prLink}`,
              '',
              '**Cherry-picked commits:**',
              commitList.split('\n').map(l => `- ${l}`).join('\n'),
            ].join('\n');

            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body,
            });
