name: Validation Run Summary

on:
  workflow_call:
    inputs:
      errorMessage:
        description: "Raw error text from the calling workflow"
        required: true
        type: string
      workflowName:
        description: "Optional name of the workflow where the error occurred"
        required: false
        default: ""
        type: string
      maxChars:
        description: "Maximum number of characters from the error message to summarize"
        required: false
        default: 12000
        type: number
      prNumber:
        description: "Optional PR number to post summary comment to (if omitted, uses context.issue.number)"
        required: false
        type: string

    outputs:
      summary:
        description: "Error Summary generated by GitHub Copilot CLI"
        value: ${{ jobs.summarize.outputs.summary }}

jobs:
  summarize:
    name: Summarize Workflow Error
    runs-on: ubuntu-latest
    permissions:
      contents: read
    outputs:
      summary: ${{ steps.generate.outputs.summary }}
    steps:
      - name: Set up Node.js
        uses: actions/setup-node@v4

      - name: Install Copilot CLI
        shell: bash
        run: npm install -g @github/copilot

      - name: Summarize error with GitHub Copilot CLI
        id: generate
        shell: bash
        env:
          COPILOT_GITHUB_TOKEN: '${{ secrets.GITHUB_TOKEN }}'
          ERROR_MESSAGE: ${{ inputs.errorMessage }}
          WORKFLOW_NAME: ${{ inputs.workflowName }}
          MAX_CHARS: ${{ inputs.maxChars }}
        run: |
          set -euo pipefail

          if [ -z "${ERROR_MESSAGE}" ]; then
            {
              echo "summary<<EOF"
              echo "No error message was provided by the calling workflow."
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          fi

          truncated_error="$(printf "%s" "$ERROR_MESSAGE" | head -c "$MAX_CHARS")"
          prompt="Summarize this GitHub Actions failure for engineers.\n\
          Return exactly 3 bullet points with these labels:\n\
          - Evidence from error\n\
          - Actionable next step\n\
          - Link to exact error location\n\
          Keep it concise and specific.\n\
          Workflow: ${WORKFLOW_NAME:-unknown}\n\
          Error:\n${truncated_error}"

          summary=""
          if ! summary="$(copilot -p "$prompt" --no-ask-user 2>/tmp/copilot_cli_error.log)"; then
            first_error_line="$(printf "%s" "$truncated_error" | sed '/^[[:space:]]*$/d' | head -n 1)"
            summary="- Root cause hypothesis: Copilot CLI could not generate a summary in this run.\n- Evidence from error: ${first_error_line:-No non-empty error line found.}\n- Actionable next step: Inspect the full logs in the failed job and retry this summarizer after confirming PAT and Copilot entitlements.\n- Prevention check: Ensure the caller passes a focused error snippet and provides a PAT with Copilot Requests permission as copilotToken."
          fi

          if [ -z "$(printf "%s" "$summary" | tr -d '[:space:]')" ]; then
            first_error_line="$(printf "%s" "$truncated_error" | sed '/^[[:space:]]*$/d' | head -n 1)"
            summary="- Root cause hypothesis: Copilot CLI returned an empty response.\n- Evidence from error: ${first_error_line:-No non-empty error line found.}\n- Actionable next step: Review the full failing job logs and rerun summarization with a clearer error excerpt.\n- Prevention check: Capture stderr/stdout in a dedicated step and pass it directly to this reusable workflow."
          fi

          {
            echo "summary<<EOF"
            printf "%b\n" "$summary"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Post summary as PR comment
        uses: actions/github-script@b7fb2001b410c9390cbe9e2c7d5cab7eefb7b29c
        if: always()
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const prNumber = "${{ inputs.prNumber }}" || context.issue.number;
            const summary = `## Validation Error Summary

            ${{ steps.generate.outputs.summary }}`;

            if (!prNumber) {
              console.log('No PR number available, skipping comment post.');
              console.log('Summary:\n' + summary);
              return;
            }

            try {
              github.rest.issues.createComment({
                issue_number: parseInt(prNumber),
                owner: context.repo.owner,
                repo: context.repo.repo,
                body: summary
              });
              console.log(`Posted summary to PR #${prNumber}`);
            } catch (error) {
              console.log(`Could not post to PR #${prNumber}: ${error.message}`);
              console.log('Summary:\n' + summary);
            }
