id: dc9c0f2a-68f4-4415-aa7e-81d87149c222
name: New service principal granted admin consent within one hour of creation
description: |
  Identifies service principals that received an app role assignment or admin consent
  within one hour of being registered in the tenant. Registering an application and
  immediately granting it admin consent is a technique used to establish persistent
  OAuth access after compromising a privileged account.
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AuditLogs
tactics:
  - Persistence
  - PrivilegeEscalation
relevantTechniques:
  - T1528
  - T1098.003
query: |
  let timeframe = 1d;
  let correlationWindow = 1h;
  let NewSP =
      AuditLogs
      | where TimeGenerated >= ago(timeframe)
      | where OperationName =~ "Add service principal"
      | where Result =~ "success"
      | project
          SpCreatedTime    = TimeGenerated,
          SpId             = tostring(TargetResources[0].id),
          SpName           = tostring(TargetResources[0].displayName),
          CreatingActorUpn = tostring(InitiatedBy.user.userPrincipalName),
          CreatingActorApp = tostring(InitiatedBy.app.displayName);
  AuditLogs
  | where TimeGenerated >= ago(timeframe)
  | where OperationName in~ (
        "Add app role assignment to service principal",
        "Consent to application"
    )
  | where Result =~ "success"
  | extend ConsentTargetId  = tostring(TargetResources[0].id)
  | extend ConsentActorUpn  = tostring(InitiatedBy.user.userPrincipalName)
  | extend ConsentActorApp  = tostring(InitiatedBy.app.displayName)
  | extend ConsentActorIp   = iff(
        isnotempty(tostring(InitiatedBy.user.ipAddress)),
        tostring(InitiatedBy.user.ipAddress),
        tostring(InitiatedBy.app.ipAddress))
  | join kind=inner NewSP on $left.ConsentTargetId == $right.SpId
  | where TimeGenerated between (SpCreatedTime .. (SpCreatedTime + correlationWindow))
  | extend CreatingActor = iff(isnotempty(CreatingActorUpn), CreatingActorUpn, CreatingActorApp)
  | extend ConsentActor  = iff(isnotempty(ConsentActorUpn),  ConsentActorUpn,  ConsentActorApp)
  | extend AccountName      = iff(ConsentActor has "@",
        tostring(split(ConsentActor, "@")[0]), ConsentActor)
  | extend AccountUPNSuffix = iff(ConsentActor has "@",
        tostring(split(ConsentActor, "@")[1]), "")
  | project
      TimeGenerated,
      SpName,
      SpId,
      OperationName,
      CreatingActor,
      ConsentActor,
      AccountName,
      AccountUPNSuffix,
      ConsentActorIp,
      SpCreatedTime,
      CorrelationId
  | sort by TimeGenerated desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: ConsentActor
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountUPNSuffix
  - entityType: CloudApplication
    fieldMappings:
      - identifier: Name
        columnName: SpName
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: ConsentActorIp
version: 1.0.0
metadata:
    source:
        kind: Community
    author:
        name: descambiado
    support:
        tier: Community
    categories:
        domains: [ "Security - Threat Protection", "Identity" ]
