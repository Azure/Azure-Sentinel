id: d951d64d-0ecd-4675-8c79-6c870d5f72ac
name: API - Password Cracking
description: |
  '42Crunch API protection against password cracking'
severity: High
requiredDataConnectors:
  - connectorId: FortyTwoCrunchAPIProtection
    dataTypes:
      - FortyTwoCrunchAPIProtectionV2_CL
queryFrequency: 5m
queryPeriod: 5m
triggerOperator: gt
triggerThreshold: 0
eventGroupingSettings:
  aggregationKind: SingleAlert
status: Available
tactics:
  - CredentialAccess
relevantTechniques:
  - T1110
  - T1555
  - T1187
query: |
  let loginRec = FortyTwoCrunchAPIProtectionV2_CL
  | where TimeGenerated >= ago(5m) 
  | project-away NonBlockingMode, SourcePort, DestinationPort, Query, ApiId, RequestHeader, ResponseHeader, Errors, EventType, Uuid
  | where InstanceName == "Instance_2" and UriPath has "/api/login?user=" and Status == 403;
  let recCount = iff((toscalar(loginRec | count) > 10), 1, 0);
  loginRec | take recCount
customDetails:
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIp
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: Hostname
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: InstanceName
version: 1.0.0
kind: Scheduled