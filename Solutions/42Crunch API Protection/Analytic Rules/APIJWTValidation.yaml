id: bbd163f4-1f56-434f-9c23-b06713c119c2
name: API - JWT validation
description: |
  '42Crunch API protection against JWT validation'
severity: Low
requiredDataConnectors:
  - connectorId: FortyTwoCrunchAPIProtection
    dataTypes:
      - FortyTwoCrunchAPIProtectionV2_CL
queryFrequency: 5m
queryPeriod: 5m
triggerOperator: gt
triggerThreshold: 0
eventGroupingSettings:
  aggregationKind: SingleAlert
status: Available
tactics:
  - InitialAccess
  - CredentialAccess
relevantTechniques:
  - T1190
  - T1528
query: |
  FortyTwoCrunchAPIProtectionV2_CL 
  | where TimeGenerated >= ago(5m) 
  | where ErrorMessage has "missing [\"x-access-token\"]" 
  | project-away NonBlockingMode, SourcePort, DestinationPort, Query, ApiId, ResponseHeader, RequestHeader, Errors, EventType, Uuid 
  | sort by TimeGenerated desc 
customDetails:
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIp
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: Hostname
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: InstanceName
version: 1.0.1
kind: Scheduled