id: c411dc09-a8ca-44f9-a594-242b5e90ada8
name: OCI - New users
description: |
  'Query searches for new users created.'
severity: Medium
requiredDataConnectors:
  - connectorId: OracleCloudInfraConnector
    dataTypes:
      - OCI_LogsV2_CL
tactics:
  - InitialAccess
  - Persistence
relevantTechniques:
  - T1078
query: |
  OCILogs
  | where TimeGenerated > ago(24h)
  | where data_eventName_s =~ 'CreateUser'
  | extend AccountCustomEntity = data_definedTags_Oracle_Tags_CreatedBy_s
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
