id: 399d4ecf-aea4-4be0-ae28-9f4106f68808
Function:
  Title: Parser for TrendMicroCAS
  Version: '1.1.0'
  LastUpdated: '2026-05-27'
Category: Microsoft Sentinel Parser
FunctionName: TrendMicroCAS
FunctionAlias: TrendMicroCAS
FunctionQuery: |
  union isfuzzy=true TrendMicroCAS_CL, TrendMicroCASV2_CL
  | extend
    EventVendor = "Trend Micro",
    EventProduct = "Cloud App Security",
    EventOriginalUid = column_ifexists('LogItemId', tostring(column_ifexists('log_item_id_g', ''))),
    EventCategoryType = column_ifexists('Service', column_ifexists('service_s', '')),
    EventType = column_ifexists('Event', column_ifexists('event_s', '')),
    ScanType = column_ifexists('ScanType', column_ifexists('message_scan_type_s', '')),
    DstUserName = column_ifexists('AffectedUser', column_ifexists('message_affected_user_s', '')),
    SrcFilePath = column_ifexists('Location', column_ifexists('message_location_s', '')),
    DetectionTime = column_ifexists('DetectionTime', column_ifexists('message_detection_time_t', datetime(null))),
    TriggeredPolicyName = column_ifexists('TriggeredPolicyName', column_ifexists('message_triggered_policy_name_s', '')),
    TriggeredSecurityFilter = column_ifexists('TriggeredSecurityFilter', column_ifexists('message_triggered_security_filter_s', '')),
    EventOriginalResultDetails = column_ifexists('Action', column_ifexists('message_action_s', '')),
    EventResult = column_ifexists('ActionResult', column_ifexists('message_action_result_s', '')),
    MailMessageId = column_ifexists('MailMessageId', tostring(column_ifexists('message_mail_message_id_g', ''))),
    MailMessageSender = column_ifexists('MailMessageSender', column_ifexists('message_mail_message_sender_s', '')),
    MailMessageRecipient = column_ifexists('MailMessageRecipient', column_ifexists('message_mail_message_recipient_d', dynamic(null))),
    MailMessageSubmitTime = column_ifexists('MailMessageSubmitTime', column_ifexists('message_mail_message_submit_time_t', datetime(null))),
    MailMessageDeliveryTime = column_ifexists('MailMessageDeliveryTime', column_ifexists('message_mail_message_delivery_time_t', datetime(null))),
    MailMessageSubject = column_ifexists('MailMessageSubject', column_ifexists('message_mail_message_subject_s', '')),
    MailMessageFileName = column_ifexists('MailMessageFileName', column_ifexists('message_mail_message_file_name_s', '')),
    SrcFileName = column_ifexists('FileName', column_ifexists('message_file_name_s', '')),
    FileUploadTime = column_ifexists('FileUploadTime', column_ifexists('message_file_upload_time_t', datetime(null))),
    SecurityRiskName = column_ifexists('SecurityRiskName', column_ifexists('message_security_risk_name_s', '')),
    DetectedBy = column_ifexists('DetectedBy', column_ifexists('message_detected_by_s', '')),
    RiskLevel = column_ifexists('RiskLevel', column_ifexists('message_risk_level_s', '')),
    SrcFileSHA1 = column_ifexists('FileSHA1', column_ifexists('message_file_sha1_s', '')),
    SrcFileSHA256 = column_ifexists('FileSHA256', column_ifexists('message_file_sha256_s', '')),
    VirusName = column_ifexists('VirusName', column_ifexists('message_virus_name_s', '')),
    DetectionType = column_ifexists('DetectionType', column_ifexists('message_detection_type_s', '')),
    RansomwareName = column_ifexists('RansomwareName', column_ifexists('message_ransomware_name_s', '')),
    TriggeredDlpTemplate = column_ifexists('TriggeredDlpTemplate', column_ifexists('message_triggered_dlp_template_d', dynamic(null)))
  | project
    TimeGenerated,
    EventVendor,
    EventProduct,
    EventOriginalUid,
    EventCategoryType,
    EventType,
    ScanType,
    DstUserName,
    SrcFilePath,
    DetectionTime,
    TriggeredPolicyName,
    TriggeredSecurityFilter,
    EventOriginalResultDetails,
    EventResult,
    MailMessageId,
    MailMessageSender,
    MailMessageRecipient,
    MailMessageSubmitTime,
    MailMessageDeliveryTime,
    MailMessageSubject,
    MailMessageFileName,
    SrcFileName,
    FileUploadTime,
    SecurityRiskName,
    DetectedBy,
    RiskLevel,
    SrcFileSHA1,
    SrcFileSHA256,
    VirusName,
    DetectionType,
    RansomwareName,
    TriggeredDlpTemplate