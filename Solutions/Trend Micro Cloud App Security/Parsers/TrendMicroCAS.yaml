id: 399d4ecf-aea4-4be0-ae28-9f4106f68808
Function:
  Title: Parser for TrendMicroCAS
  Version: '1.1.1'
  LastUpdated: '2026-06-03'
Category: Microsoft Sentinel Parser
FunctionName: TrendMicroCAS
FunctionAlias: TrendMicroCAS
FunctionQuery: |
  // CLv1 leg: legacy Azure Functions connector → TrendMicroCAS_CL (column names have type suffixes)
  let CLv1 = TrendMicroCAS_CL
  | extend
      EventVendor = "Trend Micro",
      EventProduct = "Cloud App Security",
      EventOriginalUid = tostring(column_ifexists('log_item_id_g', '')),
      EventCategoryType = column_ifexists('service_s', ''),
      EventType = column_ifexists('event_s', ''),
      ScanType = column_ifexists('message_scan_type_s', ''),
      DstUserName = column_ifexists('message_affected_user_s', ''),
      SrcFilePath = column_ifexists('message_location_s', ''),
      DetectionTime = column_ifexists('message_detection_time_t', datetime(null)),
      TriggeredPolicyName = column_ifexists('message_triggered_policy_name_s', ''),
      TriggeredSecurityFilter = column_ifexists('message_triggered_security_filter_s', ''),
      EventOriginalResultDetails = column_ifexists('message_action_s', ''),
      EventResult = column_ifexists('message_action_result_s', ''),
      MailMessageId = tostring(column_ifexists('message_mail_message_id_g', '')),
      MailMessageSender = column_ifexists('message_mail_message_sender_s', ''),
      MailMessageRecipient = column_ifexists('message_mail_message_recipient_d', dynamic(null)),
      MailMessageSubmitTime = column_ifexists('message_mail_message_submit_time_t', datetime(null)),
      MailMessageDeliveryTime = column_ifexists('message_mail_message_delivery_time_t', datetime(null)),
      MailMessageSubject = column_ifexists('message_mail_message_subject_s', ''),
      MailMessageFileName = column_ifexists('message_mail_message_file_name_s', ''),
      SrcFileName = column_ifexists('message_file_name_s', ''),
      FileUploadTime = column_ifexists('message_file_upload_time_t', datetime(null)),
      SecurityRiskName = column_ifexists('message_security_risk_name_s', ''),
      DetectedBy = column_ifexists('message_detected_by_s', ''),
      RiskLevel = column_ifexists('message_risk_level_s', ''),
      SrcFileSHA1 = column_ifexists('message_file_sha1_s', ''),
      SrcFileSHA256 = column_ifexists('message_file_sha256_s', ''),
      VirusName = column_ifexists('message_virus_name_s', ''),
      DetectionType = column_ifexists('message_detection_type_s', ''),
      RansomwareName = column_ifexists('message_ransomware_name_s', ''),
      TriggeredDlpTemplate = column_ifexists('message_triggered_dlp_template_d', dynamic(null))
  | project
      TimeGenerated, EventVendor, EventProduct, EventOriginalUid, EventCategoryType, EventType,
      ScanType, DstUserName, SrcFilePath, DetectionTime, TriggeredPolicyName, TriggeredSecurityFilter,
      EventOriginalResultDetails, EventResult, MailMessageId, MailMessageSender, MailMessageRecipient,
      MailMessageSubmitTime, MailMessageDeliveryTime, MailMessageSubject, MailMessageFileName,
      SrcFileName, FileUploadTime, SecurityRiskName, DetectedBy, RiskLevel, SrcFileSHA1, SrcFileSHA256,
      VirusName, DetectionType, RansomwareName, TriggeredDlpTemplate;
  // CLv2 leg: CCF connector → TrendMicroCASV2_CL (clean column names, no type suffixes)
  let CLv2 = TrendMicroCASV2_CL
  | extend
      EventVendor = "Trend Micro",
      EventProduct = "Cloud App Security",
      EventOriginalUid = column_ifexists('LogItemId', ''),
      EventCategoryType = column_ifexists('Service', ''),
      EventType = column_ifexists('Event', ''),
      ScanType = column_ifexists('ScanType', ''),
      DstUserName = column_ifexists('AffectedUser', ''),
      SrcFilePath = column_ifexists('Location', ''),
      DetectionTime = column_ifexists('DetectionTime', datetime(null)),
      TriggeredPolicyName = column_ifexists('TriggeredPolicyName', ''),
      TriggeredSecurityFilter = column_ifexists('TriggeredSecurityFilter', ''),
      EventOriginalResultDetails = column_ifexists('Action', ''),
      EventResult = column_ifexists('ActionResult', ''),
      MailMessageId = column_ifexists('MailMessageId', ''),
      MailMessageSender = column_ifexists('MailMessageSender', ''),
      MailMessageRecipient = column_ifexists('MailMessageRecipient', dynamic(null)),
      MailMessageSubmitTime = column_ifexists('MailMessageSubmitTime', datetime(null)),
      MailMessageDeliveryTime = column_ifexists('MailMessageDeliveryTime', datetime(null)),
      MailMessageSubject = column_ifexists('MailMessageSubject', ''),
      MailMessageFileName = column_ifexists('MailMessageFileName', ''),
      SrcFileName = column_ifexists('FileName', ''),
      FileUploadTime = column_ifexists('FileUploadTime', datetime(null)),
      SecurityRiskName = column_ifexists('SecurityRiskName', ''),
      DetectedBy = column_ifexists('DetectedBy', ''),
      RiskLevel = column_ifexists('RiskLevel', ''),
      SrcFileSHA1 = column_ifexists('FileSHA1', ''),
      SrcFileSHA256 = column_ifexists('FileSHA256', ''),
      VirusName = column_ifexists('VirusName', ''),
      DetectionType = column_ifexists('DetectionType', ''),
      RansomwareName = column_ifexists('RansomwareName', ''),
      TriggeredDlpTemplate = column_ifexists('TriggeredDlpTemplate', dynamic(null))
  | project
      TimeGenerated, EventVendor, EventProduct, EventOriginalUid, EventCategoryType, EventType,
      ScanType, DstUserName, SrcFilePath, DetectionTime, TriggeredPolicyName, TriggeredSecurityFilter,
      EventOriginalResultDetails, EventResult, MailMessageId, MailMessageSender, MailMessageRecipient,
      MailMessageSubmitTime, MailMessageDeliveryTime, MailMessageSubject, MailMessageFileName,
      SrcFileName, FileUploadTime, SecurityRiskName, DetectedBy, RiskLevel, SrcFileSHA1, SrcFileSHA256,
      VirusName, DetectionType, RansomwareName, TriggeredDlpTemplate;
  union isfuzzy=true CLv1, CLv2