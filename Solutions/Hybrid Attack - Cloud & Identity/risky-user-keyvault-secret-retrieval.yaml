id: 5a15995c-f690-45f8-9c4f-baeecb0cb93f
name: Risky user Key Vault secret retrieval
description: |
  Detects Azure Key Vault secret retrieval activity performed by users currently marked as risky.
description-detailed: |
  This hunt correlates successful Key Vault secret retrieval operations with risky-user state from Entra Identity Protection.
  It enriches findings with risk events and device context for investigation prioritization.
requiredDataConnectors:
  - connectorId: AzureActivity
    dataTypes:
      - AzureActivity
  - connectorId: AzureMonitor
    dataTypes:
      - AzureDiagnostics
  - connectorId: AzureActiveDirectory
    dataTypes:
      - AADRiskyUsers
      - AADUserRiskEvents
tactics:
  - CredentialAccess
  - Discovery
relevantTechniques:
  - T1552.007
  - T1078.004
tags:
  - Hybrid attack
  - Key Vault
  - Risky users
  - Identity Protection
query: |
  // Hunt execution window.
  let StartTime = todatetime('{{StartTimeISO}}');
  let EndTime = todatetime('{{EndTimeISO}}');
  let RiskLookback = 7d;
  let SuccessActivity = dynamic(["succeeded", "success"]);
  // Build current risky-user set from Identity Protection state.
  let RiskyUsersCurrent =
    AADRiskyUsers
    | where TimeGenerated between ((StartTime - RiskLookback) .. EndTime)
    | extend UserPrincipalNameNorm = tolower(UserPrincipalName),
             RiskUserId = tolower(Id),
             RiskLevelNorm = tolower(RiskLevel),
             RiskStateNorm = tolower(RiskState)
    | where isnotempty(UserPrincipalNameNorm) or isnotempty(RiskUserId)
    | where RiskStateNorm in ("atrisk", "confirmedcompromised")
    | where RiskLevelNorm in ("medium", "high")
    // Use a stable fallback key so users without Id are not collapsed into one bucket.
    | extend RiskEntityKey = coalesce(RiskUserId, UserPrincipalNameNorm)
    | summarize arg_max(TimeGenerated, *) by RiskEntityKey
    | project RiskUserId, UserPrincipalNameNorm, RiskLevel, RiskState, RiskDetail, RiskLastUpdatedDateTime;
  // Optional risk-event enrichment for investigation context.
  let RiskEventsSummary =
    AADUserRiskEvents
    | where TimeGenerated between ((StartTime - RiskLookback) .. EndTime)
    | extend UserPrincipalNameNorm = tolower(UserPrincipalName),
             RiskUserId = tolower(UserId)
    | where isnotempty(UserPrincipalNameNorm) or isnotempty(RiskUserId)
    | summarize RiskEventCount=count(),
                RiskEventTypes=make_set(RiskEventType, 10),
                LastRiskEvent=max(DetectedDateTime),
                LastRiskIp=any(IpAddress)
      by RiskUserId, UserPrincipalNameNorm;
  // Key Vault secret retrieval from AzureActivity (management-plane visibility).
  let KeyVaultReadsFromActivity =
    AzureActivity
    | where TimeGenerated between (StartTime .. EndTime)
    | where isnotempty(Caller) and isnotempty(CallerIpAddress)
    | extend Claims = todynamic(Claims_d),
             ClaimsText = tostring(Claims_d),
             CallerUpn=tolower(tostring(Caller)),
             // Use multiple fallbacks because claims shape differs by source and token type.
             CallerObjectId=tolower(tostring(coalesce(
               Claims["http://schemas.microsoft.com/identity/claims/objectidentifier"],
               Claims["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"],
               extractjson('$."http://schemas.microsoft.com/identity/claims/objectidentifier"', ClaimsText),
               extractjson('$."http://schemas.xmlsoap.org/ws/2005/05/identity/claims/nameidentifier"', ClaimsText),
               extract(@'(?i)"oid"\s*:\s*"([0-9a-f-]{36})"', 1, ClaimsText),
               extract(@'(?i)"http://schemas\.microsoft\.com/identity/claims/objectidentifier"\s*:\s*"([0-9a-f-]{36})"', 1, ClaimsText),
               extract(@'(?i)"http://schemas\.xmlsoap\.org/ws/2005/05/identity/claims/nameidentifier"\s*:\s*"([0-9a-f-]{36})"', 1, ClaimsText),
               iff(tostring(Caller) matches regex "^[0-9a-fA-F-]{36}$", tostring(Caller), "")
             ))),
             SourceIp=tostring(CallerIpAddress),
             Op=tolower(OperationNameValue),
             Status=tolower(tostring(ActivityStatusValue)),
             SubStatus=tolower(tostring(ActivitySubstatusValue)),
             ResourceIdNorm=tostring(ResourceId),
             SecretName=tolower(extract(@"/secrets/([^/]+)", 1, tostring(ResourceId))),
             DataSource="AzureActivity"
    | where isnotempty(CallerUpn) or isnotempty(CallerObjectId)
    | where Op has "microsoft.keyvault/vaults/" and Op has "/secrets/"
    | where Op has_any ("/get", "/read", "read")
    | where Status in (SuccessActivity) or SubStatus has "ok"
    // Dedupe duplicate activity stages for one logical secret read.
    | extend ActionKey = iff(
        isnotempty(CorrelationId),
        strcat(CorrelationId, "|", CallerUpn, "|", CallerObjectId, "|", Op, "|", ResourceIdNorm),
        strcat(CallerUpn, "|", CallerObjectId, "|", SourceIp, "|", Op, "|", ResourceIdNorm, "|", tostring(bin(TimeGenerated, 1m)))
      )
    | summarize arg_min(TimeGenerated, *) by ActionKey
    | project TimeGenerated, CallerUpn, CallerObjectId, SourceIp, Op, SecretName, OperationNameValue,
              SubscriptionId, ResourceIdNorm, DataSource;
  // Key Vault secret retrieval from AzureDiagnostics (data-plane visibility when available).
  let KeyVaultReadsFromDiagnostics =
    union isfuzzy=true
      (AzureDiagnostics
    | where TimeGenerated between (StartTime .. EndTime)
    | extend Op=tolower(tostring(column_ifexists("OperationName", ""))),
             ResultTypeNorm=tolower(tostring(column_ifexists("ResultType", ""))),
             CallerUpn=tolower(tostring(column_ifexists("identity_claim_upn_s", ""))),
             CallerObjectId=tolower(tostring(coalesce(column_ifexists("identity_claim_oid_g", ""), column_ifexists("identity_claim_oid_s", "")))),
             SourceIp=tostring(coalesce(column_ifexists("CallerIPAddress", ""), column_ifexists("CallerIpAddress", ""), column_ifexists("clientIpAddress_s", ""))),
             ResourceIdNorm=tostring(coalesce(column_ifexists("_ResourceId", ""), column_ifexists("ResourceId", ""))),
             SecretName=tolower(extract(@"/secrets/([^/]+)", 1, tostring(coalesce(column_ifexists("_ResourceId", ""), column_ifexists("ResourceId", ""))))),
             OperationNameValue=tostring(column_ifexists("OperationName", "")),
             SubscriptionId=tostring(column_ifexists("SubscriptionId", "")),
             DataSource="AzureDiagnostics"
    | where ResourceIdNorm has "/providers/microsoft.keyvault/vaults/"
    | where Op has "secret" and Op has_any ("get", "list")
    | where ResultTypeNorm in ("success", "succeeded", "")
    | where isnotempty(CallerUpn) or isnotempty(CallerObjectId)
    | project TimeGenerated, CallerUpn, CallerObjectId, SourceIp, Op, SecretName, OperationNameValue,
              SubscriptionId, ResourceIdNorm, DataSource);
  // Combined Key Vault secret read stream.
  let KeyVaultSecretReads =
    union isfuzzy=true KeyVaultReadsFromActivity, KeyVaultReadsFromDiagnostics
    | summarize FirstKvRead=min(TimeGenerated), LastKvRead=max(TimeGenerated),
                KvReadCount=count(),
                SecretNames=make_set_if(SecretName, isnotempty(SecretName), 30),
                KvOps=make_set(OperationNameValue, 20),
                Subscriptions=make_set(SubscriptionId, 10),
                VaultResources=make_set(ResourceIdNorm, 30),
                DataSources=make_set(DataSource, 5)
      by CallerUpn, CallerObjectId, SourceIp;

  // Match Key Vault callers to risky users by UPN or object ID.
  let MatchedByUpn =
    KeyVaultSecretReads
    | where isnotempty(CallerUpn)
    | join kind=inner (RiskyUsersCurrent | where isnotempty(UserPrincipalNameNorm)) on $left.CallerUpn == $right.UserPrincipalNameNorm;
  let MatchedByObjectId =
    KeyVaultSecretReads
    | where isnotempty(CallerObjectId)
    | join kind=inner (RiskyUsersCurrent | where isnotempty(RiskUserId)) on $left.CallerObjectId == $right.RiskUserId;
  // Final hunt result: risky users performing successful Key Vault secret retrieval.
  union isfuzzy=true MatchedByUpn, MatchedByObjectId
  | summarize arg_max(LastKvRead, *) by RiskUserId, CallerUpn, CallerObjectId, SourceIp
  | join kind=leftouter RiskEventsSummary on RiskUserId
  | where KvReadCount >= 1
  | extend EffectiveUpn = iff(isnotempty(UserPrincipalNameNorm), UserPrincipalNameNorm, CallerUpn),
           IdentityName = iff(EffectiveUpn contains "@", tostring(split(EffectiveUpn, "@")[0]), EffectiveUpn),
           IdentityUPNSuffix = iff(EffectiveUpn contains "@", tostring(split(EffectiveUpn, "@")[1]), ""),
           RiskRank = case(tolower(RiskLevel) == "high", 3, tolower(RiskLevel) == "medium", 2, tolower(RiskLevel) == "low", 1, 0),
           AddressScope = case(
             SourceIp startswith "10.", "Private",
             SourceIp startswith "192.168.", "Private",
             SourceIp matches regex "^172\\.(1[6-9]|2[0-9]|3[0-1])\\.", "Private",
             "Public"
           )
  | project TimeGenerated=FirstKvRead,
            RiskyUser=EffectiveUpn, RiskUserId, IdentityName, IdentityUPNSuffix,
            SourceIp, AddressScope,
            RiskLevel, RiskState, RiskDetail, RiskLastUpdatedDateTime,
            RiskEventCount, RiskEventTypes, LastRiskEvent, LastRiskIp,
            FirstKvRead, LastKvRead, KvReadCount, SecretNames, KvOps,
            Subscriptions, VaultResources, DataSources
  | order by RiskRank desc, KvReadCount desc, FirstKvRead desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: AadUserId
        columnName: RiskUserId
      - identifier: Name
        columnName: IdentityName
      - identifier: UPNSuffix
        columnName: IdentityUPNSuffix
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIp
      - identifier: AddressScope
        columnName: AddressScope
version: 1.0.0
