id: 9b784b65-2d16-4c9f-9f59-2a5d4c659f42
name: Filewall - Blocked emails
description: Identifies emails blocked by Filewall for Microsoft 365 (Exchange).
severity: High
status: Available
kind: Scheduled
query: | 
  FilewallM365ExchangeEvent()
  | where EventVendor == 'ODI-X' and EventProduct == 'Filewall for Microsoft 365'
  | where EventType == 'ThreatInfo' and EventResult == 'Blocked'
queryFrequency: 5m
queryPeriod: 5m
triggerOperator: gt
triggerThreshold: 0
relevantTechniques:
- T1048
tactics:
- Exfiltration
eventGroupingSettings:
  aggregationKind: AlertPerResult
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    matchingMethod: AllEntities
    reopenClosedIncident: false
    enabled: false
    lookbackDuration: PT1H
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: ActorUsername
- entityType: MailMessage
  fieldMappings:
  - identifier: Recipient
    columnName: EmailRecipientTo
  - identifier: Subject
    columnName: EmailSubject
  - identifier: NetworkMessageId
    columnName: EmailNetworkMessageId
  - identifier: Sender
    columnName: EmailSenderFrom
requiredDataConnectors:
- dataTypes:
  - FilewallExchange_CL
  connectorId: FilewallM365
version: 1.0.0
