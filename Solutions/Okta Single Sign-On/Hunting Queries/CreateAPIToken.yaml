id: c5134bac-044d-447a-a260-d1d439653ae7
name: Create API Token (Okta) 
description: |
  Okta API tokens are used to authenticate requests to Okta APIs. This query searches for attempts to create new API Token.
  Reference: https://developer.okta.com/docs/reference/api/event-types/
requiredDataConnectors:
  - connectorId: OktaSSO
    dataTypes: 
      - Okta_CL
  - connectorId: OktaSSOv2
    dataTypes:
      - OktaSSO
tactics:
  - CredentialAccess
  - Persistence
relevantTechniques:
  - T1078
  - T1098
query: |
  let Events = dynamic(["system.api_token.create"]);
  OktaSSO
  | where eventType_s in (Events)
  | where outcome_result_s =~ "SUCCESS"
  | extend AccountName = tostring(split(actor_alternateId_s, "@")[0]), AccountUPNSuffix = tostring(split(actor_alternateId_s, "@")[1])
  | order by TimeGenerated desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountUPNSuffix
version: 1.0.0