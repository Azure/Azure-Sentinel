id: 36f4d36f-8e4a-4a1a-b5c6-2c9a3b4d5e6f
Function:
  Title: Parser for Veeam Resource ID
  Version: '1.0.0'
  LastUpdated: '2024-08-12'
Category: Microsoft Sentinel Parser
FunctionName: Veeam_ParseResourceId
FunctionAlias: Veeam_ParseResourceId
FunctionQuery: |
    VeeamSessions_CL
    | extend
        ResourceId = VeeamResourceId,
        ResourceType = extract("^([^:]+)", 1, VeeamResourceId),
        ResourceValue = extract("^[^:]+:(.+)$", 1, VeeamResourceId),
        SessionId = Id,
        SessionName = Name,
        SessionType = SessionType,
        SessionState = State,
        VbrHost = VbrHostName,
        JobIdentifier = JobId,
        SessionCreated = CreationTime,
        SessionEnded = EndTime,
        ExecutionStatus = ResultStatus,
        ExecutionMessage = ResultMessage,
        WasCanceled = ResultIsCanceled,
        ParentSessionRef = ParentSessionId,
        PlatformType = PlatformName,
        PlatformIdentifier = PlatformId,
        ResourceRef = ResourceReference,
        UpdateSequenceNumber = Usn,
        SessionResult = Result,
        SessionMessage = Message,
        IsCanceledStatus = IsCanceled
    | project
        TimeGenerated,
        ResourceId,
        ResourceType,
        ResourceValue,
        SessionId,
        SessionName,
        SessionType,
        SessionState,
        VbrHost,
        JobIdentifier,
        SessionCreated,
        SessionEnded,
        ExecutionStatus,
        ExecutionMessage,
        WasCanceled,
        ParentSessionRef,
        PlatformType,
        PlatformIdentifier,
        ResourceRef,
        UpdateSequenceNumber,
        SessionResult,
        SessionMessage,
        IsCanceledStatus,
        SourceSystem
