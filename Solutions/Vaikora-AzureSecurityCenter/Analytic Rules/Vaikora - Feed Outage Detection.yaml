id: 5f7789fa-0a6b-4dff-a2da-dfa4b682f3af
name: Vaikora - Feed outage detection
description: |
  Identifies when no Vaikora data has arrived in the Vaikora_AgentSignals_CL table for 12 or more hours, which may indicate a failed playbook, expired API key, or connectivity issue.
severity: Low
requiredDataConnectors:
  - connectorId: VaikoraSecurityCenter
    dataTypes:
      - Vaikora_AgentSignals_CL
queryFrequency: 12h
queryPeriod: 12h
triggerOperator: lt
triggerThreshold: 1
status: Available
tactics: []
relevantTechniques: []
query: |
  Vaikora_AgentSignals_CL
  | where TimeGenerated >= ago(12h)
  | summarize Count = count()
  | where Count == 0
  | extend
      Alert      = "No Vaikora data ingested in the last 12 hours",
      Suggestion = "Check the VaikoraToAzureSecurityCenter Logic App run history and verify the Vaikora API key is valid."
  | project Alert, Suggestion
alertDetailsOverride:
  alertDisplayNameFormat: "Vaikora feed outage detected"
  alertDescriptionFormat: "Vaikora_AgentSignals_CL has received no records in the last 12 hours."
version: 1.0.0
kind: Scheduled
