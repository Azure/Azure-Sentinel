id: a1f3c2e7-9b45-4d8a-b621-3e7f0d5c8a12
Function:
  Title: Parser for VectraRUXDetections
  Version: "1.0.0"
  LastUpdated: "2026-04-28"
Category: Microsoft Sentinel Parser
FunctionName: VectraRUXDetections
FunctionAlias: VectraRUXDetections
FunctionQuery: |
  let VectraRUXDetections_view = view () {
      Detections_Data_CL
      | extend
          EventVendor = "VectraDetections",
          EventProduct = "VectraDetections",
          // Core detection identity
          ID                        = column_ifexists('id', real(null)),
          ["Detection ID"]          = column_ifexists('detection_id', real(null)),
          ["Detection Name"]        = column_ifexists('detection_type', ''),
          ["Detection Category"]    = column_ifexists('category', ''),
          ["D Type Vname"]          = column_ifexists('d_type_vname', ''),
          ["Temp Pivot"]            = column_ifexists('detection_href', ''),
          URL                       = column_ifexists('url', ''),
          // Entity fields
          ["Entity ID"]             = column_ifexists('entity_id', real(null)),
          ["Entity UID"]            = column_ifexists('entity_uid', ''),
          ["Entity Name"]           = column_ifexists('entity_name', ''),
          ["Entity Type"]           = column_ifexists('entity_type', ''),
          ["Type"]                  = column_ifexists('entity_type', ''),
          // Scoring
          Severity                  = column_ifexists('severity', real(null)),
          ["Threat"]                = column_ifexists('threat', real(null)),
          ["Certainty"]             = column_ifexists('certainty', real(null)),
          // Event metadata
          ["Change Type"]           = column_ifexists('change_type', ''),
          ["Event Type"]            = column_ifexists('event_type', ''),
          ["Last Updated"]          = column_ifexists('event_timestamp', ''),
          // Status and triage
          ["Is Triaged"]            = column_ifexists('triaged', ''),
          ["Is Prioritized"]        = column_ifexists('is_prioritized', ''),
          ["Is Targeting Key Asset"]= column_ifexists('is_targeting_key_asset', ''),
          ["Unresolved Priority"]   = column_ifexists('unresolved_priority', ''),
          ["Investigation Status"]  = column_ifexists('investigation_status', ''),
          ["Reason"]                = column_ifexists('reason', ''),
          // Detection content
          ["Details"]               = column_ifexists('detail', ''),
          ["Detection Details"]     = column_ifexists('d_detection_details', ''),
          Summary                   = column_ifexists('summary', ''),
          ["Grouped Details"]       = column_ifexists('grouped_details', ''),
          Mitre                     = column_ifexists('mitre', ''),
          Tags                      = column_ifexists('tags', ''),
          ["Normal Domains"]        = column_ifexists('normal_domains', ''),
          // Source host (flattened)
          ["Source IP"]             = coalesce(column_ifexists('src_host_ip', ''), column_ifexists('src_ip', '')),
          ["Source Host ID"]        = column_ifexists('src_host_id', long(null)),
          ["Source Host Name"]      = column_ifexists('src_host_name', ''),
          ["Source Host URL"]       = column_ifexists('src_host_url', ''),
          ["Source Host Certainty"] = column_ifexists('src_host_certainty', real(null)),
          ["Source Host Threat"]    = column_ifexists('src_host_threat', real(null)),
          ["Source Host Is Key Asset"] = column_ifexists('src_host_is_key_asset', ''),
          ["Source Host Groups"]    = column_ifexists('src_host_groups', ''),
          ["Source Host"]           = column_ifexists('src_host', ''),
          // Source account (flattened)
          ["Source Account ID"]     = column_ifexists('src_account_id', long(null)),
          ["Source Account Name"]   = column_ifexists('src_account_name', ''),
          ["Source Account URL"]    = column_ifexists('src_account_url', ''),
          ["Source Account Groups"] = column_ifexists('src_account_groups', ''),
          ["Source Account"]        = column_ifexists('src_account', ''),
          // Destination host (flattened)
          ["Destination Host ID"]   = column_ifexists('dst_host_id', long(null)),
          ["Destination Host IP"]   = column_ifexists('dst_host_ip', ''),
          ["Destination Host Name"] = column_ifexists('dst_host_name', ''),
          ["Destination Host URL"]  = column_ifexists('dst_host_url', ''),
          ["Destination Host Session LUID"] = column_ifexists('dst_host_session_luid', ''),
          ["Destination Host Groups"] = column_ifexists('dst_host_groups', ''),
          ["Destination Host"]      = column_ifexists('dst_host', ''),
          // Destination account (flattened)
          ["Destination Account ID"]  = column_ifexists('dst_account_id', long(null)),
          ["Destination Account Name"] = column_ifexists('dst_account_name', ''),
          ["Destination Account UID"]  = column_ifexists('dst_account_uid', ''),
          ["Destination Account URL"]  = column_ifexists('dst_account_url', ''),
          ["Destination Account Groups"] = column_ifexists('dst_account_groups', ''),
          ["Destination Account"]     = column_ifexists('dst_account', ''),
          // Destination domain (flattened)
          ["Destination Domain DNS"]  = column_ifexists('dst_domain_dns', ''),
          ["Destination Domain"]      = column_ifexists('dst_domain_domain', ''),
          ["Destination Domain External Target"] = column_ifexists('dst_domain_external_target', ''),
          // External source host
          ["Source External Host IP"]   = column_ifexists('src_external_host_ip', ''),
          ["Source External Host Name"] = column_ifexists('src_external_host_name', ''),
          // Data source (flattened)
          ["Data Source Sensor ID"]   = column_ifexists('data_source_sensor_id', ''),
          ["Data Source Sensor Name"] = column_ifexists('data_source_sensor_name', ''),
          ["Data Source Type"]        = column_ifexists('data_source_type', ''),
          // Filters (flattened)
          ["Filtered By AI"]          = column_ifexists('filters_filtered_by_ai', ''),
          ["Filtered By Rule"]        = column_ifexists('filters_filtered_by_rule', ''),
          ["Filtered By User"]        = column_ifexists('filters_filtered_by_user', ''),
          ["Is Custom Model"]         = column_ifexists('filters_is_custom_model', ''),
          // Assignment (flattened)
          ["Assignment ID"]           = column_ifexists('assignment_id', long(null)),
          ["Assigned By"]             = column_ifexists('assignment_assigned_by_username', ''),
          ["Assigned To"]             = column_ifexists('assignment_assigned_to_username', ''),
          ["Assignment Date"]         = column_ifexists('assignment_date_assigned', ''),
          // Additional context
          ["External Reference"]   = column_ifexists('external_reference_id', ''),
          ["Process Context Data"]    = column_ifexists('process_context_data', '')
      | extend
          ["Vectra Pivot"] = case(
              isnotempty(['Temp Pivot']),
              strcat(split(['Temp Pivot'], '?detail_id=')[0], "?pivot=Vectra-Sentinel-3.5.0"),
              ['Temp Pivot']
          ),
          URL = case(
              isnotempty(URL),
              strcat(URL, "?pivot=Vectra-Sentinel-3.5.0"),
              URL
          )
      | project
          TimeGenerated,
          EventVendor,
          EventProduct,
          ID,
          ["Detection ID"],
          ["Detection Name"],
          ["Detection Category"],
          ["D Type Vname"],
          ["Vectra Pivot"],
          URL,
          ["Entity ID"],
          ["Entity UID"],
          ["Entity Name"],
          ["Entity Type"],
          ["Type"],
          Severity,
          ["Threat"],
          ["Certainty"],
          ["Change Type"],
          ["Event Type"],
          ["Last Updated"],
          ["Is Triaged"],
          ["Is Prioritized"],
          ["Is Targeting Key Asset"],
          ["Unresolved Priority"],
          ["Investigation Status"],
          ["Reason"],
          ["Details"],
          ["Detection Details"],
          Summary,
          ["Grouped Details"],
          Mitre,
          Tags,
          ["Normal Domains"],
          ["Source IP"],
          ["Source Host ID"],
          ["Source Host Name"],
          ["Source Host URL"],
          ["Source Host Certainty"],
          ["Source Host Threat"],
          ["Source Host Is Key Asset"],
          ["Source Host Groups"],
          ["Source Host"],
          ["Source Account ID"],
          ["Source Account Name"],
          ["Source Account URL"],
          ["Source Account Groups"],
          ["Source Account"],
          ["Destination Host ID"],
          ["Destination Host IP"],
          ["Destination Host Name"],
          ["Destination Host URL"],
          ["Destination Host Session LUID"],
          ["Destination Host Groups"],
          ["Destination Host"],
          ["Destination Account ID"],
          ["Destination Account Name"],
          ["Destination Account UID"],
          ["Destination Account URL"],
          ["Destination Account Groups"],
          ["Destination Account"],
          ["Destination Domain DNS"],
          ["Destination Domain"],
          ["Destination Domain External Target"],
          ["Source External Host IP"],
          ["Source External Host Name"],
          ["Data Source Sensor ID"],
          ["Data Source Sensor Name"],
          ["Data Source Type"],
          ["Filtered By AI"],
          ["Filtered By Rule"],
          ["Filtered By User"],
          ["Is Custom Model"],
          ["Assignment ID"],
          ["Assigned By"],
          ["Assigned To"],
          ["Assignment Date"],
          ["External Reference"],
          ["Process Context Data"]
  };
  VectraRUXDetections_view
