id: c3f5e2a9-1d78-4b0c-a843-6e9b2f7d0c34
Function:
  Title: Parser for VectraEntities
  Version: "1.0.0"
  LastUpdated: "2026-04-29"
Category: Microsoft Sentinel Parser
FunctionName: VectraEntities
FunctionAlias: VectraEntities
FunctionQuery: |
  let VectraEntities_view = view () {
      union isfuzzy=true Entities_Data_CL, Entities_Data_CCF_CL
      | extend
          EventVendor = "VectraEntities",
          EventProduct = "VectraEntities",
          // -- Core entity identity -------------------------------------------
          ['Entity ID']                          = column_ifexists('id', real(null)),
          Name             = column_ifexists('name', ''),
          Type             = column_ifexists('entity_type', ''),
          ["IP Address"]              = column_ifexists('ip', ''),
          // -- Scoring & prioritization ---------------------------------------
          ["Is Prioritized"]          = column_ifexists('is_prioritized', ''),
          Severity                    = column_ifexists('severity', ''),
          ["Urgency Score"]           = column_ifexists('urgency_score', real(null)),
          ["Breadth Contrib"]         = column_ifexists('breadth_contrib', real(null)),
          Velocity        = column_ifexists('velocity_contrib', real(null)),
          Importance                  = column_ifexists('importance', real(null)),
          ["Attack Rating"]           = column_ifexists('attack_rating', real(null)),
          // -- Privilege -----------------------------------------------------
          ["Privilege Level"]         = column_ifexists('privilege_level', real(null)),
          ["Privilege Category"]      = column_ifexists('privilege_category', ''),
          ["Attack Profile"]          = column_ifexists('attack_profile', ''),
          // -- State & classification -----------------------------------------
          State                       = column_ifexists('state', ''),
          Tags                        = column_ifexists('tags', ''),
          ["Host Type"]               = column_ifexists('host_type', ''),
          ["Account Type"]            = column_ifexists('account_type', ''),
          // -- Timestamps ----------------------------------------------------
          ["Last Detection Timestamp"]  = column_ifexists('last_detection_timestamp', datetime(null)),
          ['Last Updated']  = column_ifexists('last_modified_timestamp', datetime(null)),
          // -- Detection & sensor context -------------------------------------
          ["Detection Set"]           = column_ifexists('detection_set', ''),
          Sensors                     = column_ifexists('sensors', ''),
          Notes                       = column_ifexists('notes', ''),
          // -- URL -----------------------------------------------------------
          ['Vectra Pivot']                         = column_ifexists('url', ''),
          // -- Assignment - raw dynamic ---------------------------------------
          Assignment                  = column_ifexists('assignment', ''),
          // -- Assignment - flattened -----------------------------------------
          ["Assignment ID"]           = column_ifexists('assignment_id', real(null)),
          ["Assignment Assigned By"]  = column_ifexists('assignment_assigned_by', ''),
          ["Assignment Assigned By ID"] = column_ifexists('assignment_assigned_by_id', real(null)),
          ["Assigned By"]             = column_ifexists('assignment_assigned_by_username', ''),
          ["Assignment Date"]         = column_ifexists('assignment_date_assigned', datetime(null)),
          ["Assignment Assigned To"]  = column_ifexists('assignment_assigned_to', ''),
          ["Assignment Assigned To ID"] = column_ifexists('assignment_assigned_to_id', real(null)),
          ["Assigned To"]             = column_ifexists('assignment_assigned_to_username', '')
      | extend
          ['Vectra Pivot'] = case(
              isnotempty(['Vectra Pivot']),
              strcat(['Vectra Pivot'], "?pivot=Vectra-Sentinel-3.5.0"),
              ['Vectra Pivot']
          )
      | project
          TimeGenerated,
          EventVendor,
          EventProduct,
          // Entity identity
          ['Entity ID'],
          Name,
          Type,
          ["IP Address"],
          // Scoring & prioritization
          ["Is Prioritized"],
          Severity,
          ["Urgency Score"],
          ["Breadth Contrib"],
          Velocity,
          Importance,
          ["Attack Rating"],
          // Privilege
          ["Privilege Level"],
          ["Privilege Category"],
          ["Attack Profile"],
          // State & classification
          State,
          Tags,
          ["Host Type"],
          ["Account Type"],
          // URL
          ['Vectra Pivot'],
          // Timestamps
          ["Last Detection Timestamp"],
          ['Last Updated'],
          // Detection & sensor context
          ["Detection Set"],
          Sensors,
          Notes,
          // Assignment
          Assignment,
          ["Assignment ID"],
          ["Assignment Assigned By"],
          ["Assignment Assigned By ID"],
          ["Assigned By"],
          ["Assignment Date"],
          ["Assignment Assigned To"],
          ["Assignment Assigned To ID"],
          ["Assigned To"]
  };
  VectraEntities_view