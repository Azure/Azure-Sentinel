id: 3c8e5f0b-1d4a-4b69-9c2e-7f0d3a5e8b1f
name: WMI Spawning Suspicious Child Process (Living off the Land)
description: |
  Detects WmiPrvSE.exe (the WMI Provider Host) spawning high-risk processes
  such as PowerShell, cmd.exe, cscript, or other LOLBins.

  WMI is a core Windows administration feature that attackers abuse for
  remote code execution and lateral movement because it requires no external
  tools, generates minimal disk artifacts, and can execute code on remote
  systems over DCOM/RPC while bypassing many endpoint security controls.

  Maps to MITRE ATT&CK:
    T1047       - Windows Management Instrumentation
    T1021.006   - Remote Services: Windows Remote Management
    T1059.001   - PowerShell
    T1059.003   - Windows Command Shell
    T1059.005   - Visual Basic

  Tune AllowlistedCmdPatterns to add known-safe management tools (SCCM, SCOM).
  Adjust the Lookback variable to match queryPeriod if you change the schedule.
severity: High
requiredDataConnectors:
  - connectorId: MicrosoftDefenderAdvancedThreatProtection
    dataTypes:
      - DeviceProcessEvents
  - connectorId: SecurityEvents
    dataTypes:
      - SecurityEvent
  - connectorId: WindowsSecurityEvents
    dataTypes:
      - SecurityEvent
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: GreaterThan
triggerThreshold: 0
status: Available
kind: Scheduled
tactics:
  - Execution
  - LateralMovement
  - Persistence
relevantTechniques:
  - T1047
  - T1021.006
  - T1059.001
  - T1059.003
  - T1059.005
query: |
  // WMI Child Process Detection
  // Single Lookback variable — update this to match queryPeriod if schedule changes
  let Lookback = 1h;
  let SuspiciousChildProcesses = dynamic([
      "powershell.exe", "pwsh.exe", "cmd.exe", "cscript.exe", "wscript.exe",
      "mshta.exe", "certutil.exe", "bitsadmin.exe", "regsvr32.exe",
      "rundll32.exe", "msiexec.exe", "installutil.exe", "cmstp.exe",
      "msbuild.exe", "wmic.exe", "net.exe", "net1.exe", "nltest.exe",
      "whoami.exe", "ipconfig.exe", "tasklist.exe", "schtasks.exe",
      "at.exe", "sc.exe", "reg.exe"
  ]);
  let AllowlistedCmdPatterns = dynamic([
      "ccmexec", "SMSAgent", "MOMAgent", "nessus", "qualys"
  ]);
  let NetworkIndicators = dynamic([
      "http://", "https://", "ftp://", "Net.WebClient",
      "DownloadString", "IEX", "Invoke-Expression",
      "Invoke-RestMethod", "/transfer", "-urlcache"
  ]);
  let CredentialIndicators = dynamic([
      "lsass", "mimikatz", "sekurlsa", "credential",
      "dump", "sam", "ntds", "hash"
  ]);
  // Branch 1: Defender for Endpoint
  let MDE_Results =
      DeviceProcessEvents
      | where TimeGenerated > ago(Lookback)
      | where InitiatingProcessFileName =~ "WmiPrvSE.exe"
      // FileName is already just the leaf name in MDE — safe to use in~ directly
      | where FileName in~ (SuspiciousChildProcesses)
      | where not(ProcessCommandLine has_any (AllowlistedCmdPatterns))
      | extend
          ChildProcess       = FileName,
          ChildCmdLine       = ProcessCommandLine,
          AccountName        = InitiatingProcessAccountName,
          AccountDomain      = InitiatingProcessAccountDomain,
          ParentProcess      = InitiatingProcessFileName,
          HostName           = DeviceName,
          EventTime          = TimeGenerated,
          NetworkActivity    = ProcessCommandLine has_any (NetworkIndicators),
          CredentialActivity = ProcessCommandLine has_any (CredentialIndicators),
          Source             = "MDE"
      | project
          EventTime, HostName, AccountName, AccountDomain, ChildProcess,
          ChildCmdLine, ParentProcess, NetworkActivity, CredentialActivity, Source;
  // Branch 2: Windows Security Events (Event ID 4688)
  let SecEvent_Results =
      SecurityEvent
      | where TimeGenerated > ago(Lookback)
      | where EventID == 4688
      | where ParentProcessName endswith "\\WmiPrvSE.exe"
      // Extract leaf name FIRST, then filter with in~ (case-insensitive equality)
      // Avoids unreliable has_any tokenisation on full paths containing \\ and .
      | extend ChildProcess = tostring(split(NewProcessName, "\\")[-1])
      | where ChildProcess in~ (SuspiciousChildProcesses)
      | where not(CommandLine has_any (AllowlistedCmdPatterns))
      | extend
          ChildCmdLine       = CommandLine,
          AccountName        = SubjectUserName,
          AccountDomain      = SubjectDomainName,
          ParentProcess      = "WmiPrvSE.exe",
          HostName           = Computer,
          EventTime          = TimeGenerated,
          NetworkActivity    = CommandLine has_any (NetworkIndicators),
          CredentialActivity = CommandLine has_any (CredentialIndicators),
          Source             = "SecurityEvent"
      | project
          EventTime, HostName, AccountName, AccountDomain, ChildProcess,
          ChildCmdLine, ParentProcess, NetworkActivity, CredentialActivity, Source;
  union MDE_Results, SecEvent_Results
  | extend
      HostName  = iif(HostName has '.', substring(HostName, 0, indexof(HostName, '.')), HostName),
      DnsDomain = iif(HostName has '.', substring(HostName, indexof(HostName, '.') + 1), ''),
      // Three-tier risk score: credential (3) > network (2) > plain execution (1)
      RiskScore = case(
          CredentialActivity == true, 3,
          NetworkActivity    == true, 2,
          true,                       1
      )
  | sort by RiskScore desc, EventTime desc
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: HostName
      - identifier: DnsDomain
        columnName: DnsDomain
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountName
      - identifier: NTDomain
        columnName: AccountDomain
  - entityType: Process
    fieldMappings:
      - identifier: CommandLine
        columnName: ChildCmdLine
alertDetailsOverride:
  alertDisplayNameFormat: "WMI spawned {{ChildProcess}} on {{HostName}}"
  alertDescriptionFormat: |
    WmiPrvSE.exe spawned {{ChildProcess}} on {{HostName}} under {{AccountName}}.
    Child command line: {{ChildCmdLine}}
    Network activity: {{NetworkActivity}}
    Credential activity: {{CredentialActivity}}
customDetails:
  ChildProcess: ChildProcess
  ChildCommandLine: ChildCmdLine
  NetworkActivity: NetworkActivity
  CredentialActivity: CredentialActivity
  DataSource: Source
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AllEntities
    groupByEntities:
      - Host
      - Account
eventGroupingSettings:
  aggregationKind: SingleAlert
version: 1.0.1
