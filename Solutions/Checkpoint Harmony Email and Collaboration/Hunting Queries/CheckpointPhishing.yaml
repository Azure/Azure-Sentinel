---
id: 0794a162-8635-43fd-81ed-2cf260457545
name: Phishing emails per internal user
description: >
  Get phishing email count per user
requiredDataConnectors:
  - connectorId: CheckpointHECConnection
    dataTypes:
      - CheckpointHEC_CL
tactics:
  - InitialAccess
query: |
  CheckpointHEC_CL
  | where event.Category == 'phishing' and TimeGenerated >= ago(1d)
  | mv-expand email = email.To
  | summarize PhishingDetections = count() by tostring(email)
  | order by PhishingDetections desc
