---
id: 0794a162-8635-43fd-81ed-2cf260457542
name: Event breakdown per user
description: >
  Get event breakdown per user
requiredDataConnectors:
  - connectorId: CheckpointHECConnection
    dataTypes:
      - CheckpointHEC_CL
tactics:
  - InitialAccess
query: |
  CheckpointHEC_CL
  | where TimeGenerated >= ago(1d)
  | mv-expand User = EmailTo
  | extend User = tostring(User)
  | summarize Count = count() by User, EventCategory
  | evaluate pivot(EventCategory, sum(Count))
