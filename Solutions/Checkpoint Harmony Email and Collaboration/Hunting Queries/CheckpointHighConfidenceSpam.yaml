---
id: 0794a162-8635-43fd-81ed-2cf260457544
name: Spam emails
description: >
  Search for emails detected as spam
requiredDataConnectors:
  - connectorId: CheckpointHECConnection
    dataTypes:
      - CheckpointHEC_CL
tactics:
  - InitialAccess
query: |
  CheckpointHEC_CL
  | where EventCategory == 'spam' and TimeGenerated >= ago(1d)
  | summarize SpamDetections = count() by tostring(EmailFromEmail)
  | order by SpamDetections desc