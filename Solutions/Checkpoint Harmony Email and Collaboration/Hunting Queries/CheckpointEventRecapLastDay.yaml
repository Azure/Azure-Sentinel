---
id: 0794a162-8635-43fd-81ed-2cf260457543
name: Event count last 24 hours
description: >
  Event type count break down
requiredDataConnectors:
  - connectorId: CheckpointHECConnection
    dataTypes:
      - CheckpointHEC_CL
tactics:
  - InitialAccess
query: |
  CheckpointHEC_CL 
  | where TimeGenerated >= ago(1d)
  | summarize Count = count() by EventCategory
