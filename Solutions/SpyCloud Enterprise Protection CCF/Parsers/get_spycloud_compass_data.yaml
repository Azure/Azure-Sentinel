id: 60e2f847-1c83-4099-9d2e-1401e3590798
Function:
  Title: SpyCloud Compass Data Parser
  Version: '1.0.0'
  LastUpdated: '2026-06-09'
Category: Microsoft Sentinel Parser
FunctionName: get_spycloud_compass_data
FunctionAlias: get_spycloud_compass_data
FunctionParams:
  - Name: startTime
    Type: timespan
    Default: 1d
FunctionQuery: |
  let _startTime = coalesce(startTime, 1d);
  spycloud_compassV2_CL
  | where TimeGenerated > ago(_startTime)
  | project
      TimeGenerated, DocumentId, SourceId, SpyCloudPublishDate, Email, Domain,
      Password, PasswordPlaintext, Severity, IPAddresses, InfectedMachineId,
      InfectedTime, BreachTitle, BreachCategory
