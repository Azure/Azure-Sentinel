id: ea883c92-ce82-4079-9e1d-5743349c3962
Function:
  Title: SpyCloud Enriched Data Parser
  Version: '1.0.0'
  LastUpdated: '2026-06-09'
Category: Microsoft Sentinel Parser
FunctionName: get_Spycloud_enriched_data
FunctionAlias: get_Spycloud_enriched_data
FunctionParams:
  - Name: lookback
    Type: timespan
    Default: 1d
FunctionQuery: |
  let _lookback = coalesce(lookback, 1d);
  let LatestBreachCatalog =
      SpyCloudBreachCatalogV2_CL
      | summarize arg_max(TimeGenerated, BreachTitle, Description, Status) by SourceId
      | project
          SourceId,
          BreachTitle,
          CatalogDescription = Description,
          CatalogStatus = Status;
  SpyCloudBreachWatchlistV2_CL
  | where TimeGenerated >= ago(_lookback)
  | join kind=leftouter LatestBreachCatalog on SourceId
  | project
      TimeGenerated,
      SourceId,
      InfectedPath,
      UserHostName,
      IPAddresses,
      TimeZone,
      TargetUrl,
      DocumentId,
      TargetDomain,
      UserSysRegisteredOwner,
      DisplayResolution,
      Password,
      Email,
      Severity,
      AVSoftwares,
      LogId,
      UserOS,
      EmailUsername,
      SpyCloudPublishDate,
      InfectedMachineId,
      PasswordPlaintext,
      InfectedTime,
      CountryCode,
      KeyboardLanguages,
      PasswordType,
      Domain,
      EmailDomain,
      TargetSubdomain,
      Sighting,
      AccountLastActivityTime,
      AccountNotes,
      AccountSignupTime,
      Username,
      Homepage,
      Salt,
      AccountLoginTime,
      SocialOther,
      LastName,
      FullName,
      Phone,
      FirstName,
      Address1,
      AccountModificationTime,
      Gender,
      City,
      BirthYear,
      DOB,
      CompanyWebsite,
      Industry,
      AccountStatus,
      SocialCrunchbase,
      CompanyName,
      SocialLinkedIn,
      SocialTwitter,
      AccountCaption,
      Address2,
      SSNLastFour,
      SocialSecurityNumber,
      HealthInsuranceId,
      PostalCode,
      Age,
      TaxId,
      State,
      AccountType,
      DeviceName,
      BankNumber,
      MobileEquipmentId,
      Country,
      EducationalInstitution,
      JobTitle,
      AccountImageUrl,
      StudentId,
      AccountId,
      BreachTitle,
      CatalogDescription,
      CatalogStatus
