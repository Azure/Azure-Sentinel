id: 789184de-ff71-4839-9df6-a2ca7da36ddb
Function:
  Title: Parser for Halcyon Kernel Activity events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_KernelActivity
FunctionAlias: Halcyon_OCSF_KernelActivity
FunctionQuery: |
    // Halcyon OCSF Kernel Activity events (class_uid 1002) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + the Kernel Activity-specific 'driver' object).
    HalcyonEventsV2_CL
    | where class_uid == 1002
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // Kernel Activity-specific
        driver
