id: e102c839-ff3a-4e51-bab0-e9f7a75dfd20
Function:
  Title: Parser for Halcyon Authentication events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_Authentication
FunctionAlias: Halcyon_OCSF_Authentication
FunctionQuery: |
    // Halcyon OCSF Authentication events (class_uid 3002) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + the Authentication-specific user/src_endpoint/dst_endpoint
    // objects).
    HalcyonEventsV2_CL
    | where class_uid == 3002
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // Authentication-specific
        ['user'], src_endpoint, dst_endpoint
