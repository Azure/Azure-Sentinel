id: e111d0c6-f75d-4ae8-ba02-672a4cb5a608
Function:
  Title: Parser for Halcyon DNS Activity events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_DnsActivity
FunctionAlias: Halcyon_OCSF_DnsActivity
FunctionQuery: |
    // Halcyon OCSF DNS Activity events (class_uid 4003) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + the DNS Activity-specific src_endpoint/query/answers/rcode
    // fields).
    HalcyonEventsV2_CL
    | where class_uid == 4003
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // DNS Activity-specific
        src_endpoint, ['query'], answers, rcode, rcode_id
