id: a1b2c3d4-e5f6-7890-1234-567890abcde5
Function:
  Title: ASIM Process Event Parser for Halcyon
  Version: '2.0.0'
  LastUpdated: '2026-03-18'
Category: Microsoft Sentinel Parser
FunctionName: ASimProcessEventHalcyon
FunctionAlias: ASimProcessEventHalcyon
FunctionQuery: |
  let parser = (disabled: bool = false) {
      HalcyonEvents_CL
      | where not(disabled)
      | where class_uid == 1007 // Process Activity
      | extend
          EventVendor              = tostring(metadata.product.vendor_name),
          EventProduct             = tostring(metadata.product.name),
          EventProductVersion      = tostring(metadata.product.version),
          EventSchema              = 'ProcessEvent',
          EventSchemaVersion       = '0.1.4',
          EventCount               = int(1),
          EventStartTime           = TimeGenerated,
          EventEndTime             = TimeGenerated,
          EventType                = iff(activity_id == 1, 'ProcessCreated', iff(activity_id == 2, 'ProcessTerminated', 'Other')),
          EventResult              = case(status_id == 1, 'Success', status_id == 2, 'Failure', 'NA'),
          EventOriginalType        = tostring(type_uid),
          EventOriginalSeverity    = severity,
          EventSeverity            = case(severity_id == 1, 'Informational', severity_id == 2, 'Low', severity_id == 3, 'Medium', severity_id == 4, 'High', severity_id == 5, 'Critical', 'Informational'),
          EventMessage             = message,
          TargetProcessName        = tostring(process.name),
          TargetProcessId          = tostring(process.pid),
          TargetProcessCommandLine = tostring(process.cmd_line),
          TargetProcessFilename    = tostring(process.file.name),
          TargetProcessFilePath    = tostring(process.file.path),
          ParentProcessName        = tostring(process.parent_process.name),
          ParentProcessId          = tostring(process.parent_process.pid),
          ParentProcessCommandLine = tostring(process.parent_process.cmd_line),
          ActorUsername            = tostring(actor.user.name),
          ActorUserId              = tostring(actor.user.uid),
          ActorUsernameType        = 'Simple',
          ActingProcessName        = tostring(actor.process.name),
          ActingProcessId          = tostring(actor.process.pid),
          ActingProcessCommandLine = tostring(actor.process.cmd_line),
          DvcHostname              = tostring(device.hostname),
          DvcIpAddr                = tostring(device.ip),
          DvcId                    = tostring(device.uid)
      | extend
          User                     = ActorUsername,
          Dvc                      = DvcHostname,
          Process                  = TargetProcessName
      | project
          TimeGenerated,
          EventVendor,
          EventProduct,
          EventProductVersion,
          EventSchema,
          EventSchemaVersion,
          EventCount,
          EventStartTime,
          EventEndTime,
          EventType,
          EventResult,
          EventOriginalType,
          EventOriginalSeverity,
          EventSeverity,
          EventMessage,
          TargetProcessName,
          TargetProcessId,
          TargetProcessCommandLine,
          TargetProcessFilename,
          TargetProcessFilePath,
          ParentProcessName,
          ParentProcessId,
          ParentProcessCommandLine,
          ActorUsername,
          ActorUserId,
          ActorUsernameType,
          ActingProcessName,
          ActingProcessId,
          ActingProcessCommandLine,
          DvcHostname,
          DvcIpAddr,
          DvcId,
          User,
          Dvc,
          Process
  };
  parser(disabled=disabled)
FunctionParams:
  - Name: disabled
    Type: bool
    Default: false
EquivalentBuiltInParser: _ASim_ProcessEvent_Halcyon
ParserParams:
  - Name: disabled
    Type: bool
    Default: false
