id: 5a10fe40-4034-4a77-b654-dcbcf76b6aae
Function:
  Title: Parser for Halcyon File Activity events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_FileActivity
FunctionAlias: Halcyon_OCSF_FileActivity
FunctionQuery: |
    // Halcyon OCSF File Activity events (class_uid 1001) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + the File Activity-specific 'file' object).
    HalcyonEventsV2_CL
    | where class_uid == 1001
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // File Activity-specific
        file
