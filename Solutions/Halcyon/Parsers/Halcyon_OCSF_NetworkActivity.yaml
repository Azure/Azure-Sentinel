id: fcf81064-3005-4475-b9ac-a032ffedaa3d
Function:
  Title: Parser for Halcyon Network Activity events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_NetworkActivity
FunctionAlias: Halcyon_OCSF_NetworkActivity
FunctionQuery: |
    // Halcyon OCSF Network Activity events (class_uid 4001) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + src_endpoint; dst_endpoint is populated only for
    // NefariousPeerCIDR detections).
    HalcyonEventsV2_CL
    | where class_uid == 4001
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // Network Activity-specific
        src_endpoint, dst_endpoint
