id: a1b2c3d4-e5f6-7890-1234-567890abcde2
Function:
  Title: ASIM DNS Activity Parser for Halcyon
  Version: '2.0.0'
  LastUpdated: '2026-03-18'
Category: Microsoft Sentinel Parser
FunctionName: ASimDnsHalcyon
FunctionAlias: ASimDnsHalcyon
FunctionQuery: |
  let parser = (disabled: bool = false) {
      HalcyonEvents_CL
      | where not(disabled)
      | where class_uid == 4003 // DNS Activity
      | extend
          EventVendor            = tostring(metadata.product.vendor_name),
          EventProduct           = tostring(metadata.product.name),
          EventProductVersion    = tostring(metadata.product.version),
          EventSchema            = 'Dns',
          EventSchemaVersion     = '0.1.7',
          EventCount             = int(1),
          EventStartTime         = TimeGenerated,
          EventEndTime           = TimeGenerated,
          EventType              = 'Query',
          EventResult            = case(rcode_id == 0, 'Success', rcode_id == 3, 'NXDOMAIN', 'Failure'),
          EventOriginalType      = tostring(type_uid),
          EventOriginalSeverity  = severity,
          EventSeverity          = case(severity_id == 1, 'Informational', severity_id == 2, 'Low', severity_id == 3, 'Medium', severity_id == 4, 'High', severity_id == 5, 'Critical', 'Informational'),
          EventMessage           = message,
          DnsQuery               = tostring(query.hostname),
          DnsQueryTypeName       = tostring(query.type),
          DnsResponseCodeName    = rcode,
          DnsResponseCode        = rcode_id,
          SrcIpAddr              = tostring(src_endpoint.ip),
          SrcPortNumber          = toint(src_endpoint.port),
          DstIpAddr              = tostring(dst_endpoint.ip),
          DstPortNumber          = toint(dst_endpoint.port),
          DvcHostname            = tostring(device.hostname),
          DvcIpAddr              = tostring(device.ip),
          DvcId                  = tostring(device.uid)
      | extend
          Domain                 = DnsQuery,
          Dvc                    = DvcHostname,
          IpAddr                 = SrcIpAddr,
          Src                    = SrcIpAddr
      | project
          TimeGenerated,
          EventVendor,
          EventProduct,
          EventProductVersion,
          EventSchema,
          EventSchemaVersion,
          EventCount,
          EventStartTime,
          EventEndTime,
          EventType,
          EventResult,
          EventOriginalType,
          EventOriginalSeverity,
          EventSeverity,
          EventMessage,
          DnsQuery,
          DnsQueryTypeName,
          DnsResponseCodeName,
          DnsResponseCode,
          SrcIpAddr,
          SrcPortNumber,
          DstIpAddr,
          DstPortNumber,
          DvcHostname,
          DvcIpAddr,
          DvcId,
          Domain,
          Dvc,
          IpAddr,
          Src
  };
  parser(disabled=disabled)
FunctionParams:
  - Name: disabled
    Type: bool
    Default: false
EquivalentBuiltInParser: _ASim_Dns_Halcyon
ParserParams:
  - Name: disabled
    Type: bool
    Default: false
