id: 449dcdbf-3c3c-4c61-8202-d156d6c28515
Function:
  Title: Parser for Halcyon Application Lifecycle events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_ApplicationLifecycle
FunctionAlias: Halcyon_OCSF_ApplicationLifecycle
FunctionQuery: |
    // Halcyon OCSF Application Lifecycle events (class_uid 6002) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + the Application Lifecycle-specific 'app' object).
    HalcyonEventsV2_CL
    | where class_uid == 6002
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // Application Lifecycle-specific
        app
