id: 565d0250-7fb8-4a31-85cc-8eda99968160
Function:
  Title: Parser for Halcyon Process Activity events
  Version: '1.0.0'
  LastUpdated: '2026-06-04'
Category: Microsoft Sentinel Parser
FunctionName: Halcyon_OCSF_ProcessActivity
FunctionAlias: Halcyon_OCSF_ProcessActivity
FunctionQuery: |
    // Halcyon OCSF Process Activity events (class_uid 1007) from HalcyonEventsV2_CL.
    // Filters to this class and projects only the columns relevant to it
    // (common fields + the Process Activity-specific 'process' object).
    HalcyonEventsV2_CL
    | where class_uid == 1007
    | project
        TimeGenerated, HalcyonSourceTime,
        activity_id, activity_name,
        category_uid, category_name,
        class_uid, class_name,
        type_uid, type_name,
        severity_id, severity,
        status_id, status,
        action_id, action,
        disposition_id, disposition,
        message,
        metadata, device, actor, unmapped,
        // Process Activity-specific
        process
