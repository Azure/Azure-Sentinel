id: a1b2c3d4-e5f6-7890-1234-567890abcde3
Function:
  Title: ASIM File Activity Parser for Halcyon
  Version: '2.0.0'
  LastUpdated: '2026-03-18'
Category: Microsoft Sentinel Parser
FunctionName: ASimFileEventHalcyon
FunctionAlias: ASimFileEventHalcyon
FunctionQuery: |
  let parser = (disabled: bool = false) {
      HalcyonEvents_CL
      | where not(disabled)
      | where class_uid == 1001 // File Activity
      | extend
          EventVendor            = tostring(metadata.product.vendor_name),
          EventProduct           = tostring(metadata.product.name),
          EventProductVersion    = tostring(metadata.product.version),
          EventSchema            = 'FileEvent',
          EventSchemaVersion     = '0.2.1',
          EventCount             = int(1),
          EventStartTime         = TimeGenerated,
          EventEndTime           = TimeGenerated,
          EventType              = activity_name,
          EventResult            = case(status_id == 1, 'Success', status_id == 2, 'Failure', 'NA'),
          EventOriginalType      = tostring(type_uid),
          EventOriginalSeverity  = severity,
          EventSeverity          = case(severity_id == 1, 'Informational', severity_id == 2, 'Low', severity_id == 3, 'Medium', severity_id == 4, 'High', severity_id == 5, 'Critical', 'Informational'),
          EventMessage           = message,
          TargetFileName         = tostring(file.name),
          TargetFilePath         = tostring(file.path),
          TargetFileExtension    = tostring(file.ext),
          ActorUsername          = tostring(actor.user.name),
          ActorUserId            = tostring(actor.user.uid),
          ActorUsernameType      = 'Simple',
          ActingProcessName      = tostring(actor.process.name),
          ActingProcessId        = tostring(actor.process.pid),
          ActingProcessCommandLine = tostring(actor.process.cmd_line),
          DvcHostname            = tostring(device.hostname),
          DvcIpAddr              = tostring(device.ip),
          DvcId                  = tostring(device.uid)
      | extend
          FilePath               = TargetFilePath,
          User                   = ActorUsername,
          Dvc                    = DvcHostname
      | project
          TimeGenerated,
          EventVendor,
          EventProduct,
          EventProductVersion,
          EventSchema,
          EventSchemaVersion,
          EventCount,
          EventStartTime,
          EventEndTime,
          EventType,
          EventResult,
          EventOriginalType,
          EventOriginalSeverity,
          EventSeverity,
          EventMessage,
          TargetFileName,
          TargetFilePath,
          TargetFileExtension,
          ActorUsername,
          ActorUserId,
          ActorUsernameType,
          ActingProcessName,
          ActingProcessId,
          ActingProcessCommandLine,
          DvcHostname,
          DvcIpAddr,
          DvcId,
          FilePath,
          User,
          Dvc
  };
  parser(disabled=disabled)
FunctionParams:
  - Name: disabled
    Type: bool
    Default: false
EquivalentBuiltInParser: _ASim_FileEvent_Halcyon
ParserParams:
  - Name: disabled
    Type: bool
    Default: false
