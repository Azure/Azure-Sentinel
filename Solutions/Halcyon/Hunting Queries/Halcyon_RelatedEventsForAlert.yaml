id: e3a4d2f0-7b14-4f3c-9c2e-2c4f1d8b6a01
name: Halcyon - Related Events for Alert
description: |
  Returns all Halcyon event records (HalcyonEventsV2_CL) whose unmapped.halcyon_alert_id matches the supplied HalcyonAlertId. Used to investigate the event timeline behind a Halcyon Alert.
requiredDataConnectors:
  - connectorId: HalcyonPushV2
    dataTypes:
      - HalcyonEventsV2_CL
tactics:
  - Execution
  - Impact
relevantTechniques:
  - T1486
query: |
  // Find all HalcyonEventsV2_CL records related to a specific HalcyonAlertId.
  // Replace <HalcyonAlertId> with the HalcyonAlertId from a Halcyon Alert.
  let TargetAlertId = "<HalcyonAlertId>";
  HalcyonEventsV2_CL
  | extend HalcyonAlertId = tostring(unmapped.halcyon_alert_id)
  | where HalcyonAlertId == TargetAlertId
  | order by TimeGenerated desc
version: 1.0.0
