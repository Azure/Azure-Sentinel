id: 48ef0be4-8240-4a03-bbb9-320b562d6ce4
name: D3 Smart SOAR - High or critical severity incident detected
description: |
  Identifies when a D3 Smart SOAR incident with High or Critical severity is ingested. This helps security teams prioritize response to the most impactful incidents reported by D3 Smart SOAR.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: D3SOARConnectorDefinition
    dataTypes:
      - D3SOARIncidents_CL
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Impact
relevantTechniques:
  - T1499
query: |
  D3SOARIncidents_CL
  | where TimeGenerated > ago(1h)
  | where IncidentSeverity in ("High", "Critical")
  | project
      TimeGenerated,
      IncidentNumber,
      IncidentTitle,
      IncidentSeverity,
      IncidentStatus,
      IncidentType,
      IncidentPriority,
      IncidentOwner,
      IncidentCreator,
      IncidentDescription,
      IncidentStage
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: IncidentOwner
version: 1.0.0
kind: Scheduled
