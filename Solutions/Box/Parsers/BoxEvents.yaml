         source_parent_name_g=column_ifexists('source_parent_name_g', ''),
         source_item_type_s=column_ifexists('source_item_type_s', ''),
         source_item_id_s=column_ifexists('source_item_id_s', ''),
         source_item_name_s=column_ifexists('source_item_name_s', ''),
         source_parent_type_s=column_ifexists('source_parent_type_s', ''),
         source_parent_name_s=column_ifexists('source_parent_name_s', ''),
         source_parent_id_s=column_ifexists('source_parent_id_s', ''),
         source_owned_by_type_s=column_ifexists('source_owned_by_type_s', ''),
         source_owned_by_id_s=column_ifexists('source_owned_by_id_s', ''),
         source_owned_by_name_s=column_ifexists('source_owned_by_name_s', ''),
         source_owned_by_login_s=column_ifexists('source_owned_by_login_s', ''),
         created_by_type_s=column_ifexists('created_by_type_s', ''),
         created_by_id_s=column_ifexists('created_by_id_s', ''),
         created_by_name_s=column_ifexists('created_by_name_s', ''),
         created_by_login_s=column_ifexists('created_by_login_s', ''),
         created_at_t=todatetime(column_ifexists('created_at_t', datetime(null))),
         event_id_g=coalesce(
           toguid(tostring(column_ifexists('event_id_g', ''))),
           toguid(tostring(column_ifexists('event_id_g_guid', '')))
         ),
         event_type_s=column_ifexists('event_type_s', ''),
         ip_address_s=column_ifexists('ip_address_s', ''),
         type_s=column_ifexists('type_s', ''),
         additional_details_size_d=column_ifexists('additional_details_size_d', ''),
         additional_details_ekm_id_g=column_ifexists('additional_details_ekm_id_g', ''),
         additional_details_version_id_s=column_ifexists('additional_details_version_id_s', ''),
         additional_details_service_id_s=column_ifexists('additional_details_service_id_s', ''),
         additional_details_service_name_s=column_ifexists('additional_details_service_name_s', ''),
         source_type_s=column_ifexists('source_type_s', ''),
         source_id_s=column_ifexists('source_id_s', ''),
         source_name_s=column_ifexists('source_name_s', ''),
         source_login_s=column_ifexists('source_login_s', ''),
         additional_details_access_token_identifier_s=column_ifexists('additional_details_access_token_identifier_s', ''),
         additional_details_shared_link_id_s=column_ifexists('additional_details_shared_link_id_s', ''),
         source_folder_id_s=column_ifexists('source_folder_id_s', ''),
         source_folder_name_s=column_ifexists('source_folder_name_s', ''),
         source_user_id_s=column_ifexists('source_user_id_s', ''),
         source_user_name_s=column_ifexists('source_user_name_s', ''),
         accessible_by_type_s=column_ifexists('accessible_by_type_s', ''),
         accessible_by_id_s=column_ifexists('accessible_by_id_s', ''),
         accessible_by_name_s=column_ifexists('accessible_by_name_s', ''),
         accessible_by_login_s=column_ifexists('accessible_by_login_s', ''),
         additional_details_type_s=column_ifexists('additional_details_type_s', ''),
         additional_details_collab_id_s=column_ifexists('additional_details_collab_id_s', ''),
         additional_details_role_s=column_ifexists('additional_details_role_s', ''),
         additional_details_is_performed_by_admin_b=column_ifexists('additional_details_is_performed_by_admin_b', ''),
         session_id_s=column_ifexists('session_id_s', ''),
         additional_details_invitation_message_s=column_ifexists('additional_details_invitation_message_s', ''),
         source_classification_name_s=column_ifexists('source_classification_name_s', ''),
         source_classification_color_s=column_ifexists('source_classification_color_s', ''),
         source_classification_definition_s=column_ifexists('source_classification_definition_s', ''),
         additional_details_action_by_login_s=column_ifexists('additional_details_action_by_login_s', ''),
         additional_details_shared_link_access_s=column_ifexists('additional_details_shared_link_access_s', '')
         | extend source_owned_by_id_s=iff(source_owned_by_id_s == source_owned_by_type_s, '', source_owned_by_id_s)
         | project-rename
         AdditionalDetailsAnnotationId=additional_details_annotation_id_d,
         AdditionalDetailsGroupId=additional_details_group_id_s,
         AdditionalDetailsGroupName=additional_details_group_name_s,
         SourceUserEmail=source_user_email_s,
         AdditionalDetailsCommentId=additional_details_comment_id_d,
         AdditionalDetailsMessage=additional_details_message_s,
         AdditionalDetailsTaskId=additional_details_task_id_d,
         AdditionalDetailsTaskMessage=additional_details_task_message_s,
         AdditionalDetailsTaskCreatedById=additional_details_task_created_by_id_d,
         AdditionalDetailsTaskCreatedByLogin=additional_details_task_created_by_login_s,
         AdditionalDetailsTaskAssignmentAssignedToId=additional_details_task_assignment_assigned_to_id_d,
         AdditionalDetailsTaskAssignmentAssignedToLogin=additional_details_task_assignment_assigned_to_login_s,
         AdditionalDetailsTaskAssignmentStatus=additional_details_task_assignment_status_s,
         AdditionalDetailsTaskAssignmentMessage=additional_details_task_assignment_message_s,
         SourceFileId=source_file_id_s,
         SourceFileName=source_file_name_s,
         SourceParentName=source_parent_name_g,
         SourceItemType=source_item_type_s,
         SourceItemId=source_item_id_s,
         SourceItemName=source_item_name_s,
         SourceParentType=source_parent_type_s,
         FileDirectory=source_parent_name_s,
         SourceParentId=source_parent_id_s,
         SourceOwnedByType=source_owned_by_type_s,
         SourceOwnedById=source_owned_by_id_s,
         SourceOwnedByName=source_owned_by_name_s,
         SourceOwnedByLogin=source_owned_by_login_s,
         CreatedByType=created_by_type_s,
         SrcUserSid=created_by_id_s,
         SrcUserName=created_by_name_s,
         SrcUserUpn=created_by_login_s,
         EventEndTime=created_at_t,
         EventId=event_id_g,
         EventType=event_type_s,
         SrcIpAddr=ip_address_s,
         BoxType=type_s,
         FileSize=additional_details_size_d,
         AdditionalDetailsEkmId=additional_details_ekm_id_g,
         AdditionalDetailsVersionId=additional_details_version_id_s,
         AdditionalDetailsServiceId=additional_details_service_id_s,
         AdditionalDetailsServiceName=additional_details_service_name_s,
         SourceType=source_type_s,
         SourceId=source_id_s,
         SourceName=source_name_s,
         SourceLogin=source_login_s,
         AdditionalDetailsAccessTokenIdentifier=additional_details_access_token_identifier_s,
         AdditionalDetailsSharedLinkId=additional_details_shared_link_id_s,
         SourceFolderId=source_folder_id_s,
         SourceFolderName=source_folder_name_s,
         SourceUserId=source_user_id_s,
         SourceUserName=source_user_name_s,
         AccessibleByType=accessible_by_type_s,
         AccessibleById=accessible_by_id_s,
         AccessibleByName=accessible_by_name_s,
         AccessibleByLogin=accessible_by_login_s,
         AdditionalDetailsType=additional_details_type_s,
         AdditionalDetailsCollabId=additional_details_collab_id_s,
         AdditionalDetailsRole=additional_details_role_s,
         AdditionalDetailsIsPerformedByAdmin=additional_details_is_performed_by_admin_b,
         UserSessionId=session_id_s,
         AdditionalDetailsInvitationMessage=additional_details_invitation_message_s,
         SourceClassificationName=source_classification_name_s,
         SourceClassificationColor=source_classification_color_s,
         SourceClassificationDefinition=source_classification_definition_s,
         AdditionalDetailsActionByLogin=additional_details_action_by_login_s,
         AdditionalDetailsSharedLinkAccess=additional_details_shared_link_access_s
         | extend _boxSourcePriority=0;
      let BoxEventsv2 = union isfuzzy=true BoxEventsv1_empty, BoxEventsV2_CL |
      extend _rawAdditionalDetails=todynamic(column_ifexists('additional_details', dynamic(null))),
    _rawActionBy=todynamic(column_ifexists('action_by', dynamic(null)))
    | extend additional_details_annotation_id_d=todouble(_rawAdditionalDetails.annotation_id),
     additional_details_group_id_s=tostring(_rawAdditionalDetails.group_id),
     additional_details_group_name_s=tostring(_rawAdditionalDetails.group_name),
     source_user_email_s=source_user_email,
     additional_details_comment_id_d=todouble(_rawAdditionalDetails.comment_id),
     additional_details_message_s=tostring(_rawAdditionalDetails.message),
     additional_details_task_id_d=todouble(_rawAdditionalDetails.task.id),
     additional_details_task_message_s=tostring(_rawAdditionalDetails.task.message),
     additional_details_task_created_by_id_d=todouble(_rawAdditionalDetails.task.created_by.id),
     additional_details_task_created_by_login_s=tostring(_rawAdditionalDetails.task.created_by.login),
     additional_details_task_assignment_assigned_to_id_d=todouble(_rawAdditionalDetails.task_assignment.assigned_to.id),
     additional_details_task_assignment_assigned_to_login_s=tostring(_rawAdditionalDetails.task_assignment.assigned_to.login),
     additional_details_task_assignment_status_s=tostring(_rawAdditionalDetails.task_assignment.status),
     additional_details_task_assignment_message_s=tostring(_rawAdditionalDetails.task_assignment.message),
     source_file_id_s=source_file_id,
     source_file_name_s=source_file_name,
     source_parent_name_g=source_parent_name,
     source_item_type_s=source_item_type,
     source_item_id_s=source_item_id,
     source_item_name_s=source_item_name,
     source_parent_type_s=source_parent_type,
     source_parent_name_s=source_parent_name,
     source_parent_id_s=source_parent_id,
     source_owned_by_type_s=source_owned_by_type,
     source_owned_by_id_s=iff(source_owned_by_id == source_owned_by_type, '', source_owned_by_id),
     source_owned_by_name_s=source_owned_by_name,
     source_owned_by_login_s=source_owned_by_login,
     created_by_type_s=created_by_type,
     created_by_id_s=created_by_id,
     created_by_name_s=created_by_name,
     created_by_login_s=created_by_login,
     created_at_t=todatetime(created_at),
    event_id_g=toguid(tostring(event_id)),
     event_type_s=event_type,
     ip_address_s=ip_address,
        type_s='event',
     additional_details_size_d=todouble(_rawAdditionalDetails.size),
     additional_details_ekm_id_g=toguid(_rawAdditionalDetails.ekm_id),
     additional_details_version_id_s=tostring(_rawAdditionalDetails.version_id),
     additional_details_service_id_s=tostring(_rawAdditionalDetails.service_id),
     additional_details_service_name_s=tostring(_rawAdditionalDetails.service_name),
     source_type_s=source_type,
     source_id_s=source_id,
     source_name_s=source_name,
     source_login_s=source_login,
     additional_details_access_token_identifier_s=tostring(_rawAdditionalDetails.access_token_identifier),
     additional_details_shared_link_id_s=tostring(_rawAdditionalDetails.shared_link_id),
     source_folder_id_s=source_folder_id,
     source_folder_name_s=source_folder_name,
     source_user_id_s=source_user_id,
     source_user_name_s=source_user_name,
     accessible_by_type_s=accessible_by_type,
     accessible_by_id_s=accessible_by_id,
     accessible_by_name_s=accessible_by_name,
     accessible_by_login_s=accessible_by_login,
     additional_details_type_s=tostring(_rawAdditionalDetails.type),
     additional_details_collab_id_s=tostring(_rawAdditionalDetails.collab_id),
     additional_details_role_s=tostring(_rawAdditionalDetails.role),
     additional_details_is_performed_by_admin_b=toboolean(_rawAdditionalDetails.is_performed_by_admin),
     session_id_s=session_id,
     additional_details_invitation_message_s=tostring(_rawAdditionalDetails.invitation_message),
       source_classification_name_s=coalesce(
         tostring(_rawAdditionalDetails.classification.name),
         tostring(column_ifexists('source_classification_name', '')),
         extract(@'"path":"\\?/Box__Security__Classification__Key","value":"([^"]+)"', 1, tostring(_rawAdditionalDetails.metadata.operationParams))
       ),
     source_classification_color_s=coalesce(tostring(_rawAdditionalDetails.classification.color), tostring(column_ifexists('source_classification_color', ''))),
     source_classification_definition_s=coalesce(tostring(_rawAdditionalDetails.classification.definition), tostring(column_ifexists('source_classification_definition', ''))),
     additional_details_action_by_login_s=coalesce(tostring(_rawAdditionalDetails.action_by.login), tostring(_rawActionBy.login)),
     additional_details_shared_link_access_s=tostring(_rawAdditionalDetails.shared_link_access)
       | project-rename
           AdditionalDetailsAnnotationId=additional_details_annotation_id_d,
         AdditionalDetailsGroupId=additional_details_group_id_s,
         AdditionalDetailsGroupName=additional_details_group_name_s,
         SourceUserEmail=source_user_email_s,
         AdditionalDetailsCommentId=additional_details_comment_id_d,
         AdditionalDetailsMessage=additional_details_message_s,
         AdditionalDetailsTaskId=additional_details_task_id_d,
         AdditionalDetailsTaskMessage=additional_details_task_message_s,
         AdditionalDetailsTaskCreatedById=additional_details_task_created_by_id_d,
         AdditionalDetailsTaskCreatedByLogin=additional_details_task_created_by_login_s,
         AdditionalDetailsTaskAssignmentAssignedToId=additional_details_task_assignment_assigned_to_id_d,
         AdditionalDetailsTaskAssignmentAssignedToLogin=additional_details_task_assignment_assigned_to_login_s,
         AdditionalDetailsTaskAssignmentStatus=additional_details_task_assignment_status_s,
         AdditionalDetailsTaskAssignmentMessage=additional_details_task_assignment_message_s,
         SourceFileId=source_file_id_s,
         SourceFileName=source_file_name_s,
         SourceParentName=source_parent_name_g,
         SourceItemType=source_item_type_s,
         SourceItemId=source_item_id_s,
         SourceItemName=source_item_name_s,
         SourceParentType=source_parent_type_s,
         FileDirectory=source_parent_name_s,
         SourceParentId=source_parent_id_s,
         SourceOwnedByType=source_owned_by_type_s,
         SourceOwnedById=source_owned_by_id_s,
         SourceOwnedByName=source_owned_by_name_s,
         SourceOwnedByLogin=source_owned_by_login_s,
         CreatedByType=created_by_type_s,
         SrcUserSid=created_by_id_s,
         SrcUserName=created_by_name_s,
         SrcUserUpn=created_by_login_s,
         EventEndTime=created_at_t,
         EventId=event_id_g,
         EventType=event_type_s,
         SrcIpAddr=ip_address_s,
         BoxType=type_s,
         FileSize=additional_details_size_d,
         AdditionalDetailsEkmId=additional_details_ekm_id_g,
         AdditionalDetailsVersionId=additional_details_version_id_s,
         AdditionalDetailsServiceId=additional_details_service_id_s,
         AdditionalDetailsServiceName=additional_details_service_name_s,
         SourceType=source_type_s,
         SourceId=source_id_s,
         SourceName=source_name_s,
         SourceLogin=source_login_s,
         AdditionalDetailsAccessTokenIdentifier=additional_details_access_token_identifier_s,
         AdditionalDetailsSharedLinkId=additional_details_shared_link_id_s,
         SourceFolderId=source_folder_id_s,
         SourceFolderName=source_folder_name_s,
         SourceUserId=source_user_id_s,
         SourceUserName=source_user_name_s,
         AccessibleByType=accessible_by_type_s,
         AccessibleById=accessible_by_id_s,
         AccessibleByName=accessible_by_name_s,
         AccessibleByLogin=accessible_by_login_s,
         AdditionalDetailsType=additional_details_type_s,
         AdditionalDetailsCollabId=additional_details_collab_id_s,
         AdditionalDetailsRole=additional_details_role_s,
         AdditionalDetailsIsPerformedByAdmin=additional_details_is_performed_by_admin_b,
         UserSessionId=session_id_s,
         AdditionalDetailsInvitationMessage=additional_details_invitation_message_s,
         SourceClassificationName=source_classification_name_s,
         SourceClassificationColor=source_classification_color_s,
         SourceClassificationDefinition=source_classification_definition_s,
         AdditionalDetailsActionByLogin=additional_details_action_by_login_s,
         AdditionalDetailsSharedLinkAccess=additional_details_shared_link_access_s
           | extend _boxSourcePriority=1
           | project-away created_at, event_category, additional_details*, event_id, event_type, ip_address, source*, created_by*, accessible_by*;
     let BoxEventsCombined = union isfuzzy=true BoxEventsv2, BoxEventsv1;
     let BoxEventsUnified = union isfuzzy=true
       (
         BoxEventsCombined
         | where isnotempty(tostring(EventId))
         | extend _dedup_key=tostring(EventId)
         | summarize hint.shufflekey=_dedup_key
             arg_max(_boxSourcePriority, *),
             _anyClassificationName=take_anyif(SourceClassificationName, isnotempty(SourceClassificationName)),
             _anyClassificationColor=take_anyif(SourceClassificationColor, isnotempty(SourceClassificationColor)),
             _anyClassificationDef=take_anyif(SourceClassificationDefinition, isnotempty(SourceClassificationDefinition))
           by _dedup_key
         | extend
             SourceClassificationName=iff(isempty(SourceClassificationName), _anyClassificationName, SourceClassificationName),
             SourceClassificationColor=iff(isempty(SourceClassificationColor), _anyClassificationColor, SourceClassificationColor),
             SourceClassificationDefinition=iff(isempty(SourceClassificationDefinition), _anyClassificationDef, SourceClassificationDefinition)
         | project-away _dedup_key, _boxSourcePriority, _anyClassificationName, _anyClassificationColor, _anyClassificationDef
       ),
       (
         BoxEventsCombined
         | where isempty(tostring(EventId))
         | project-away _boxSourcePriority
       );
     let BoxClassificationLookup = BoxEventsUnified
     | where isnotempty(SourceItemId) and isnotempty(SourceClassificationName) and SourceClassificationName !startswith 'securityClassification'
     | summarize arg_max(EventEndTime, SourceClassificationName, SourceClassificationColor, SourceClassificationDefinition) by SourceItemId
     | project SourceItemId, LookupSourceClassificationName=SourceClassificationName, LookupSourceClassificationColor=SourceClassificationColor, LookupSourceClassificationDefinition=SourceClassificationDefinition;
     BoxEventsUnified
     | lookup kind=leftouter BoxClassificationLookup on SourceItemId
     | project-reorder EventEndTime, Source*
       | extend
         _rawAdditionalDetailsSafe=todynamic(column_ifexists('_rawAdditionalDetails', dynamic(null))),
         _rawActionBySafe=todynamic(column_ifexists('_rawActionBy', dynamic(null)))
       | extend
         TimeGenerated=coalesce(todatetime(column_ifexists('TimeGenerated', datetime(null))), todatetime(column_ifexists('EventEndTime', datetime(null)))),
         SourceClassificationName=iff(
           isempty(SourceClassificationName) and EventType in ('METADATA_CASCADE_POLICY_CREATE', 'METADATA_CASCADE_POLICY_APPLY'),
           LookupSourceClassificationName,
           SourceClassificationName
         ),
         SourceClassificationColor=iff(
           isempty(SourceClassificationColor) and EventType in ('METADATA_CASCADE_POLICY_CREATE', 'METADATA_CASCADE_POLICY_APPLY'),
           LookupSourceClassificationColor,
           SourceClassificationColor
         ),
         SourceClassificationDefinition=iff(
           isempty(SourceClassificationDefinition) and EventType in ('METADATA_CASCADE_POLICY_CREATE', 'METADATA_CASCADE_POLICY_APPLY'),
           LookupSourceClassificationDefinition,
           SourceClassificationDefinition
         ),
         Additional_Details_Invitation_Message_s=coalesce(column_ifexists('Additional_Details_Invitation_Message_s', ''), AdditionalDetailsInvitationMessage),
         Additional_Details_Shared_Link_Access_s=coalesce(column_ifexists('Additional_Details_Shared_Link_Access_s', ''), AdditionalDetailsSharedLinkAccess),
         Additional_Details_Action_By_Login_s=coalesce(column_ifexists('Additional_Details_Action_By_Login_s', ''), AdditionalDetailsActionByLogin),
         Source_Classification_Name_s=coalesce(column_ifexists('Source_Classification_Name_s', ''), SourceClassificationName),
