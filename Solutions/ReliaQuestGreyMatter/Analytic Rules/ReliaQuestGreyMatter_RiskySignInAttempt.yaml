id: eeea42e6-94af-4ccf-91d8-108271362f1e
name: ReliaQuest GreyMatter - Risky Sign In Attempt
description: |
  'Detects high-risk sign-in attempts where the risk level during sign-in is high and the risk state indicates the account is at risk or confirmed compromised. This helps identify potentially compromised accounts accessing your environment.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: AzureActiveDirectory
    dataTypes:
      - SigninLogs
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1078
  - T1078.004
query: |
  SigninLogs
  | where RiskLevelDuringSignIn =~ "high"
  | where RiskState in~ ("atRisk", "confirmedCompromised")
  | project
      TimeGenerated,
      UserPrincipalName,
      IPAddress,
      Location,
      AppDisplayName,
      ResultType,
      ResultDescription,
      UserAgent,
      AuthenticationDetails,
      AADTenantId
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: UserPrincipalName
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPAddress
version: 1.0.0
kind: Scheduled
