id: d2e5f8a3-9c4b-4d7e-8f6a-3b2c4d5e6f7a
name: StealthTalk - Account takeover sequence
description: |
  Identifies the classic three-stage account-takeover pattern for the same StealthTalk user within 24 hours: off-hours login, new device registration, and geo-anomaly login. All three together is high-confidence evidence of credential compromise.
description-detailed: |
  Joins three event-type subsets (OffHoursLogin, NewDeviceLogin, GeoAnomalyLogin) on UserId
  and constrains the temporal window to +/-24 hours. Returns one row per matching triple with
  the new device ID, login country and source IP for triage. Any single one of these events
  is suspicious; all three for the same account inside a day is high-confidence evidence of
  compromise (initial credential test -> attacker enrols their own client -> attacker
  authenticates from a different region).
requiredDataConnectors:
  - connectorId: StealthTalkAnomalousAuth
    dataTypes:
      - StealthTalkAnomalousAuth_CL
tactics:
  - InitialAccess
  - Persistence
  - CredentialAccess
  - DefenseEvasion
relevantTechniques:
  - T1078
  - T1098
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: UserId
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IpAddress
query: |
  let lookback   = 7d;
  let TimeWindow = 24h;
  let offHours = StealthTalkAnomalousAuth_CL
      | where TimeGenerated >= ago(lookback)
      | where EventType == "OffHoursLogin"
      | project UserId, T_offhours = TimeGenerated;
  let newDevice = StealthTalkAnomalousAuth_CL
      | where TimeGenerated >= ago(lookback)
      | where EventType == "NewDeviceLogin"
      | project UserId, T_device = TimeGenerated, NewDeviceId;
  let geoAnomaly = StealthTalkAnomalousAuth_CL
      | where TimeGenerated >= ago(lookback)
      | where EventType == "GeoAnomalyLogin"
      | project UserId, T_geo = TimeGenerated, LoginCountry, IpAddress;
  offHours
  | join kind=inner newDevice  on UserId
  | join kind=inner geoAnomaly on UserId
  | where T_device between ((T_offhours - TimeWindow) .. (T_offhours + TimeWindow))
  | where T_geo    between ((T_offhours - TimeWindow) .. (T_offhours + TimeWindow))
  | project UserId, T_offhours, T_device, T_geo, NewDeviceId, LoginCountry, IpAddress
  | extend AlertName = "AccountTakeoverSequence", RiskLevel = "Critical"
  | distinct UserId, AlertName, RiskLevel, LoginCountry, IpAddress
version: 1.0.0
