id: 9f895380-3aad-47e4-9181-7c717a76af77
name: PRODAFT USTA - Payment card exposure by company
description: |
  'Summarizes compromised payment card exposure from PRODAFT USTA Payment Card Fraud
  Intelligence tickets, grouped by company, with the count of still-valid (non-expired)
  cards and the card brands involved. Useful for spotting concentrations of payment card
  fraud exposure affecting your organization.'
requiredDataConnectors:
  - connectorId: PRODAFTUstaPCFICCPDefinition
    dataTypes:
      - PRODAFTUstaCompromisedCards_CL
query: |
  PRODAFTUstaCompromisedCards
  | summarize
      Cards = count(),
      NonExpired = countif(ExpirationDate > now()),
      Brands = make_set(CardBrand, 25),
      FirstSeen = min(Created),
      LastSeen = max(Created)
      by CompanyName
  | sort by Cards desc
version: 1.0.0
