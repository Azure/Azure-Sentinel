id: de44e8fa-98b7-4021-ac6c-0d10e006d410
Function:
  Title: Corelight Asset Classification Events
  Version: "1.0.0"
  LastUpdated: "2026-05-15"
Category: Microsoft Sentinel Parser
FunctionName: corelight_asset_classification
FunctionAlias: corelight_asset_classification
FunctionQuery: |
  let dummy_table = datatable(TimeGenerated: datetime) [];
    let corelight_asset_classification = view () {
        union isfuzzy=true Corelight_v2_asset_classification_CL, dummy_table
        | extend
            path = column_ifexists("_path_s", ""),
            system_name = column_ifexists("_system_name_s", ""),
            write_ts = column_ifexists("_write_ts_t", ""),
            ts = column_ifexists("ts_t", datetime(null)),
            classification_ts = column_ifexists("classification_ts_t", datetime(null)),
            ip = column_ifexists("ip_s", ""),
            confidence = column_ifexists("confidence_d", real(null)),
            mac = column_ifexists("mac_s", ""),
            device_type = column_ifexists("device_type_s", ""),
            type_name = column_ifexists("type_name_s", ""),
            type_group = column_ifexists("type_group_s", ""),
            os_name = column_ifexists("os_name_s", ""),
            sources = column_ifexists("sources_s", ""),
            brand = column_ifexists("brand_s", ""),
            model = column_ifexists("model_s", ""),
            os_ver = column_ifexists("os_ver_s", ""),
            os_build = column_ifexists("os_build_s", ""),
            serial = column_ifexists("serial_s", ""),  
            vendor_mac = column_ifexists("vendor_mac_s", "")
        | extend
            EventVendor = "Corelight",
            EventProduct = "CorelightSensor",
            EventType = "asset_classification",
            src = ip,
            src_ip = ip,
            sensor_name = coalesce(system_name, "unknown")
        | project
            TimeGenerated,
            path,
            system_name,
            write_ts,
            ts,
            classification_ts,
            ip,
            confidence,
            mac,
            device_type,
            type_name,
            type_group,
            os_name,
            sources,
            brand,
            model,
            os_ver,
            vendor_mac,
            EventVendor,
            EventProduct,
            EventType,
            src,
            src_ip,
            sensor_name,
            serial,
            os_build
    };
    corelight_asset_classification
