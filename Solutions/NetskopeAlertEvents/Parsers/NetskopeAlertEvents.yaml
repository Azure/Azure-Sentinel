        dlp_profile = column_ifexists('DlpProfile', ''),
        dlp_rule = column_ifexists('DlpRule', ''),
        dlp_rule_severity = column_ifexists('DlpRuleSeverity', ''),
        dlp_incident_id = column_ifexists('DlpIncidentId', ''),
        dlp_file = column_ifexists('DlpFile', ''),
        dlp_mime_type = column_ifexists('MimeType', ''),
        threat_type = column_ifexists('ThreatType', ''),
        malware_type = column_ifexists('MalwareType', ''),
        malware_severity = column_ifexists('MalwareSeverity', ''),
        detection_engine = column_ifexists('DetectionEngine', ''),
        traffic_type = column_ifexists('TrafficType', ''),
        connection_id = column_ifexists('ConnectionId', ''),
        src_country = column_ifexists('SrcCountry', ''),
        src_region = column_ifexists('SrcRegion', ''),
        src_location = column_ifexists('SrcLocation', ''),
        src_latitude = column_ifexists('SrcLatitude', ''),
        src_longitude = column_ifexists('SrcLongitude', ''),
        dst_country = column_ifexists('DstCountry', ''),
        dst_region = column_ifexists('DstRegion', ''),
        dst_location = column_ifexists('DstLocation', ''),
        netskope_location = column_ifexists('Location', ''),
        instance_id = column_ifexists('InstanceId', ''),
        instance_name = column_ifexists('InstanceName', ''),
        netskope_pop = column_ifexists('NetskopePop', '')
    | extend
        location = iff(isempty(tostring(netskope_location)), strcat_array(pack_array(tostring(src_location), tostring(src_country)), ', '), tostring(netskope_location)),
        raw_json = RawData
    | project
        TimeGenerated,
        TenantId,
        SourceSystem,
        Type,
        alert_id,
        event_id,
        event_type,
        record_type,
        is_alert,
        alert_name,
        alert_type,
