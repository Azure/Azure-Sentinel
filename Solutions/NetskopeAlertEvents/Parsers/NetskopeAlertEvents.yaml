        file_size,
        md5,
        sha256,
        dlp_profile,
        dlp_rule,
        dlp_rule_severity,
        dlp_incident_id,
        dlp_file,
        dlp_mime_type,
        threat_type,
        malware_type,
        malware_severity,
        detection_engine,
        traffic_type,
        connection_id,
        src_country,
        src_region,
        src_location,
        src_latitude,
        src_longitude,
        dst_country,
        dst_region,
        dst_location,
        location,
        instance_id,
        instance_name,
        netskope_pop,
        raw_json
