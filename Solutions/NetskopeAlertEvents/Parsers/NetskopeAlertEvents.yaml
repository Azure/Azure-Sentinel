Function:
  Title: Parser for NetskopeAlertEvents
  Version: "1.0.0"
  LastUpdated: "2026-06-25"
Category: Microsoft Sentinel Parser
FunctionName: NetskopeAlertEvents
FunctionAlias: NetskopeAlertEvents
FunctionQuery: |
  let NetskopeAlertEvents_View = view (){
    NetskopeAlertEvents_CL
    | extend
        TenantId = column_ifexists('TenantId', ''),
        SourceSystem = column_ifexists('SourceSystem', ''),
        TimeGenerated = column_ifexists('TimeGenerated', ''),
        RawData = column_ifexists('RawData', ''),
        Type = column_ifexists('Type', ''),
        alert_id = column_ifexists('AlertId', ''),
        event_id = column_ifexists('Id', ''),
        event_type = column_ifexists('NsType', ''),
        record_type = column_ifexists('RecordType', ''),
        is_alert = column_ifexists('Alert', ''),
        alert_name = column_ifexists('AlertName', ''),
        alert_type = column_ifexists('AlertType', ''),
        alert_source = column_ifexists('AlertSource', ''),
        access_method = column_ifexists('AccessMethod', ''),
        activity = column_ifexists('Activity', ''),
        application = column_ifexists('App', ''),
        app_category = column_ifexists('Appcategory', ''),
        app_suite = column_ifexists('Appsuite', ''),
        ccl = column_ifexists('Ccl', ''),
        cci = column_ifexists('Cci', ''),
        user = column_ifexists('User', ''),
        user_ip = column_ifexists('Userip', ''),
        user_id = column_ifexists('UserId', ''),
        usergroup = column_ifexists('Usergroup', ''),
        organization_unit = column_ifexists('OrganizationUnit', ''),
        src_ip = column_ifexists('Srcip', ''),
        dst_ip = column_ifexists('Dstip', ''),
