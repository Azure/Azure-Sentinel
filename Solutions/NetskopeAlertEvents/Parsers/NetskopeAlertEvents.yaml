        os_version = column_ifexists('OsVersion', ''),
        browser = column_ifexists('Browser', ''),
        severity = column_ifexists('Severity', ''),
        severity_level = column_ifexists('SeverityLevel', ''),
        severity_id = column_ifexists('SeverityId', ''),
        policy = column_ifexists('Policy', ''),
        policy_name = column_ifexists('PolicyName', ''),
        action = column_ifexists('Action', ''),
        policy_action = column_ifexists('PolicyAction', ''),
        url = column_ifexists('Url', ''),
        domain = column_ifexists('Domain', ''),
        object_name = column_ifexists('Object', ''),
        object_type = column_ifexists('ObjectType', ''),
        object_id = column_ifexists('ObjectId', ''),
        file_name = column_ifexists('Filename', ''),
        file_type = column_ifexists('FileType', ''),
        file_size = column_ifexists('FileSize', ''),
        md5 = column_ifexists('Md5', ''),
