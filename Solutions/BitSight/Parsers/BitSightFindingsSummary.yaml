id: 39844fcb-d451-4050-ae41-23c8f27b611c
Function:
  Title: Parser for BitSightFindingsSummary
  Version: '1.1.0'
  LastUpdated: '2026-05-25'
Category: Microsoft Sentinel Parser
FunctionName: BitSightFindingsSummary
FunctionAlias: BitSightFindingsSummary
FunctionQuery: |
    union isfuzzy=true
        (
            BitsightFindings_summary_CL
            | extend
                    EventVendor = "BitSight",
                    EventProduct = "FindingsSummary",
                    Company = column_ifexists('Company', ''),
                    Confidence = column_ifexists('confidence', ''),
                    EndDate = column_ifexists('end_date', ''),
                    EventCount = column_ifexists('event_count', ''),
                    FirstSeen = column_ifexists('first_seen', ''),
                    HostCount = column_ifexists('host_count', ''),
                    Id = column_ifexists('id', ''),
                    Name = column_ifexists('name', ''),
                    Severity = column_ifexists('severity', ''),
                    StartDate = column_ifexists('start_date', ''),
                    Description = column_ifexists('description', '')
            | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    Company,
                    Confidence,
                    EndDate,
                    EventCount,
                    FirstSeen,
                    HostCount,
                    Id,
                    Name,
                    Severity,
                    StartDate,
                    Description
        ),
        (
            BitSightFindingsSummary_CL
            | summarize arg_max(TimeGenerated, *) by CompanyGuid, StartDate, EndDate
            | mv-expand StatEntry = Stats
            | extend
                    EventVendor = "BitSight",
                    EventProduct = "FindingsSummary",
                    StatName = tostring(StatEntry["name"]),
                    StatId = tostring(StatEntry["id"]),
                    Confidence = tostring(StatEntry["confidence"]),
                    EventCount = toint(StatEntry["event_count"]),
                    HostCount = toint(StatEntry["host_count"]),
                    FirstSeen = tostring(StatEntry["first_seen"])
            | join kind=leftouter (
                BitsightVulnerabilitiesFindingsSummary_CL
                | summarize arg_max(TimeGenerated, *) by DisplayName
                | project DisplayName, VulnSeverity = Severity, VulnDescription = Description
            ) on $left.StatName == $right.DisplayName
            | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGuid,
                    StartDate,
                    EndDate,
                    StatName,
                    StatId,
                    Confidence,
                    EventCount,
                    HostCount,
                    FirstSeen,
                    VulnSeverity,
                    VulnDescription,
                    ConnectorName
        )