id: 39844fcb-d451-4050-ae41-23c8f27b611c
Function:
  Title: Parser for BitSightFindingsSummary (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightFindingsSummary
FunctionAlias: BitSightFindingsSummary
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightFindingsSummary_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "FindingsSummary",
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    StartDate = column_ifexists('start_date', ''),
                    EndDate = column_ifexists('end_date', ''),
                    Stats = column_ifexists('stats', ''),
                    ConnectorName = column_ifexists('ConnectorName', '')
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGUID,
                    StartDate,
                    EndDate,
                    Stats,
                    ConnectorName
    ),
    (
        BitsightFindings_summary_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "FindingsSummary",
                    CompanyName = column_ifexists('Company', column_ifexists('company_name', '')),
                    CompanyGUID = '',
                    StartDate = column_ifexists('start_date', ''),
                    EndDate = column_ifexists('end_date', ''),
                    Stats = '',
                    ConnectorName = ''
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGUID,
                    StartDate,
                    EndDate,
                    Stats,
                    ConnectorName
    )