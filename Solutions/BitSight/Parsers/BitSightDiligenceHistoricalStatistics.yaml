id: a1d7d1c7-5677-4abe-a717-60cdf261e0c7
Function:
  Title: Parser for BitSightDiligenceHistoricalStatistics
  Version: '1.1.0'
  LastUpdated: '2026-05-25'
Category: Microsoft Sentinel Parser
FunctionName: BitSightDiligenceHistoricalStatistics
FunctionAlias: BitSightDiligenceHistoricalStatistics
FunctionQuery: |
    union isfuzzy=true
        (
            BitsightDiligence_historical_statistics_CL
            | extend
                    EventVendor = "BitSight",
                    EventProduct = "DiligenceHistoricalStatistics",
                    Count = column_ifexists('count', ''),
                    Category = column_ifexists('category', ''),
                    Date = column_ifexists('date', ''),
                    CompanyName = column_ifexists('company_name', '')
            | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    Count,
                    Category,
                    Date,
                    CompanyName
        ),
        (
            BitSightDiligenceHistoricalStatistics_CL
            | summarize arg_max(TimeGenerated, *) by CompanyGuid, RecordDate
            | mv-expand CountEntry = Counts
            | extend
                    EventVendor = "BitSight",
                    EventProduct = "DiligenceHistoricalStatistics",
                    Count = toint(CountEntry["count"]),
                    Category = tostring(CountEntry["category"])
            | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGuid,
                    RecordDate,
                    Grade,
                    Count,
                    Category,
                    ConnectorName
        )