id: a1d7d1c7-5677-4abe-a717-60cdf261e0c7
Function:
  Title: Parser for BitSightDiligenceHistoricalStatistics (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightDiligenceHistoricalStatistics
FunctionAlias: BitSightDiligenceHistoricalStatistics
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightDiligenceHistoricalStatistics_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "DiligenceHistoricalStatistics",
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    RecordDate = column_ifexists('record_date', ''),
                    Grade = column_ifexists('grade', ''),
                    Counts = column_ifexists('counts', ''),
                    ConnectorName = column_ifexists('ConnectorName', '')
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGUID,
                    RecordDate,
                    Grade,
                    Counts,
                    ConnectorName
    ),
    (
        BitsightDiligence_historical_statistics_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "DiligenceHistoricalStatistics",
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = '',
                    RecordDate = column_ifexists('date', ''),
                    Grade = '',
                    Counts = column_ifexists('count', ''),
                    ConnectorName = ''
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGUID,
                    RecordDate,
                    Grade,
                    Counts,
                    ConnectorName
    )