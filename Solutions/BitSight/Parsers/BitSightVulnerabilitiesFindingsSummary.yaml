id: 92983243-99cf-44c0-bf54-d66382825830
Function:
  Title: Parser for BitSightVulnerabilitiesFindingsSummary (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitsightVulnerabilitiesFindingsSummary
FunctionAlias: BitsightVulnerabilitiesFindingsSummary
FunctionQuery: |
    BitsightVulnerabilitiesFindingsSummary_CL
    | extend
                EventVendor = "BitSight",
                EventProduct = "VulnerabilitiesFindingsSummary",
                Name = column_ifexists('name', ''),
                DisplayName = column_ifexists('display_name', ''),
                Description = column_ifexists('description', ''),
                Severity = column_ifexists('severity', ''),
                ConnectorName = column_ifexists('ConnectorName', '')
    | project
                TimeGenerated,
                EventVendor,
                EventProduct,
                Name,
                DisplayName,
                Description,
                Severity,
                ConnectorName
