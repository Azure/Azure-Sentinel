Function:
  Title: Parser for BitSightVulnerabilitiesFindingsSummary
  Version: '1.0.0'
  LastUpdated: '2026-05-25'
Category: Microsoft Sentinel Parser
FunctionName: BitSightVulnerabilitiesFindingsSummary
FunctionAlias: BitSightVulnerabilitiesFindingsSummary
FunctionQuery: |
    BitsightVulnerabilitiesFindingsSummary_CL
    | summarize arg_max(TimeGenerated, *) by DisplayName
    | extend
            EventVendor = "BitSight",
            EventProduct = "VulnerabilitiesFindingsSummary"
    | project
            TimeGenerated,
            EventVendor,
            EventProduct,
            DisplayName,
            Severity,
            Description,
            ConnectorName