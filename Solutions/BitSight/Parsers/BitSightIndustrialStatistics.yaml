Function:
  Title: Parser for BitSightIndustrialStatistics (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightIndustrialStatistics
FunctionAlias: BitSightIndustrialStatistics
FunctionQuery: |
    union isfuzzy=true
    (
        BitsightIndustrialStatistics_CL
        | extend
                EventVendor = "BitSight",
                EventProduct = "IndustrialStatistics",
                CompanyName = column_ifexists('company_name', ''),
                CompanyGUID = column_ifexists('company_guid', ''),
                RiskVector = column_ifexists('risk_vector', ''),
                IncidentCount = column_ifexists('incident_count', ''),
                CountPeriod = column_ifexists('count_period', ''),
                AverageDurationDays = column_ifexists('average_duration_days', ''),
                IndustrySlug = column_ifexists('industry_slug', ''),
                IndustryName = column_ifexists('industry_name', ''),
                RiskVectorLabel = column_ifexists('risk_vector_label', ''),
                Peer50thPercentile = column_ifexists('peer_50th_percentile', ''),
                Peer75thPercentile = column_ifexists('peer_75th_percentile', ''),
                CompanyRating = column_ifexists('company_rating', ''),
                Grade = column_ifexists('grade', ''),
                ConnectorName = column_ifexists('ConnectorName', '')
        | project
                TimeGenerated,
                EventVendor,
                EventProduct,
                CompanyName,
                CompanyGUID,
                RiskVector,
                IncidentCount,
                CountPeriod,
                AverageDurationDays,
                IndustrySlug,
                IndustryName,
                RiskVectorLabel,
                Peer50thPercentile,
                Peer75thPercentile,
                CompanyRating,
                Grade,
                ConnectorName
    ),
    (
        BitsightIndustrial_statistics_CL
        | extend
                EventVendor = "BitSight",
                EventProduct = "IndustrialStatistics",
                CompanyName = column_ifexists('Company_name', ''),
                CompanyGUID = '',
                RiskVector = column_ifexists('risk_vector', ''),
                IncidentCount = column_ifexists('count', ''),
                CountPeriod = column_ifexists('count_period', ''),
                AverageDurationDays = column_ifexists('average_duration_days', ''),
                IndustrySlug = '',
                IndustryName = '',
                RiskVectorLabel = '',
                Peer50thPercentile = '',
                Peer75thPercentile = '',
                CompanyRating = '',
                Grade = '',
                ConnectorName = ''
        | project
                TimeGenerated,
                EventVendor,
                EventProduct,
                CompanyName,
                CompanyGUID,
                RiskVector,
                IncidentCount,
                CountPeriod,
                AverageDurationDays,
                IndustrySlug,
                IndustryName,
                RiskVectorLabel,
                Peer50thPercentile,
                Peer75thPercentile,
                CompanyRating,
                Grade,
                ConnectorName
    )