id: ce09d0fb-6816-496d-822e-198a56187a30
Function:
  Title: Parser for BitSightAlerts (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightAlerts
FunctionAlias: BitSightAlerts
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightAlerts_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "Alerts",
                    Id = column_ifexists('id', ''),
                    AlertType = column_ifexists('alert_type', ''),
                    AlertDate = column_ifexists('alert_date', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    Severity = column_ifexists('severity', ''),
                    AlertTrigger = column_ifexists('alert_trigger', ''),
                    Details = column_ifexists('details', ''),
                    RiskVectorRatingChange = column_ifexists('risk_vector_rating_change', ''),
                    RiskVector = column_ifexists('risk_vector', ''),
                    RiskCategory = column_ifexists('risk_category', ''),
                    Tags = column_ifexists('tags', ''),
                    ConnectorName = column_ifexists('ConnectorName', '')
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    Id,
                    AlertType,
                    AlertDate,
                    CompanyName,
                    CompanyGUID,
                    Severity,
                    AlertTrigger,
                    Details,
                    RiskVectorRatingChange,
                    RiskVector,
                    RiskCategory,
                    Tags,
                    ConnectorName
    ),
    (
        BitsightAlerts_data_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "Alerts",
                    Id = column_ifexists('guid', ''),
                    AlertType = column_ifexists('alert_type', ''),
                    AlertDate = column_ifexists('alert_date', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    Severity = column_ifexists('severity', ''),
                    AlertTrigger = column_ifexists('trigger', ''),
                    Details = column_ifexists('details', ''),
                    RiskVectorRatingChange = '',
                    RiskVector = column_ifexists('risk_vector', ''),
                    RiskCategory = column_ifexists('risk_category', ''),
                    Tags = column_ifexists('tags', ''),
                    ConnectorName = ''
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    Id,
                    AlertType,
                    AlertDate,
                    CompanyName,
                    CompanyGUID,
                    Severity,
                    AlertTrigger,
                    Details,
                    RiskVectorRatingChange,
                    RiskVector,
                    RiskCategory,
                    Tags,
                    ConnectorName
    )