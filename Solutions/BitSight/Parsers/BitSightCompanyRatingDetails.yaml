id: 64225cec-06ec-482d-8c03-3bdc1a61d2c2
Function:
  Title: Parser for BitSightCompanyRatingDetails (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightCompanyRatingDetails
FunctionAlias: BitSightCompanyRatingDetails
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightCompanyRatingDetails_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "CompanyRatingDetails",
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    RiskVectorSlug = column_ifexists('risk_vector_slug', ''),
                    RiskVectorLabel = column_ifexists('risk_vector_label', ''),
                    RiskCategory = column_ifexists('risk_category', ''),
                    Rating = column_ifexists('rating', ''),
                    Grade = column_ifexists('grade', ''),
                    Percentile = column_ifexists('percentile', ''),
                    GradeColor = column_ifexists('grade_color', ''),
                    DisplayURL = column_ifexists('display_url', ''),
                    Beta = column_ifexists('beta', ''),
                    ConnectorName = column_ifexists('ConnectorName', '')
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGUID,
                    RiskVectorSlug,
                    RiskVectorLabel,
                    RiskCategory,
                    Rating,
                    Grade,
                    Percentile,
                    GradeColor,
                    DisplayURL,
                    Beta,
                    ConnectorName
    ),
    (
        BitsightCompany_rating_details_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "CompanyRatingDetails",
                    CompanyName = column_ifexists('Company_name', column_ifexists('company_name', '')),
                    CompanyGUID = '',
                    RiskVectorSlug = '',
                    RiskVectorLabel = column_ifexists('name', ''),
                    RiskCategory = column_ifexists('category', ''),
                    Rating = column_ifexists('rating', ''),
                    Grade = column_ifexists('grade', ''),
                    Percentile = column_ifexists('percentile', ''),
                    GradeColor = column_ifexists('grade_color', ''),
                    DisplayURL = column_ifexists('display_url', ''),
                    Beta = column_ifexists('beta', ''),
                    ConnectorName = ''
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    CompanyName,
                    CompanyGUID,
                    RiskVectorSlug,
                    RiskVectorLabel,
                    RiskCategory,
                    Rating,
                    Grade,
                    Percentile,
                    GradeColor,
                    DisplayURL,
                    Beta,
                    ConnectorName
    )
