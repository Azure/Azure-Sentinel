id: fe9c10d4-eeab-4745-8b5d-e1fedd50b052
Function:
  Title: Parser for BitSightCompanyRatingDetails
  Version: '1.0.0'
  LastUpdated: '2026-05-25'
Category: Microsoft Sentinel Parser
FunctionName: BitSightCompanyRatingDetails
FunctionAlias: BitSightCompanyRatingDetails
FunctionQuery: |
    BitSightCompanyRatingDetails_CL
    | summarize arg_max(TimeGenerated, *) by CompanyGuid, RiskVectorLabel
    | extend
            EventVendor = "BitSight",
            EventProduct = "CompanyRatingDetails"
    | project
            TimeGenerated,
            EventVendor,
            EventProduct,
            CompanyName,
            CompanyGuid,
            RiskVectorSlug,
            RiskVectorLabel,
            RiskCategory,
            CategoryOrder,
            Rating,
            Grade,
            Percentile,
            GradeColor,
            RiskVectorOrder,
            DisplayUrl,
            Beta,
            ConnectorName