Function:
  Title: Parser for BitSightBreaches (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightBreaches
FunctionAlias: BitSightBreaches
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightBreaches_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "Breaches",
                    Id = column_ifexists('id', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    BreachDate = column_ifexists('breach_date', ''),
                    DateCreated = column_ifexists('date_created', ''),
                    Description = column_ifexists('description', ''),
                    PreviewURL = column_ifexists('preview_url', ''),
                    EventType = column_ifexists('event_type', ''),
                    EventTypeDescription = column_ifexists('event_type_description', ''),
                    Severity = column_ifexists('severity', ''),
                    BreachedCompanies = column_ifexists('breached_companies', ''),
                    DependentCompanies = column_ifexists('dependent_companies', ''),
                    ConnectorName = column_ifexists('ConnectorName', '')
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    Id,
                    CompanyGUID,
                    CompanyName,
                    BreachDate,
                    DateCreated,
                    Description,
                    PreviewURL,
                    EventType,
                    EventTypeDescription,
                    Severity,
                    BreachedCompanies,
                    DependentCompanies,
                    ConnectorName
    ),
    (
        BitsightBreaches_data_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "Breaches",
                    Id = column_ifexists('guid', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    BreachDate = column_ifexists('date', ''),
                    DateCreated = column_ifexists('date_created', ''),
                    Description = column_ifexists('text', ''),
                    PreviewURL = column_ifexists('preview_url', ''),
                    EventType = column_ifexists('event_type', ''),
                    EventTypeDescription = column_ifexists('event_type_description', ''),
                    Severity = column_ifexists('severity', ''),
                    BreachedCompanies = column_ifexists('breached_companies', ''),
                    DependentCompanies = column_ifexists('dependent_companies', ''),
                    ConnectorName = ''
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    Id,
                    CompanyGUID,
                    CompanyName,
                    BreachDate,
                    DateCreated,
                    Description,
                    PreviewURL,
                    EventType,
                    EventTypeDescription,
                    Severity,
                    BreachedCompanies,
                    DependentCompanies,
                    ConnectorName
    )