Function:
  Title: Parser for BitSightFindings (PascalCase)
  Version: '2.0.0'
  LastUpdated: '2026-05-19'
Category: Microsoft Sentinel Parser
FunctionName: BitSightFindings
FunctionAlias: BitSightFindings
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightFindings_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "Findings",
                    TemporaryId = column_ifexists('temporary_id', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    RiskCategory = column_ifexists('risk_category', ''),
                    RiskVector = column_ifexists('risk_vector', ''),
                    RiskVectorLabel = column_ifexists('risk_vector_label', ''),
                    SeverityCategory = column_ifexists('severity_category', ''),
                    Severity = column_ifexists('severity', ''),
                    FirstSeen = column_ifexists('first_seen', ''),
                    LastSeen = column_ifexists('last_seen', ''),
                    CurrentlyActive = column_ifexists('currently_active', ''),
                    AssetCategory = column_ifexists('asset_category', ''),
                    Assets = column_ifexists('assets', ''),
                    Details = column_ifexists('details', ''),
                    EvidenceKey = column_ifexists('evidence_key', ''),
                    AttributedCompanies = column_ifexists('attributed_companies', ''),
                    ConnectorName = column_ifexists('ConnectorName', '')
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    TemporaryId,
                    CompanyName,
                    CompanyGUID,
                    RiskCategory,
                    RiskVector,
                    RiskVectorLabel,
                    SeverityCategory,
                    Severity,
                    FirstSeen,
                    LastSeen,
                    CurrentlyActive,
                    AssetCategory,
                    Assets,
                    Details,
                    EvidenceKey,
                    AttributedCompanies,
                    ConnectorName
    ),
    (
        BitsightFindings_data_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "Findings",
                    TemporaryId = column_ifexists('temporary_id', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = '',
                    RiskCategory = column_ifexists('risk_category', ''),
                    RiskVector = column_ifexists('risk_vector', ''),
                    RiskVectorLabel = column_ifexists('risk_vector_label', ''),
                    SeverityCategory = column_ifexists('severity_category', ''),
                    Severity = column_ifexists('severity', ''),
                    FirstSeen = column_ifexists('first_seen', ''),
                    LastSeen = column_ifexists('last_seen', ''),
                    CurrentlyActive = '',
                    AssetCategory = '',
                    Assets = column_ifexists('assets', ''),
                    Details = column_ifexists('details', ''),
                    EvidenceKey = column_ifexists('evidence_key', ''),
                    AttributedCompanies = column_ifexists('attributed_companies', ''),
                    ConnectorName = ''
        | project
                    TimeGenerated,
                    EventVendor,
                    EventProduct,
                    TemporaryId,
                    CompanyName,
                    CompanyGUID,
                    RiskCategory,
                    RiskVector,
                    RiskVectorLabel,
                    SeverityCategory,
                    Severity,
                    FirstSeen,
