FunctionName: BitSightDiligenceStatistics
FunctionAlias: BitSightDiligenceStatistics
FunctionQuery: |
    union isfuzzy=true
    (
        BitSightDiligenceStatistics_CL
        | extend
                    EventVendor = "BitSight",
                    EventProduct = "DiligenceStatistics",
                    StatType = column_ifexists('stat_type', ''),
                    CompanyName = column_ifexists('company_name', ''),
                    CompanyGUID = column_ifexists('company_guid', ''),
                    RiskVector = column_ifexists('risk_vector', ''),
                    Unknown = column_ifexists('unknown', ''),
                    Bad = column_ifexists('bad', ''),
                    Warn = column_ifexists('warn', ''),
                    Neutral = column_ifexists('neutral', ''),
                    Fair = column_ifexists('fair', ''),
                    Good = column_ifexists('good', ''),
                    ObservationCount = column_ifexists('observation_count', ''),
                    CountPeriod = column_ifexists('count_period', ''),
                    AverageDurationDays = column_ifexists('average_duration_days', ''),
                    RiskVectorLabel = column_ifexists('risk_vector_label', ''),
                    Grade = column_ifexists('grade', ''),
                    Rating = column_ifexists('rating', ''),
                    Percentile = column_ifexists('percentile', ''),
                    Peer50thPercentile = column_ifexists('peer_50th_percentile', ''),
                    TotalFindings = column_ifexists('total_findings', ''),
                    FindingsIPs = column_ifexists('findings_ips', ''),
                    FindingsDomains = column_ifexists('findings_domains', ''),
                    TotalObservations = column_ifexists('total_observations', ''),
