                    EventVendor,
                    EventProduct,
                    StatType,
                    CompanyName,
                    CompanyGUID,
                    RiskVector,
                    Unknown,
                    Bad,
                    Warn,
                    Neutral,
                    Fair,
                    Good,
                    ObservationCount,
                    CountPeriod,
                    AverageDurationDays,
                    RiskVectorLabel,
                    Grade,
                    Rating,
                    Percentile,
                    Peer50thPercentile,
                    TotalFindings,
                    FindingsIPs,
                    FindingsDomains,
                    TotalObservations,
                    ObservationsIPs,
                    ObservationsDomains,
                    ConnectorName
    ),
