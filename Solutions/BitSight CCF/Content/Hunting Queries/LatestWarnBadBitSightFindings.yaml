id: 84754362-3771-4d1c-9064-dd257fe516e6
name: Latest WARN and BAD BitSight findings
description: |
  Returns the most recent WARN and BAD BitSight findings across all monitored companies.
requiredDataConnectors:
  - connectorId: bitsight-risk-findings-ccf
    dataTypes:
      - BitsightRiskFindings_CL
tactics:
  - Impact
relevantTechniques:
  - T1071
query: |
  BitsightRiskFindings_CL
  | where normalized_risk_state in ("warn", "bad")
  | summarize arg_max(TimeGenerated, *) by finding_uid
  | project TimeGenerated, company_name, risk_vector_label, normalized_risk_state, severity, severity_category, first_seen, last_seen, finding_uid
  | order by TimeGenerated desc
