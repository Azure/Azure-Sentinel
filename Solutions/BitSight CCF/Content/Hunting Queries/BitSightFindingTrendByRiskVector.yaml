id: f6a771f1-ffed-400d-93d4-3ecbff7812ca
name: BitSight finding trend by risk vector
description: |
  Trends WARN and BAD BitSight findings by risk vector over time.
requiredDataConnectors:
  - connectorId: bitsight-risk-findings-ccf
    dataTypes:
      - BitsightRiskFindings_CL
tactics:
  - Impact
query: |
  BitsightRiskFindings_CL
  | where normalized_risk_state in ("warn", "bad")
  | summarize Findings=count() by bin(TimeGenerated, 1d), risk_vector_label, normalized_risk_state
  | order by TimeGenerated asc
