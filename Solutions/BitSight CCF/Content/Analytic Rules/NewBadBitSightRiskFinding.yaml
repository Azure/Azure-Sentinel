id: ae39e871-98cb-43fb-837f-e2dca55289c1
name: New BAD BitSight risk findings observed
description: |
  Detects newly observed BAD BitSight risk findings for the monitored reduced-scope
  risk vectors. The rule looks for BAD findings ingested in the last hour that were
  not previously observed in the prior 14 days.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: bitsight-risk-findings-ccf
    dataTypes:
      - BitsightRiskFindings_CL
queryFrequency: 1h
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
suppressionDuration: 1h
suppressionEnabled: false
tactics:
  - Impact
  - CommandAndControl
relevantTechniques:
  - T1071
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 14d
    matchingMethod: Selected
    groupByEntities: []
    groupByAlertDetails:
      - DisplayName
    groupByCustomDetails:
      - CompanyName
version: 1.0.0
kind: Scheduled
query: |
  let DetectionWindow = 1h;
  let HistoricalWindow = 14d;
  let HistoricalFindings =
      BitsightRiskFindings_CL
      | where TimeGenerated between (ago(HistoricalWindow) .. ago(DetectionWindow))
      | summarize by finding_uid;
  BitsightRiskFindings_CL
  | where TimeGenerated >= ago(DetectionWindow)
  | summarize arg_max(TimeGenerated, *) by finding_uid
  | where normalized_risk_state == "bad"
  | join kind=leftanti HistoricalFindings on finding_uid
  | project
      TimeGenerated,
      CompanyName = company_name,
      CompanyGuid = company_guid,
      RiskVector = risk_vector,
      RiskVectorLabel = risk_vector_label,
      FindingUid = finding_uid,
      Severity = severity,
      SeverityCategory = severity_category,
      FirstSeen = first_seen,
      LastSeen = last_seen,
      Comments = comments
customDetails:
  CompanyName:
    - CompanyName
  CompanyGuid:
    - CompanyGuid
  RiskVector:
    - RiskVector
  FindingUid:
    - FindingUid
alertDetailsOverride:
  alertDisplayNameFormat: "New BAD BitSight finding - {{RiskVectorLabel}} - {{CompanyName}}"
  alertDescriptionFormat: "A new BAD BitSight finding was observed for {{CompanyName}} in risk vector {{RiskVectorLabel}}. Finding UID: {{FindingUid}}."
eventGroupingSettings:
  aggregationKind: SingleAlert
