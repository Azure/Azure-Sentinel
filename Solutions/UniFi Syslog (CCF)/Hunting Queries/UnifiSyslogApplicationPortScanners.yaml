id: 33c3e6f9-3030-4d43-9e3f-3c4d5e6f7a03
name: "UniFi: TI-flagged probes against application ports"
description: |
  Aggregates known-bad sources by application port being targeted (SSH, RDP, SMB, MSSQL, HTTP/S, Postgres, VNC, Plex, etc.). Reveals which of your services are getting the most scanner attention.
requiredDataConnectors:
  - connectorId: UnifiSyslogCCF
    dataTypes:
      - CommonSecurityLog
tactics:
  - InitialAccess
  - Reconnaissance
relevantTechniques:
  - T1190
  - T1595
query: |
  let app_ports = dynamic([
      22, 23, 80, 443, 445, 1433, 3306, 3389, 5432, 5900, 8080, 8443, 32400, 4005
  ]);
  CommonSecurityLog
  | where TimeGenerated > ago(24h)
  | where isnotempty(MaliciousIP)
  | where toint(DestinationPort) in (app_ports)
  | summarize Attempts = count(),
              Sources = make_set(SourceIP, 25),
              Country = make_set(MaliciousIPCountry, 5),
              Feeds = make_set(ThreatDescription, 5),
              SampleSource = take_any(SourceIP)
    by DestinationPort
  | order by Attempts desc
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SampleSource
version: 1.0.0
kind: HuntingQuery
