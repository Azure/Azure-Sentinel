output {
  microsoft-sentinel-log-analytics-logstash-output-plugin {
    client_id                => "${SENTINEL_CLIENT_APP_ID}"
    client_secret            => "${SENTINEL_CLIENT_APP_SECRET}"
    tenant_id                => "${SENTINEL_TENANT_ID}"
    data_collection_endpoint => "${SENTINEL_DCE_URL}"
    dcr_id                   => "${SENTINEL_DCR_IMMUTABLE_ID}"
    stream_name              => "${SENTINEL_DCR_STREAM_NAME}"
  }

  # Debug output — OFF by default. Set ENABLE_STDOUT_RUBYDEBUG=true in the
  # container's .env to dump every parsed event to `docker logs` for tuning.
  # Never leave enabled in production — floods container logs with 100+ MB/hr.
  if "${ENABLE_STDOUT_RUBYDEBUG:false}" == "true" {
    stdout { codec => rubydebug }
  }
}