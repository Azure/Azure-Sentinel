input {
  udp {
    port  => 514
    codec => plain { charset => "UTF-8" }
    type  => "syslog"
  }
  tcp {
    port  => 514
    codec => plain { charset => "UTF-8" }
    type  => "syslog"
  }
}

filter {
  # ===========================================================================
  # 0. SYSLOG HEADER PARSING
  #     UniFi emits a non-standard header with BOTH an RFC 3164 BSD timestamp
  #     AND an RFC 5424 ISO timestamp before the hostname, e.g.:
  #       <13>May 10 13:52:54 2026-05-10T13:52:54.785Z HostName CEF:0|...
  #     The bundled syslog input plugin can't handle this, so we use raw
  #     tcp/udp inputs and parse the header ourselves.
  # ===========================================================================
  grok {
    match => {
      "message" => [
        "^<%{POSINT:syslog_pri}>%{SYSLOGTIMESTAMP:syslog_bsd_ts} %{TIMESTAMP_ISO8601:syslog_iso_ts} %{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}",
        "^<%{POSINT:syslog_pri}>%{SYSLOGTIMESTAMP:syslog_bsd_ts} %{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}",
        "^<%{POSINT:syslog_pri}>%{TIMESTAMP_ISO8601:syslog_iso_ts} %{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}",
        "^<%{POSINT:syslog_pri}>%{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}",
        "^%{SYSLOGTIMESTAMP:syslog_bsd_ts} %{TIMESTAMP_ISO8601:syslog_iso_ts} %{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}",
        "^%{SYSLOGTIMESTAMP:syslog_bsd_ts} %{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}",
        "^%{SYSLOGHOST:syslog_host} %{GREEDYDATA:message}"
      ]
    }
    overwrite      => [ "message" ]
    tag_on_failure => [ "_syslog_header_parsefailure" ]
  }

  # Drop AP WiFi-kernel debug chatter that arrives without any syslog header
  # (raw printk-style output). Two observed variants:
  #   "{036b a620} [1060006.045265] addbarsp,(our)txba=64,(peer aa:bb:..)rxba=64"
  #   "{036b a620} \n"
  # These are 802.11 Block Ack negotiation messages from the AP's WiFi driver —
  # pure diagnostic noise, no SIEM value.
  if "_syslog_header_parsefailure" in [tags] and [message] =~ /^\{[0-9a-f]+ [0-9a-f]+\}/ {
    drop {}
  }

  # Prefer the precise ISO timestamp when present, else fall back to BSD.
  if [syslog_iso_ts] {
    date {
      match  => [ "syslog_iso_ts", "ISO8601" ]
      target => "@timestamp"
    }
  } else if [syslog_bsd_ts] {
    date {
      match  => [ "syslog_bsd_ts", "MMM  d HH:mm:ss", "MMM d HH:mm:ss" ]
      target => "@timestamp"
    }
  }

  # Decode syslog priority into facility/severity (replaces what the
  # syslog input plugin used to do for us).
  # RFC 5424 name lookups populate the string fields Facility/SyslogSeverity
  # that section 6 renames — without these the columns land as null and any
  # rule/hunt filtering on SyslogSeverity=~"critical" etc. never matches.
  if [syslog_pri] {
    ruby {
      code => "
        facility_names = %w[kern user mail daemon auth syslog lpr news uucp cron authpriv ftp ntp security console cron2 local0 local1 local2 local3 local4 local5 local6 local7]
        severity_names = %w[emergency alert critical error warning notice informational debug]
        pri = event.get('syslog_pri').to_i
        fac = pri / 8
        sev = pri % 8
        event.set('syslog_facility_code', fac)
        event.set('syslog_severity_code', sev)
        event.set('syslog_facility', facility_names[fac]) if fac >= 0 && fac < 24
        event.set('syslog_severity', severity_names[sev]) if sev >= 0 && sev < 8
      "
    }
  }

  # ===========================================================================
  # 0a. POST-HEADER NORMALISATION
  #     UniFi emits a few annoying message prefixes that confuse the simple
  #     "program: message" extraction in section 5:
  #       - The UDM duplicates its hostname:  "HostName [LAN_LAN-A-...] ..."
  #       - APs / switches prefix every line with the device tag:
  #           "aabbccddeeff,USW-Flex-2.5G-8-2.2.7.1026: hostapd[...]: ..."
  #     Strip both so downstream parsing sees just "[POLICY]..." or "program[pid]: ...".
  # ===========================================================================
  if [syslog_host] {
    ruby {
      code => "
        host = event.get('syslog_host')
        msg  = event.get('message')
        if host && msg && msg.start_with?(host + ' ')
          event.set('message', msg[(host.length + 1)..-1])
        end
      "
    }
  }

  if [message] =~ /^[a-f0-9]+,[A-Za-z][\w.+\-]+:\s+/ {
    grok {
      match => {
        "message" => "^%{NOTSPACE:UnifiDeviceTag}:\s+%{GREEDYDATA:message}"
      }
      overwrite      => [ "message" ]
      tag_on_failure => [ "_unifi_device_tag_strip_failure" ]
    }
  }

  # ===========================================================================
  # 1. CEF DETECTION + HEADER PARSING
  #     CEF format: CEF:Version|DeviceVendor|DeviceProduct|DeviceVersion|
  #                 DeviceEventClassID|Name|Severity|Extension
  # ===========================================================================
  if [message] =~ /CEF:\d+\|/ {
    grok {
      match => {
        "message" => "(?:.*?)CEF:%{NONNEGINT:CEFVersion}\|(?<DeviceVendor>[^|]*)\|(?<DeviceProduct>[^|]*)\|(?<DeviceVersion>[^|]*)\|(?<DeviceEventClassID>[^|]*)\|(?<Activity>[^|]*)\|(?<LogSeverity>[^|]*)\|(?<cef_extension>.*)"
      }
      tag_on_failure => [ "_cef_header_parsefailure" ]
    }

    # =========================================================================
    # 2. CEF EXTENSION PARSING (key=value pairs)
    #     UniFi puts unquoted spaces in the trailing msg= value, which breaks
    #     kv's space-based field_split. Extract msg=<rest-of-line> first, then
    #     hand the cleaned remainder to kv.
    # =========================================================================
    if [cef_extension] =~ / msg=/ {
      grok {
        match => {
          "cef_extension" => "^(?<cef_extension>.*?) msg=(?<cef_msg>.*)$"
        }
        overwrite      => [ "cef_extension" ]
        tag_on_failure => [ "_cef_msg_extract_failure" ]
      }
      # Strip surrounding double-quotes from the msg value if present
      # (e.g. msg="Kitchen has recorded motion." → Kitchen has recorded motion.)
      if [cef_msg] {
        mutate {
          gsub => [
            "cef_msg", "^\"", "",
            "cef_msg", "\"$", ""
          ]
        }
      }
    }

    if [cef_extension] {
      kv {
        source                 => "cef_extension"
        field_split            => " "
        value_split            => "="
        trim_value             => '"'
        target                 => "cef"
        allow_duplicate_values => false
      }
    }

    # =========================================================================
    # 3. MAP CEF EXTENSION FIELDS → CommonSecurityLog column names
    # =========================================================================
    if [cef][src]    { mutate { add_field => { "SourceIP"        => "%{[cef][src]}" } } }
    if [cef][spt]    { mutate { add_field => { "SourcePort"      => "%{[cef][spt]}" } } }
    if [cef][suser]  { mutate { add_field => { "SourceUserName"  => "%{[cef][suser]}" } } }
    if [cef][dst]    { mutate { add_field => { "DestinationIP"   => "%{[cef][dst]}" } } }
    if [cef][dpt]    { mutate { add_field => { "DestinationPort" => "%{[cef][dpt]}" } } }
    if [cef][duser]  { mutate { add_field => { "DestinationUserName" => "%{[cef][duser]}" } } }
    if [cef][proto]  { mutate { add_field => { "Protocol"        => "%{[cef][proto]}" } } }
    # DeviceAction: prefer CEF-standard act=, else fall back to UniFi-specific
    # eventType= (Protect uses this for motion / smartDetectZone / ring / etc.)
    if [cef][act] {
      mutate { add_field => { "DeviceAction" => "%{[cef][act]}" } }
    } else if [cef][eventType] {
      mutate { add_field => { "DeviceAction" => "%{[cef][eventType]}" } }
    }
    # DeviceEventCategory: use replace (not add_field) so we don't end up with
    # an array when multiple of cat/category/UNIFIcategory are populated.
    # Priority: cat > category > UNIFIcategory.
    if [cef][cat] {
      mutate { replace => { "DeviceEventCategory" => "%{[cef][cat]}" } }
    } else if [cef][category] {
      mutate { replace => { "DeviceEventCategory" => "%{[cef][category]}" } }
    }
    if [cef_msg]      { mutate { add_field => { "Message"         => "%{cef_msg}" } } }
    else if [cef][msg] { mutate { add_field => { "Message"         => "%{[cef][msg]}" } } }
    if [cef][rt]     { mutate { add_field => { "ReceiptTime"     => "%{[cef][rt]}" } } }
    if [cef][start]  { mutate { add_field => { "StartTime"       => "%{[cef][start]}" } } }
    if [cef][end]    { mutate { add_field => { "EndTime"         => "%{[cef][end]}" } } }
    if [cef][outcome] { mutate { add_field => { "Outcome"        => "%{[cef][outcome]}" } } }
    if [cef][cs1]    { mutate { add_field => { "DeviceCustomString1" => "%{[cef][cs1]}" } } }
    if [cef][cs2]    { mutate { add_field => { "DeviceCustomString2" => "%{[cef][cs2]}" } } }
    if [cef][cs3]    { mutate { add_field => { "DeviceCustomString3" => "%{[cef][cs3]}" } } }
    if [cef][cs4]    { mutate { add_field => { "DeviceCustomString4" => "%{[cef][cs4]}" } } }
    if [cef][cs5]    { mutate { add_field => { "DeviceCustomString5" => "%{[cef][cs5]}" } } }
    if [cef][cs6]    { mutate { add_field => { "DeviceCustomString6" => "%{[cef][cs6]}" } } }

    # UniFi-specific custom keys we've seen.
    # eventId is a UUID, which won't fit in CommonSecurityLog.ExternalID (int),
    # so park it in DeviceCustomString5 instead.
    # UNIFIcategory only fills DeviceEventCategory if cat/category weren't set
    # above — uses replace, not add_field, to avoid building an array.
    if ![DeviceEventCategory] and [cef][UNIFIcategory] {
      mutate { replace => { "DeviceEventCategory" => "%{[cef][UNIFIcategory]}" } }
    }
    # DeviceCustomString1 = eventType removed — DeviceAction now carries it.
    if [cef][eventId]       { mutate { add_field => { "DeviceCustomString5" => "%{[cef][eventId]}" } } }

    # UniFi Network client events (DeviceEventClassID 400-404: WiFi/Wired
    # Connect/Disconnect/Roam) carry rich client identity in UNIFIclient*
    # extensions and AP info in UNIFIconnectedToDevice*/UNIFIlastConnectedToDevice*
    # extensions. Map to standard CommonSecurityLog columns:
    #   client  → Source* fields (the actor)
    #   AP/dev  → Device* fields (the reporter / network device)
    #
    # UniFi naming quirk: 400 Connected uses UNIFIconnectedTo*, 401 Disconnected
    # uses UNIFIlastConnectedTo*. Try current first, fall back to "last".
    if [cef][UNIFIclientMac]      { mutate { add_field => { "SourceMACAddress"  => "%{[cef][UNIFIclientMac]}" } } }
    if [cef][UNIFIclientIp]       { mutate { add_field => { "SourceIP"          => "%{[cef][UNIFIclientIp]}" } } }
    if [cef][UNIFIclientHostname] {
      mutate { add_field => { "SourceHostName" => "%{[cef][UNIFIclientHostname]}" } }
    } else if [cef][UNIFIclientAlias] {
      mutate { add_field => { "SourceHostName" => "%{[cef][UNIFIclientAlias]}" } }
    }
    if [cef][UNIFIconnectedToDeviceMac] {
      mutate { add_field => { "DeviceMacAddress" => "%{[cef][UNIFIconnectedToDeviceMac]}" } }
    } else if [cef][UNIFIlastConnectedToDeviceMac] {
      mutate { add_field => { "DeviceMacAddress" => "%{[cef][UNIFIlastConnectedToDeviceMac]}" } }
    }
    if [cef][UNIFIconnectedToDeviceIp] {
      mutate { add_field => { "DeviceAddress" => "%{[cef][UNIFIconnectedToDeviceIp]}" } }
    } else if [cef][UNIFIlastConnectedToDeviceIp] {
      mutate { add_field => { "DeviceAddress" => "%{[cef][UNIFIlastConnectedToDeviceIp]}" } }
    }
    if [cef][UNIFIconnectedToDeviceName] {
      mutate { add_field => { "DeviceName" => "%{[cef][UNIFIconnectedToDeviceName]}" } }
    } else if [cef][UNIFIlastConnectedToDeviceName] {
      mutate { add_field => { "DeviceName" => "%{[cef][UNIFIlastConnectedToDeviceName]}" } }
    }
    # DCS1-4 carry security-relevant context (not RF telemetry — band/channel/
    # RSSI stay in AdditionalExtensions where ad-hoc queries can still reach
    # them). These fields apply to both WiFi (400-402) and wired (403-404)
    # client events; for wired the UNIFIauthMethod is absent which is correct.
    #   DCS1 = auth method (wpapsk / wpa2enterprise / open) — auth security signal
    #   DCS2 = network/segment name (e.g. "Clients" / "Guest" / "IoT")
    #   DCS3 = VLAN ID
    #   DCS4 = network subnet CIDR
    if [cef][UNIFIauthMethod]    { mutate { add_field => { "DeviceCustomString1" => "%{[cef][UNIFIauthMethod]}" } } }
    if [cef][UNIFInetworkName]   { mutate { add_field => { "DeviceCustomString2" => "%{[cef][UNIFInetworkName]}" } } }
    if [cef][UNIFInetworkVlan]   { mutate { add_field => { "DeviceCustomString3" => "%{[cef][UNIFInetworkVlan]}" } } }
    if [cef][UNIFInetworkSubnet] { mutate { add_field => { "DeviceCustomString4" => "%{[cef][UNIFInetworkSubnet]}" } } }

    # UniFi Protect events don't carry the camera name in a CEF extension —
    # it only appears as free text inside msg=. Extract it into DeviceName
    # so the camera is queryable as a structured field.
    #
    # Patterns observed:
    #   "<camera> has recorded motion."             — 2159 motion (confirmed)
    # Patterns inferred (verify against real samples when captured):
    #   "<camera> detected <person|vehicle|...>"    — 2161 smartDetectZone
    #   "Doorbell pressed at <camera>"              — 2163 ring
    if [DeviceProduct] == "UniFi Protect" and [Message] and ![DeviceName] {
      grok {
        match => {
          "Message" => [
            "^(?<protect_camera>.+?) has recorded motion\.$",
            "^(?<protect_camera>.+?) detected (?:a |an )?(?:person|vehicle|animal|package|face|license_plate)",
            "^Doorbell pressed at (?<protect_camera>.+?)\.?$"
          ]
        }
        tag_on_failure => []
      }
      if [protect_camera] {
        mutate {
          add_field    => { "DeviceName" => "%{protect_camera}" }
          remove_field => [ "protect_camera" ]
        }
      }
    }

    mutate {
      add_field => { "EventFormat" => "cef" }
      add_tag   => [ "cef" ]
    }
  }

  # ===========================================================================
  # 3a. UniFi ZONE-BASED FIREWALL (synthetic CEF → CommonSecurityLog)
  #     Format: [ZONE_ZONE-X-NNNNN] DESCR="rule name" IN=... OUT=... [MAC=...]
  #             SRC=ip DST=ip ... PROTO=tcp SPT=port DPT=port ...
  #     Where X is the action: A=Allow, D=Drop, R=Reject.
  #     Parsed into two steps: first extract the policy bracket + DESCR, then
  #     the network-flow fields. Avoids a monolithic regex that's hard to debug.
  # ===========================================================================
  if "cef" not in [tags] and [message] =~ /^\[[\w_]+-[A-Z]-\d+\]/ {
    grok {
      match => {
        "message" => [
          "^\[%{NOTSPACE:UnifiPolicyId}\] DESCR=\"%{DATA:UnifiPolicyDescr}\" %{GREEDYDATA:fw_rest}"
        ]
      }
      tag_on_failure => [ "_grokparsefailure_unifi_firewall_header" ]
    }

    if [fw_rest] {
      # Use kv to parse the iptables-style "KEY=VAL KEY=VAL ..." body. This
      # extracts every field independently — no fragile chained grok with
      # optional non-greedy matches that previously dropped SPT/DPT.
      kv {
        source           => "fw_rest"
        field_split      => " "
        value_split      => "="
        target           => "fw_kv"
        allow_duplicate_values => false
      }

      if [fw_kv][SRC]   { mutate { add_field => { "SourceIP"        => "%{[fw_kv][SRC]}" } } }
      if [fw_kv][DST]   { mutate { add_field => { "DestinationIP"   => "%{[fw_kv][DST]}" } } }
      if [fw_kv][PROTO] { mutate { add_field => { "Protocol"        => "%{[fw_kv][PROTO]}" } } }
      # Ports sent as strings. The DCR stream declares them as string and the
      # transformKql casts to int via toint() before writing to CommonSecurityLog.
      # This avoids a quirk where the v2 Logstash plugin's int serialization
      # didn't reliably populate Azure's int-typed columns.
      if [fw_kv][SPT]   { mutate { add_field => { "SourcePort"      => "%{[fw_kv][SPT]}" } } }
      if [fw_kv][DPT]   { mutate { add_field => { "DestinationPort" => "%{[fw_kv][DPT]}" } } }
      # IN / OUT / MAC need separate parsing because kv has a known quirk:
      # when a value is empty (e.g. "OUT= MAC=...") kv swallows the next field
      # as the empty field's value. WAN_LOCAL events always have empty OUT, so
      # kv silently misses MAC. Use a dedicated grok that explicitly handles
      # empty OUT and captures MAC in the same pass.
      grok {
        match => {
          "fw_rest" => [
            "^IN=(?<fw_iface_in>\S*) OUT=(?<fw_iface_out>\S*)(?: MAC=(?<fw_mac>[0-9a-f:]+))?"
          ]
        }
        tag_on_failure => [ "_grokparsefailure_unifi_firewall_iface" ]
      }
    }

    # Split policy ID into zones / action / number (e.g. "LAN_LAN-A-10006").
    # Use raw regex captures — NUMBER's negative lookbehind rejects the
    # preceding `-` and would make the whole pattern fail.
    if [UnifiPolicyId] {
      grok {
        match => {
          "UnifiPolicyId" => [
            "^(?<UnifiPolicyZones>.+)-(?<UnifiPolicyActionCode>[A-Z])-(?<UnifiPolicyNumber>\d+)$"
          ]
        }
        tag_on_failure => [ "_grokparsefailure_unifi_policy_id" ]
      }

      # LogSeverity scale (CEF 0-10) → DCR transform maps to OriginalLogSeverity:
      #   1-3 = Low, 4-6 = Medium, 7-8 = High, 9-10 = Very-High
      if [UnifiPolicyActionCode] == "A" {
        mutate { add_field => { "DeviceAction" => "ALLOW"  "LogSeverity" => "2" } }
      } else if [UnifiPolicyActionCode] == "D" {
        mutate { add_field => { "DeviceAction" => "DROP"   "LogSeverity" => "5" } }
      } else if [UnifiPolicyActionCode] == "R" {
        mutate { add_field => { "DeviceAction" => "REJECT" "LogSeverity" => "5" } }
      }

      mutate {
        add_field => {
          "DeviceVendor"        => "Ubiquiti"
          "DeviceProduct"       => "UniFi Network"
          "DeviceEventCategory" => "Firewall"
          # DeviceEventClassID = zone direction only (e.g. "LAN_LAN", "WAN_LOCAL").
          # The action (Allow/Drop/Reject) is already in DeviceAction — duplicating
          # it in the class ID just inflates cardinality. Query pattern:
          #   `where DeviceEventClassID == "LAN_LAN" and DeviceAction == "DROP"`
          "DeviceEventClassID"  => "%{UnifiPolicyZones}"
          # Policy ID (per-environment) preserved in DCS6 for forensic lookup.
          "DeviceCustomString6" => "%{UnifiPolicyNumber}"
          # Activity holds the policy description (human-readable rule name).
          # Message stays unset for firewall events — Activity already covers it
          # and CommonSecurityLog charges per-GB ingested, so don't duplicate.
          "Activity"            => "%{UnifiPolicyDescr}"
          "EventFormat"         => "cef"
        }
        add_tag => [ "cef", "unifi_firewall" ]
      }

      # Interfaces — proper CEF columns. WAN_LOCAL events have empty OUT
      # (packet terminates at the UDM itself) — leave OUT unset rather than
      # writing a sentinel value.
      if [fw_iface_in]  { mutate { add_field => { "DeviceInboundInterface"  => "%{fw_iface_in}" } } }
      if [fw_iface_out] { mutate { add_field => { "DeviceOutboundInterface" => "%{fw_iface_out}" } } }

      # iptables MAC chain for an Ethernet interface is exactly 14 bytes:
      #   dst_mac (6) : src_mac (6) : ethertype (2)
      # For non-Ethernet interfaces (PPP/pppX), iptables instead fills MAC with
      # the IPv4 packet header bytes (~22 bytes) — that's NOT a MAC chain and
      # extracting it would produce garbage. Only split when len == 14.
      if [fw_mac] {
        ruby {
          code => "
            mac = event.get('fw_mac')
            parts = mac.to_s.split(':')
            if parts.length == 14
              event.set('DestinationMACAddress', parts[0..5].join(':'))
              event.set('SourceMACAddress',      parts[6..11].join(':'))
            end
          "
        }
      }

    }
  }

  # ===========================================================================
  # 4. NON-CEF JSON FALLBACK (Suricata IDS native format)
  # ===========================================================================
  if "cef" not in [tags] and [message] =~ /^\s*\{.*\}\s*$/ {
    json {
      source               => "message"
      target               => "rawJson"
      skip_on_invalid_json => true
    }
    if [rawJson] {
      mutate { add_field => { "EventFormat" => "json" } }
      if [rawJson][src_ip]    { mutate { add_field => { "SourceIP"        => "%{[rawJson][src_ip]}" } } }
      if [rawJson][src_port]  { mutate { add_field => { "SourcePort"      => "%{[rawJson][src_port]}" } } }
      if [rawJson][dest_ip]   { mutate { add_field => { "DestinationIP"   => "%{[rawJson][dest_ip]}" } } }
      if [rawJson][dest_port] { mutate { add_field => { "DestinationPort" => "%{[rawJson][dest_port]}" } } }
      if [rawJson][proto]     { mutate { add_field => { "Protocol"        => "%{[rawJson][proto]}" } } }
      if [rawJson][alert][signature] { mutate { add_field => { "Activity" => "%{[rawJson][alert][signature]}" } } }
      if [rawJson][alert][category]  { mutate { add_field => { "DeviceEventCategory" => "%{[rawJson][alert][category]}" } } }
      if [rawJson][alert][severity]  { mutate { add_field => { "LogSeverity" => "%{[rawJson][alert][severity]}" } } }
    }
  }

  # ===========================================================================
  # 5. PLAIN-TEXT FALLBACK (kernel firewall, sshd, dnsmasq, vpn)
  # ===========================================================================
  if "cef" not in [tags] and ![rawJson] {

    # Extract program name from "program[pid]: rest" or "program: rest"
    grok {
      match => {
        "message" => [
          "^%{PROG:program}(?:\[%{POSINT:pid}\])?: %{GREEDYDATA:message}"
        ]
      }
      overwrite      => [ "message" ]
      tag_on_failure => [ "_program_parsefailure" ]
    }

    # Kernel firewall (iptables)
    if [program] == "kernel" and [message] =~ /SRC=.*DST=/ {
      grok {
        match => {
          "message" => [
            "%{GREEDYDATA:firewall_label}IN=%{DATA:fw_iface_in}.*?(?:MAC=%{DATA:fw_mac} )?SRC=%{IP:SourceIP} DST=%{IP:DestinationIP}(?:.*?PROTO=%{WORD:Protocol})?(?:.*?SPT=%{INT:SourcePort:int})?(?:.*?DPT=%{INT:DestinationPort:int})?"
          ]
        }
        tag_on_failure => [ "_grokparsefailure_firewall" ]
      }
      mutate { add_field => { "DeviceEventCategory" => "Firewall" } }
      if [firewall_label] =~ /(?i)(DROP|REJECT|BLOCK)/ {
        mutate { add_field => { "DeviceAction" => "DROP"  "LogSeverity" => "5" } }
      } else if [firewall_label] =~ /(?i)(ALLOW|ACCEPT|PASS)/ {
        mutate { add_field => { "DeviceAction" => "ALLOW" "LogSeverity" => "2" } }
      }
    }

    # sudo — privilege escalation (high-value security signal)
    if [program] == "sudo" {
      grok {
        match => {
          "message" => "^%{USER:SourceUserName}\s*:\s*(?:%{DATA:sudo_session}\s*;\s*)?PWD=%{DATA:sudo_pwd}\s*;\s*USER=%{USER:DestinationUserName}\s*;\s*COMMAND=%{GREEDYDATA:sudo_command}"
        }
        tag_on_failure => [ "_grokparsefailure_sudo" ]
      }
      # GREEDYDATA captures up to and including the trailing newline from the
      # raw syslog line — strip it before it lands in Message.
      if [sudo_command] { mutate { strip => [ "sudo_command" ] } }

      # Note: We deliberately do NOT drop unifi-protect or other system-service
      # sudo events — they have forensic value during incident response (proving
      # process lifecycle at time T). They'll all flow into CommonSecurityLog
      # but you can filter them out in analytics rules with:
      #   | where SourceUserName !in ("unifi-protect", "unifi-network", ...)

      # Demote unifi-protect health-check sudo events (kill -0/-TERM/-KILL on
      # its own children) to Unifi_Syslog_CL. They fire every few seconds and
      # otherwise dominate CommonSecurityLog ingestion with no security value.
      # Real sudo events (anything else from any user) still get CEF-promoted.
      if [SourceUserName] == "unifi-protect" and [sudo_command] =~ /^\/bin\/kill\s+-(0|TERM|KILL|HUP)\s/ {
        mutate { add_tag => [ "sudo_healthcheck_noise" ] }
      }

      if [SourceUserName] and [sudo_command] and "sudo_healthcheck_noise" not in [tags] {
        # DeviceProduct reflects the originating UniFi service running sudo —
        # the user account running sudo on the UDM is the service identity.
        # Falls back to "UniFi OS" for ad-hoc admin sudo (e.g. interactive root).
        if [SourceUserName] == "unifi-protect" {
          mutate { add_field => { "DeviceProduct" => "UniFi Protect" } }
        } else if [SourceUserName] in [ "unifi", "unifi-network" ] {
          mutate { add_field => { "DeviceProduct" => "UniFi Network" } }
        } else if [SourceUserName] in [ "ubios-udapi", "ubios" ] {
          mutate { add_field => { "DeviceProduct" => "UniFi Gateway" } }
        } else {
          mutate { add_field => { "DeviceProduct" => "UniFi OS" } }
        }
        mutate {
          add_field => {
            "DeviceVendor"        => "Ubiquiti"
            "DeviceEventClassID"  => "sudo_command"
            "Activity"            => "Privilege Escalation"
            "DeviceAction"        => "EXECUTE"
            "LogSeverity"         => "5"
            "DeviceEventCategory" => "Admin Activity"
            "Message"             => "%{sudo_command}"
            "DeviceCustomString1" => "%{sudo_pwd}"
            "EventFormat"         => "cef"
          }
          add_tag => [ "cef", "unifi_sudo" ]
        }
      }
    }

    # dnsmasq DHCP transactions — identity / asset tracking
    # Format: DHCPACK(brXX) 192.0.2.10 aa:bb:cc:dd:ee:ff hostname
    #         DHCPREQUEST(brXX) 192.0.2.10 aa:bb:cc:dd:ee:ff
    #         DHCPNAK(brXX) 192.0.2.10 aa:bb:cc:dd:ee:ff ...
    if [program] == "dnsmasq-dhcp" and [message] =~ /^DHCP(?:ACK|REQUEST|NAK|DECLINE|RELEASE|OFFER|DISCOVER)\(/ {
      grok {
        match => {
          "message" => "^DHCP(?<dhcp_op>ACK|REQUEST|NAK|DECLINE|RELEASE|OFFER|DISCOVER)\(%{NOTSPACE:dhcp_iface}\)\s+%{IP:SourceIP}\s+(?<dhcp_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})(?:\s+(?<dhcp_hostname>\S.*))?"
        }
        tag_on_failure => [ "_grokparsefailure_dnsmasq_dhcp" ]
      }
      if [dhcp_op] {
        # NAK/DECLINE are anomalous (denial / address conflict); rest is routine.
        if [dhcp_op] in [ "NAK", "DECLINE" ] {
          mutate { add_field => { "LogSeverity" => "5" } }
        } else {
          mutate { add_field => { "LogSeverity" => "2" } }
        }
        mutate {
          add_field => {
            "DeviceVendor"           => "Ubiquiti"
            "DeviceProduct"          => "UniFi Gateway"
            "DeviceEventClassID"     => "dhcp_%{dhcp_op}"
            "Activity"               => "DHCP %{dhcp_op}"
            "DeviceAction"           => "%{dhcp_op}"
            "DeviceEventCategory"    => "Identity"
            # Message intentionally NOT set — its content (op + iface + IP + MAC)
            # is already covered by DeviceAction, DeviceInboundInterface,
            # SourceIP and SourceMACAddress. Don't duplicate ingested data.
            "DeviceInboundInterface" => "%{dhcp_iface}"
            "SourceMACAddress"       => "%{dhcp_mac}"
            "ApplicationProtocol"    => "DHCP"
            "DestinationServiceName" => "DHCP"
            "Protocol"               => "UDP"
            "EventFormat"            => "cef"
          }
          add_tag => [ "cef", "unifi_dhcp" ]
        }
        # DHCP transactions: client (UDP/68) → server (UDP/67) for REQUEST/DISCOVER/DECLINE/RELEASE,
        # server (UDP/67) → client (UDP/68) for ACK/NAK/OFFER. Set ports accordingly.
        if [dhcp_op] in [ "REQUEST", "DISCOVER", "DECLINE", "RELEASE" ] {
          mutate { add_field => { "SourcePort" => "68" "DestinationPort" => "67" } }
        } else if [dhcp_op] in [ "ACK", "NAK", "OFFER" ] {
          mutate { add_field => { "SourcePort" => "67" "DestinationPort" => "68" } }
        }
        if [dhcp_hostname] {
          # Trim trailing whitespace/newlines that the greedy capture leaves behind.
          mutate { strip => [ "dhcp_hostname" ] }
          mutate { add_field => { "SourceHostName" => "%{dhcp_hostname}" } }
        }
      }
    }

    # AP kernel wireless events — WiFi client tracking
    # Format (DHCP-SM):    [DHCP-SM] aa:bb:cc:dd:ee:ff: <state machine details>
    # Format (keep-alive): [<timestamp>] [keep-alive]: aa:bb:cc:dd:ee:ff silent for 60-sec, ...
    # Format (deauth/disassoc):
    #   [<timestamp>] rai1:[send deauth] TA:[aa:bb:..], RA:[cc:dd:..] machdr_seq=0, reason:8, protection=0
    #   TA = transmitter (usually AP), RA = receiver (usually client being kicked)
    if [program] == "kernel" and [message] =~ /\[DHCP-SM\]|\[keep-alive\]|disassoc|deauth/ {
      # Step 1: DHCP-SM / keep-alive — single MAC into SourceMACAddress
      if [message] =~ /\[DHCP-SM\]|\[keep-alive\]/ {
        grok {
          match => {
            "message" => [
              "\[DHCP-SM\]\s+(?<wifi_sta_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})",
              "\[keep-alive\]:\s+(?<wifi_sta_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})"
            ]
          }
          tag_on_failure => [ "_grokparsefailure_wifi_event" ]
        }
        if [message] =~ /\[DHCP-SM\]/ {
          mutate { add_field => { "wifi_class" => "wifi_dhcp_sm"   "wifi_activity" => "WiFi DHCP State" } }
        } else {
          mutate { add_field => { "wifi_class" => "wifi_keepalive" "wifi_activity" => "WiFi Keep-Alive" } }
        }
      }
      # Step 2: deauth / disassoc — capture TA, RA, and reason
      else if [message] =~ /disassoc|deauth/ {
        grok {
          match => {
            "message" => [
              "TA:\[(?<wifi_ta_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})\],?\s*RA:\[(?<wifi_ra_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})\].*?reason:(?<wifi_reason>\d+)",
              "TA:\[(?<wifi_ta_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})\],?\s*RA:\[(?<wifi_ra_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})\]",
              "(?<wifi_sta_mac>(?:[0-9a-f]{2}:){5}[0-9a-f]{2})"
            ]
          }
          tag_on_failure => [ "_grokparsefailure_wifi_event" ]
        }
        if [message] =~ /disassoc/ {
          mutate { add_field => { "wifi_class" => "wifi_disassoc" "wifi_activity" => "WiFi Disassociation" } }
        } else {
          mutate { add_field => { "wifi_class" => "wifi_deauth"   "wifi_activity" => "WiFi Deauthentication" } }
        }
      }

      if [wifi_class] {
        # Deauth/disassoc can signal client-kick attacks at volume; routine
        # state-machine and keep-alive events are pure RF telemetry.
        if [wifi_class] in [ "wifi_deauth", "wifi_disassoc" ] {
          mutate { add_field => { "LogSeverity" => "4" } }
        } else {
          mutate { add_field => { "LogSeverity" => "2" } }
        }
        mutate {
          add_field => {
            "DeviceVendor"        => "Ubiquiti"
            "DeviceProduct"       => "UniFi WiFi"
            "DeviceEventClassID"  => "%{wifi_class}"
            "Activity"            => "%{wifi_activity}"
            "DeviceEventCategory" => "Wireless"
            "EventFormat"         => "cef"
          }
          add_tag => [ "cef", "unifi_wifi" ]
        }
        # MAC mapping varies by event type:
        #   - keep-alive / DHCP-SM: single STA MAC → SourceMACAddress (the client)
        #   - deauth/disassoc with TA+RA: TA → SourceMACAddress (sender, usually AP),
        #     RA → DestinationMACAddress (receiver, usually client being kicked)
        if [wifi_sta_mac] {
          mutate { add_field => { "SourceMACAddress" => "%{wifi_sta_mac}" } }
        }
        if [wifi_ta_mac] {
          mutate { add_field => { "SourceMACAddress" => "%{wifi_ta_mac}" } }
        }
        if [wifi_ra_mac] {
          mutate { add_field => { "DestinationMACAddress" => "%{wifi_ra_mac}" } }
        }
        if [wifi_reason] {
          mutate { add_field => { "DeviceCustomString1" => "reason=%{wifi_reason}" } }
        }
      }
    }

    # ubios-udapi-server gateway signal-out events
    # Format: signal-out: EVT_GW_DhcpExcludedIp signal triggered for net_Foo_... [192.0.2.50, 02:42:0a:00:32:0f]
    if [program] == "ubios-udapi-server" and [message] =~ /^signal-out:/ {
      grok {
        match => {
          "message" => "^signal-out:\s+(?<ubios_event>EVT_\w+)\s+signal triggered(?:\s+for\s+(?<ubios_target>\S+))?(?:.*?\[(?<ubios_ip>[0-9.]+)(?:,\s*(?<ubios_mac>[0-9a-f:]+))?\])?"
        }
        tag_on_failure => [ "_grokparsefailure_ubios_signal" ]
      }
      if [ubios_event] {
        mutate {
          add_field => {
            "DeviceVendor"        => "Ubiquiti"
            "DeviceProduct"       => "UniFi Gateway"
            "DeviceEventClassID"  => "%{ubios_event}"
            # Activity = class ID minus EVT_GW_ prefix (stripped in next mutate).
            # Set here, then gsub'd separately — Logstash mutate executes gsub
            # BEFORE add_field within a single block, so they must be split.
            "Activity"            => "%{ubios_event}"
            "DeviceAction"        => "SIGNAL"
            "DeviceEventCategory" => "Network"
            "LogSeverity"         => "2"
            "EventFormat"         => "cef"
          }
          add_tag => [ "cef", "unifi_gateway_event" ]
        }
        mutate { gsub => [ "Activity", "^EVT_GW_", "" ] }
        if [ubios_ip]     { mutate { add_field => { "SourceIP"            => "%{ubios_ip}" } } }
        if [ubios_mac]    { mutate { add_field => { "SourceMACAddress"    => "%{ubios_mac}" } } }
        if [ubios_target] { mutate { add_field => { "DeviceCustomString1" => "%{ubios_target}" } } }
      }
    }

    # UniFi Switch — TRAPMGR link state events (physical layer security signal).
    # Format: "TRAPMGR: Link Down: 0/18" / "TRAPMGR: Link Up: 0/18"
    # Indicates cable unplug/plug, hardware fault, or port flap — all worth
    # promoting from Unifi_Syslog_CL to CommonSecurityLog.
    if [program] == "switch" and [message] =~ /^TRAPMGR:\s+Link\s+(Up|Down):/ {
      grok {
        match => {
          "message" => "^TRAPMGR:\s+Link\s+(?<switch_link_state>Up|Down):\s+(?<switch_port>\S+)"
        }
        tag_on_failure => [ "_grokparsefailure_switch_trapmgr" ]
      }
      if [switch_link_state] {
        if [switch_link_state] == "Down" {
          mutate {
            add_field => {
              "DeviceEventClassID" => "switch_link_down"
              "Activity"           => "Switch Port Link Down"
              "DeviceAction"       => "LINK_DOWN"
              "LogSeverity"        => "5"
            }
          }
        } else {
          mutate {
            add_field => {
              "DeviceEventClassID" => "switch_link_up"
              "Activity"           => "Switch Port Link Up"
              "DeviceAction"       => "LINK_UP"
              "LogSeverity"        => "2"
            }
          }
        }
        mutate {
          add_field => {
            "DeviceVendor"           => "Ubiquiti"
            "DeviceProduct"          => "UniFi Switch"
            "DeviceEventCategory"    => "Hardware"
            "DeviceInboundInterface" => "%{switch_port}"
            "EventFormat"            => "cef"
          }
          add_tag => [ "cef", "unifi_switch" ]
        }
      }
    }

    # SSH auth — promote to CommonSecurityLog (synthetic CEF). High-value
    # security signal. Other sshd noise events (Connection closed, etc.) fall
    # through to Unifi_Syslog_CL when the grok doesn't match.
    if [program] == "sshd" {
      grok {
        match => {
          "message" => [
            # Successful login
            "Accepted (?:password|publickey|keyboard-interactive)(?:/pam)? for %{USER:SourceUserName} from %{IP:SourceIP} port %{INT:SourcePort:int}",
            # Failed login (standard form)
            "Failed (?:password|publickey|keyboard-interactive)(?:/pam)? for (?:invalid user )?%{USER:SourceUserName} from %{IP:SourceIP} port %{INT:SourcePort:int}",
            # PAM-level failure — emitted alongside or instead of the standard Failed line.
            # No port in this format.
            "error: PAM: (?:Authentication failure|User not known to the underlying authentication module) for (?:illegal user |invalid user )?%{USER:SourceUserName} from %{IP:SourceIP}",
            # Pre-auth probe for non-existent user
            "Invalid user %{USER:SourceUserName} from %{IP:SourceIP} port %{INT:SourcePort:int}"
          ]
        }
        tag_on_failure => [ "_grokparsefailure_sshd" ]
      }
      if [SourceUserName] {
        if [message] =~ /^Accepted/ {
          mutate {
            add_field => {
              "DeviceAction"       => "AUTH_SUCCESS"
              "Activity"           => "SSH Login Success"
              "DeviceEventClassID" => "sshd_auth_success"
              "LogSeverity"        => "5"
            }
          }
        } else if [message] =~ /^(?:Failed|error: PAM:|Invalid user )/ {
          mutate {
            add_field => {
              "DeviceAction"       => "AUTH_FAIL"
              "Activity"           => "SSH Login Failure"
              "DeviceEventClassID" => "sshd_auth_fail"
              "LogSeverity"        => "7"
            }
          }
        }
        mutate {
          add_field => {
            "DeviceVendor"        => "Ubiquiti"
            "DeviceProduct"       => "UniFi OS"
            "DeviceEventCategory" => "Admin Activity"
            "ApplicationProtocol" => "SSH"
            "EventFormat"         => "cef"
          }
          add_tag => [ "cef", "unifi_sshd" ]
        }
      }
    }

  }

  # ===========================================================================
  # 6. NORMALIZE COMMON FIELDS
  #     For non-CEF, non-firewall events, copy lowercase `message` into the
  #     projected `Message` column. CEF and synthetic-CEF events deliberately
  #     leave Message empty (or set it to specific values like sudo's command);
  #     do NOT overwrite or fill them with the raw line — that would waste
  #     hundreds of bytes per event on data already in other columns.
  # ===========================================================================
  if ![Message] and [message] and "cef" not in [tags] {
    mutate { copy => { "message" => "Message" } }
  }

  # ---------------------------------------------------------------------------
  # Facility/SyslogSeverity fallback for events that arrived WITHOUT a syslog
  # PRI header (raw CEF sent by the UDM cloud-key API direct to UDP/TCP 514
  # never goes through section 0's ruby PRI decode). Without this fallback ~1%
  # of events land with null Facility/SyslogSeverity in the workspace.
  #   - CEF events: derive Facility=daemon (UniFi Network daemon is the origin)
  #     and map SyslogSeverity from CEF LogSeverity (0-10 range per CEF spec).
  #   - Anything else: default to "unknown" so downstream queries don't blow
  #     up on nulls.
  # ---------------------------------------------------------------------------
  if ![syslog_facility] {
    if [EventFormat] == "cef" {
      ruby {
        code => "
          sev = event.get('LogSeverity').to_i
          event.set('syslog_facility', 'daemon')
          sev_name = case sev
                     when 0..3  then 'informational'
                     when 4..5  then 'notice'
                     when 6     then 'warning'
                     when 7..8  then 'error'
                     when 9..10 then 'critical'
                     else            'informational'
                     end
          event.set('syslog_severity', sev_name)
        "
      }
    } else {
      mutate {
        add_field => {
          "syslog_facility" => "unknown"
          "syslog_severity" => "unknown"
        }
      }
    }
  }

  mutate {
    rename => {
      "syslog_host"     => "Computer"
      "syslog_facility" => "Facility"
      "syslog_severity" => "SyslogSeverity"
      "program"         => "ProcessName"
    }
    add_field => { "EventTime" => "%{@timestamp}" }
  }

  # Ports stay as strings — the DCR transform casts them to int via toint().
  # (SourcePort and DestinationPort no longer converted here.)
  # LogSeverity stays a string — the DCR stream declares it string and the
  # transform passes it through via tostring(). Same workaround as ports for
  # the v2 plugin's int-column quirk.

  # ===========================================================================
  # 6a. GEO / ASN ENRICHMENT (public source IPs only)
  #     Skips silently if MaxMind databases aren't present (license key not
  #     set at build time). Only enriches public IPs — private / loopback /
  #     link-local addresses get no geo lookup.
  #
  #     DCS3 = source country code (e.g. "FR", "US")
  #     DCS4 = source ASN organization (e.g. "OVH SAS")
  #     DeviceCustomNumber1 = source ASN number
  #
  #     For events with internal source (LAN_LAN firewall, WiFi client connects,
  #     etc.), DCS3/DCS4 stay as whatever the parser set (VLAN / subnet).
  # ===========================================================================
  if [SourceIP] {
    ruby {
      code => '
        require "ipaddr"
        begin
          ip = IPAddr.new(event.get("SourceIP"))
          skip = ip.private? || ip.loopback? || ip.link_local? ||
                 (ip.ipv4? && (ip.to_i & 0xF0000000) == 0xE0000000)
          event.set("[@metadata][skip_geo]", skip)
        rescue
          event.set("[@metadata][skip_geo]", true)
        end
      '
    }
    if ![@metadata][skip_geo] {
      # logstash-filter-geoip v7+ requires field names as MaxMind-constant
      # form (uppercase) for input. Output keys land in lowercase legacy form
      # when ecs_compatibility is disabled (which we set in logstash.yml).
      geoip {
        source         => "SourceIP"
        database       => "/etc/logstash/geoip/GeoLite2-City.mmdb"
        target         => "[@metadata][geo]"
        fields         => [ "COUNTRY_CODE2", "COUNTRY_NAME", "CITY_NAME", "LATITUDE", "LONGITUDE" ]
        tag_on_failure => [ "_geoip_city_lookup_failure" ]
      }
      geoip {
        source         => "SourceIP"
        database       => "/etc/logstash/geoip/GeoLite2-ASN.mmdb"
        target         => "[@metadata][asn]"
        fields         => [ "AUTONOMOUS_SYSTEM_NUMBER", "AUTONOMOUS_SYSTEM_ORGANIZATION" ]
        tag_on_failure => [ "_geoip_asn_lookup_failure" ]
      }
      if [@metadata][geo][country_code2] {
        mutate { add_field => { "DeviceCustomString3" => "%{[@metadata][geo][country_code2]}" } }
      }
      if [@metadata][asn][as_org] {
        mutate { add_field => { "DeviceCustomString4" => "%{[@metadata][asn][as_org]}" } }
      }
      if [@metadata][asn][asn] {
        mutate { add_field => { "DeviceCustomNumber1" => "%{[@metadata][asn][asn]}" } }
      }

      # =======================================================================
      # 6b. THREAT INTELLIGENCE — match public source IPs against blocklists.
      #     Feeds refreshed by /usr/local/bin/refresh-ti-feeds.sh; Logstash
      #     auto-reloads them every refresh_interval seconds (no restart).
      #
      #     Results land in native CommonSecurityLog TI columns:
      #       MaliciousIP         = SourceIP that matched
      #       ThreatSeverity      = 1-10 (Spamhaus=8, FireHOL=7, Tor=3)
      #       IndicatorThreatType = "Malicious Host" or "Anonymization"
      #       ThreatDescription   = comma-joined list of matching feed names
      #       ThreatConfidence    = "High" (all our feeds are reputable)
      #       ReportReferenceLink = URL to the highest-priority matching feed
      #       MaliciousIPCountry  = country code from geoip
      #       MaliciousIPLatitude / MaliciousIPLongitude = from geoip
      # =======================================================================
      cidr {
        address          => [ "%{SourceIP}" ]
        network_path     => "/etc/logstash/ti/firehol_l1.txt"
        refresh_interval => 3600
        add_field        => {
          "[@metadata][ti]" => "firehol_l1"
          "[@metadata][ti_severity]" => "7"
          "[@metadata][ti_type]" => "Malicious Host"
          "[@metadata][ti_link]" => "https://iplists.firehol.org/"
        }
      }
      cidr {
        address          => [ "%{SourceIP}" ]
        network_path     => "/etc/logstash/ti/spamhaus_drop.txt"
        refresh_interval => 3600
        add_field        => {
          "[@metadata][ti]" => "spamhaus_drop"
          "[@metadata][ti_severity]" => "8"
          "[@metadata][ti_type]" => "Malicious Host"
          "[@metadata][ti_link]" => "https://www.spamhaus.org/drop/"
        }
      }
      translate {
        source           => "SourceIP"
        target           => "[@metadata][ti_tor]"
        dictionary_path  => "/etc/logstash/ti/tor_exits.yaml"
        fallback         => ""
        refresh_interval => 3600
      }
      if [@metadata][ti_tor] and [@metadata][ti_tor] != "" {
        mutate {
          add_field => {
            "[@metadata][ti]" => "tor_exit"
            "[@metadata][ti_severity]" => "3"
            "[@metadata][ti_type]" => "Anonymization"
            "[@metadata][ti_link]" => "https://check.torproject.org/"
          }
        }
      }
      if [@metadata][ti] {
        # Coalesce multi-feed matches into native CSL TI columns.
        # ti_severity and ti_type may be arrays if multiple feeds matched;
        # take the max severity and de-dup types via join + uniq logic.
        mutate {
          # ti_type is handled in the ruby block below (dedup before join).
          join => { "[@metadata][ti]" => ", " }
        }
        # ThreatSeverity must be a single int — take the highest from any array
        # (spamhaus(8) > firehol(7) > tor(3)).
        # ti_type deduped before join so we don't get "Malicious Host, Malicious Host"
        # when multiple feeds share the same threat category.
        ruby {
          code => '
            sev = event.get("[@metadata][ti_severity]")
            sev = [sev].flatten.map(&:to_i).max.to_s if sev
            event.set("[@metadata][ti_severity]", sev)

            link = event.get("[@metadata][ti_link]")
            link = [link].flatten.first if link
            event.set("[@metadata][ti_link]", link)

            types = event.get("[@metadata][ti_type]")
            types = [types].flatten.compact.uniq.join(", ") if types
            event.set("[@metadata][ti_type]", types)
          '
        }
        mutate {
          add_field => {
            "MaliciousIP"         => "%{SourceIP}"
            "ThreatSeverity"      => "%{[@metadata][ti_severity]}"
            "IndicatorThreatType" => "%{[@metadata][ti_type]}"
            "ThreatDescription"   => "%{[@metadata][ti]}"
            "ThreatConfidence"    => "High"
            "ReportReferenceLink" => "%{[@metadata][ti_link]}"
          }
          add_tag => [ "ti_match" ]
        }
        # Geo coords + country into MaliciousIP* columns when geoip resolved.
        if [@metadata][geo][country_code2] {
          mutate { add_field => { "MaliciousIPCountry" => "%{[@metadata][geo][country_code2]}" } }
        }
        if [@metadata][geo][latitude] {
          mutate { add_field => { "MaliciousIPLatitude" => "%{[@metadata][geo][latitude]}" } }
        }
        if [@metadata][geo][longitude] {
          mutate { add_field => { "MaliciousIPLongitude" => "%{[@metadata][geo][longitude]}" } }
        }
      }
    }
  }

  # ===========================================================================
  # 7. CLEANUP
  # ===========================================================================
  mutate {
    remove_field => [
      "@version",
      "syslog_pri",
      "syslog_bsd_ts",
      "syslog_iso_ts",
