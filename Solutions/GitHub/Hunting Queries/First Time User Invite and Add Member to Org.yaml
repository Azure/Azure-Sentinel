id: f0d30d3c-e6ad-480a-90e8-1bd7cc84881b
name: GitHub First Time Invite Member and Add Member to Repo
description: 'Identifies GitHub users who perform an org or repository member-add/invite action in the current query period
  but had no such actions during the preceding LearningPeriod. Actions evaluated: org.invite_member, org.update_member, org.add_member,
  repo.add_member, team.add_member. Defaults: LearningPeriod=7d, queryFrequency=1h, queryPeriod=1h. '
severity: Medium
status: Available
requiredDataConnectors: []
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
- Persistence
relevantTechniques:
- T1136
query: |
  let starttime = todatetime('{{StartTimeISO}}');
  let endtime = todatetime('{{EndTimeISO}}');
  let LearningPeriod = 7d;
  let EndLearningTime = starttime - LearningPeriod;
  let GitHubOrgMemberLogs = (
      GitHubAuditData
      | where Action in ("org.invite_member","org.update_member","org.add_member","repo.add_member","team.add_member")
  );
  GitHubOrgMemberLogs
  | where TimeGenerated between (EndLearningTime..starttime)
  | distinct Actor
  | join kind=rightanti (
      GitHubOrgMemberLogs
      | where TimeGenerated between (starttime..endtime)
      | project Actor, Action, TimeGenerated
      | distinct Actor, Action, TimeGenerated
  ) on Actor
  | project Actor, Action, TimeGenerated
entityMappings:
- entityType: account
  columnName: Actor
alertDetailsOverride:
  alertDisplayNameFormat: GitHub - First-time member add/invite by {{Actor}}
  alertDescriptionFormat: Actor {{Actor}} performed '{{Action}}' at {{TimeGenerated}} and was not observed in the previous
    7d.
customDetails:
  Action: Action
  TimeGenerated: TimeGenerated
version: 1.0.1
