id: b7e4f210-3c9a-4d8e-a1f5-6c0b2e8d4f37
Function:
  Title: Parser for GitHubScanAudit (unified webhook events)
  Version: '1.0.0'
  LastUpdated: '2026-04-01'
Category: Microsoft Sentinel Parser
FunctionName: githubscanaudit
FunctionAlias: githubscanaudit
FunctionQuery: |
    // Union alias that combines the legacy CLv1 table (githubscanaudit_CL) with the
    // new CLv2 table (GitHubAdvancedSecurityAlerts_CL) introduced in the GitHub Webhook V2 connector.
    // Both tables share identical column names (with _s / _d / _b suffixes) so downstream
    // parsers (GitHubCodeScanningData, GitHubDependabotData, GitHubSecretScanningData),
    // workbooks, analytic rules, and hunting queries continue to work unchanged.
    //
    // If only one table exists the union is still valid thanks to isfuzzy=true.
    let githubscanaudit_CL_view = view () {
        githubscanaudit_CL
        | project-rename
            action_s          = action_s,
            alert_s           = alert_s,
            repository_s      = repository_s,
            organization_s    = organization_s,
            sender_s          = sender_s,
            commits_s         = commits_s,
            commit_oid_s      = commit_oid_s,
            ref_s             = ref_s,
            ref_type_s        = ref_type_s,
            rule_s            = rule_s,
            comment_s         = comment_s,
            deployment_s      = deployment_s,
            deployment_status_s = deployment_status_s,
            discussion_s      = discussion_s,
            check_run_s       = check_run_s,
            key_s             = key_s,
            changes_s         = changes_s,
            master_branch_s   = master_branch_s,
            pusher_type_s     = pusher_type_s,
            description_s     = description_s,
            event_s           = event_s,
            number_d          = number_d,
            forced_b          = forced_b
    };
    let GitHubAdvancedSecurityAlerts_CL_view = view () {
        GitHubAdvancedSecurityAlerts_CL
        | project-rename
            action_s          = action_s,
            alert_s           = alert_s,
            repository_s      = repository_s,
            organization_s    = organization_s,
            sender_s          = sender_s,
            commits_s         = commits_s,
            commit_oid_s      = commit_oid_s,
            ref_s             = ref_s,
            ref_type_s        = ref_type_s,
            rule_s            = rule_s,
            comment_s         = comment_s,
            deployment_s      = deployment_s,
            deployment_status_s = deployment_status_s,
            discussion_s      = discussion_s,
            check_run_s       = check_run_s,
            key_s             = key_s,
            changes_s         = changes_s,
            master_branch_s   = master_branch_s,
            pusher_type_s     = pusher_type_s,
            description_s     = description_s,
            event_s           = event_s,
            number_d          = number_d,
            forced_b          = forced_b
    };
    union isfuzzy=true (githubscanaudit_CL_view), (GitHubAdvancedSecurityAlerts_CL_view)
