id: 0b85a077-8ba5-4cb5-90f7-1e882afe10c7
name: GitHub - pull request was created
description: Detect activities when a pull request was created. This query runs every day (queryFrequency=1d) and looks back
  7 days (queryPeriod=7d). The rule triggers an alert for each GitHubAuditData event where Action == 'pull_request.create', Severity is Medium.
severity: Medium
status: Available
requiredDataConnectors: []
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
- T1078.004
query: |-
  GitHubAuditData
  | where Action == "pull_request.create"
  | project TimeGenerated, Actor, Action
  | extend AccountName = tostring(split(Actor, "@")[0]), AccountUPNSuffix = tostring(split(Actor, "@")[1])
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: AccountName
  - identifier: UPNSuffix
    columnName: AccountUPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: GitHub pull request created by {{AccountName}}
  alertDescriptionFormat: 'A pull request was created by {{AccountName}} (Actor: {{Actor}}) on {{TimeGenerated}}. Action:
    {{Action}}'
customDetails:
  Action: Action
  TimeGenerated: TimeGenerated
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.2
kind: Scheduled