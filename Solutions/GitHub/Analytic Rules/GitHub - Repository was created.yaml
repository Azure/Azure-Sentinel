id: 0b85a077-8ba5-4cb5-90f7-1e882afe10c2
name: GitHub - Repository was created
description: 'Detect activities when a repository was created. This query runs every day and its severity is Medium.'
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GitHub
  dataTypes:
    GitHubAuditData: Enabled
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
- T1078.004
query: |-
  GitHubAuditData
  | where Action == "repo.create"
  | extend AccountName = tostring(split(Actor, "@")[0]), AccountUPNSuffix = tostring(split(Actor, "@")[1])
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: AccountName
  - identifier: UPNSuffix
    columnName: AccountUPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: GitHub repository created by {{Actor}}
  alertDescriptionFormat: 'Repository creation detected. Actor: {{Actor}}; AccountName: {{AccountName}}; Action: {{Action}}'
customDetails:
  AccountUPNSuffix: AccountUPNSuffix
  Action: Action
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.2
kind: Scheduled
