id: 0b85a077-8ba5-4cb5-90f7-1e882afe40c9
name: (Preview) GitHub - User was invited to the repository
description: 'Detect activities when a user was invited to the repository. This query runs every day and its severity is Medium., queryFrequency=1d, queryPeriod=7d.'
severity: Medium
status: Available
requiredDataConnectors: []
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
- T1078.004
query: |-
  GitHubAuditData
  | where Action == "org.invite_member"
  | extend Name = iif(Actor has "@", split(Actor, "@")[0], Actor)
  | extend UPNSuffix = iif(Actor has "@", split(Actor, "@")[1], "")
  | project Actor, Action, Name, UPNSuffix, TimeGenerated
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: Name
  - identifier: UPNSuffix
    columnName: UPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: 'GitHub invite detected: {{Actor}}'
  alertDescriptionFormat: 'Action: {{Action}}; Invited: {{Actor}}; Time: {{TimeGenerated}}'
customDetails:
  Action: Action
  TimeGenerated: TimeGenerated
eventGroupingSettings:
  aggregationKind: AlertPerResult
incidentConfiguration: {}
sentinelEntitiesMappings: []
version: 1.0.2
kind: Scheduled
