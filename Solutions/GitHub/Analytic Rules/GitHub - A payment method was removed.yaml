id: 6bb50582-caac-4a9b-9afb-3fee766ebbf7
name: GitHub - A payment method was removed
description: 'Detect activities when a payment method was removed. This query runs every day and its severity is Medium.'
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GitHub
  dataTypes:
  - GitHubAuditData
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
- T1078.004
query: |-
  GitHubAuditData
  | where Action == "payment_method.remove"
  | extend AccountName = tostring(split(Actor, "@")[0]), AccountUPNSuffix = tostring(split(Actor, "@")[1])
  | project TimeGenerated = CreatedAt, Actor, AccountName, AccountUPNSuffix, Action, Repo, Target
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: AccountName
  - identifier: UPNSuffix
    columnName: AccountUPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: 'GitHub: payment method removed by {{Actor}} on {{Repo}}'
  alertDescriptionFormat: Action '{{Action}}' performed by '{{Actor}}' on '{{Repo}}'
customDetails:
  TimeGenerated: TimeGenerated
  Action: Action
  Repo: Repo
  Target: Target
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.1
kind: Scheduled