id: 0b85a077-8ba5-4cb5-90f7-1e882afe10c8
name:  GitHub - User was blocked
description: 'Detects when a user was blocked in the GitHub organization (Action = org.block_user). The detection runs daily
  (queryFrequency=1d) over a 7d lookback and raises a Medium severity alert.'
severity: Medium
status: Available
requiredDataConnectors: []
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
- T1078.004
query: |
  GitHubAuditData
  | where Action == "org.block_user"
  | extend Name = iif(Actor contains_cs "@", split(Actor, "@")[0], Actor)
  | extend UPNSuffix = iif(Actor contains_cs "@", split(Actor, "@")[1], "")
  | project EventTime = TimeGenerated, Actor, Action, Name, UPNSuffix
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: Name
  - identifier: UPNSuffix
    columnName: UPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: 'GitHub user blocked: {{Name}}'
  alertDescriptionFormat: 'Actor: {{Actor}} | Action: {{Action}} | Time: {{EventTime}}'
customDetails:
  EventTime: EventTime
  Action: Action
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.2
kind: Scheduled
