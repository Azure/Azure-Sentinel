id: 0b85a077-8ba5-4cb5-90f7-1e882afe20c9
name: GitHub - User visibility Was changed
description: Detect activities when a GitHub user visibility value changed (Visibility != PreviousVisibility). Runs every
  day (queryFrequency=1d) and looks back 7 days (queryPeriod=7d). 
  Default severity=Medium. This description reflects the query logic and configured defaults.
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GitHub
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
- T1078.004
query: |-
  GitHubAuditData
  | where Visibility != PreviousVisibility
  | project TimeGenerated,Actor, PreviousVisibility, Visibility
  | extend Name = iif(Actor contains "@", split(Actor, "@")[0], Actor)
  | extend UPNSuffix = iif(Actor contains "@", split(Actor, "@")[1], "")
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: Name
  - identifier: UPNSuffix
    columnName: UPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: 'GitHub user visibility changed: {{Actor}}'
  alertDescriptionFormat: User '{{Actor}}' visibility changed from '{{PreviousVisibility}}' to '{{Visibility}}'. Investigate
    account access and repository exposure.
customDetails:
  PreviousVisibility: PreviousVisibility
  Visibility: Visibility
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.2
kind: Scheduled
