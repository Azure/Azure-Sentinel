id: 0b85a077-8ba5-4cb5-90f7-1e882afe10c6
name: GitHub - pull request was merged
description: 'Detect activities when a pull request was merged. This query runs every day and its severity is Medium.Query frequency: 1d. Query period: 7d.'
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GitHub
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
relevantTechniques:
- T1078
query: |-
  GitHubAuditData
  | where Action == "pull_request.merge"
  | project TimeGenerated,Actor, Action
  | extend AccountName = tostring(split(Actor, "@")[0]), AccountUPNSuffix = tostring(split(Actor, "@")[1])
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: AccountName
  - identifier: UPNSuffix
    columnName: AccountUPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: GitHub pull request merged by {{AccountName}}
  alertDescriptionFormat: 'Pull request merge action ''{{Action}}'' by actor ''{{Actor}}'' (UPN suffix: {{AccountUPNSuffix}})
    detected in GitHub audit logs.'
customDetails:
  Action: Action
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.2
kind: Scheduled
