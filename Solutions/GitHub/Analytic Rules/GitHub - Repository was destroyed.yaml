id: 0b85a077-8ba5-4cb5-90f7-1e882afe10c3
name: GitHub - Repository was destroyed
description: 'Detects GitHub audit events where a repository was destroyed (Action == "repo.destroy") from the GitHubAuditData
  table. The rule runs every 1 day and looks back 7 days. Ensure the GitHub connector (AuditLogs) is enabled in Microsoft
  Sentinel before enabling this rule. Severity: Medium.'
severity: Medium
status: Available
requiredDataConnectors:
- connectorId: GitHub
  dataTypes:
  - AuditLogs
queryFrequency: 1d
queryPeriod: 7d
triggerOperator: gt
triggerThreshold: 0
tactics:
- InitialAccess
- Impact
relevantTechniques:
- T1078
- T1485
query: |-
  GitHubAuditData
  | where Action == "repo.destroy"
  | extend AccountName = tostring(split(Actor, "@")[0]), AccountUPNSuffix = tostring(split(Actor, "@")[1])
  | project TimeGenerated, Actor, AccountName, AccountUPNSuffix, Action
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: FullName
    columnName: Actor
  - identifier: Name
    columnName: AccountName
  - identifier: UPNSuffix
    columnName: AccountUPNSuffix
alertDetailsOverride:
  alertDisplayNameFormat: GitHub repository destroyed by {{AccountName}}
  alertDescriptionFormat: 'GitHub repo destroy event: Action={{Action}} Time={{TimeGenerated}} Actor={{Actor}}'
customDetails:
  Action: Action
  TimeGenerated: TimeGenerated
eventGroupingSettings:
  aggregationKind: AlertPerResult
version: 1.0.1
kind: Scheduled
