id: ce9a795c-92eb-4b7c-9924-d48107188869
name: SailPointIdentityNowEventType_CCF
description: |
  'Created to detect failed events of particular type from SailPointIDN_EventsV2.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: SailPointIdentityNowConnector
    dataTypes:
      - SailPointIDN_EventsV2_CL
queryFrequency: 1d
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1133
query: |
  declare query_parameters(lbperiod:timespan = 14d, type:string = "ACCESS_ITEM");
  SailPointIDN_EventsV2_CL
  | where TimeGenerated > ago(lbperiod)
  | where EventType == type
  | where Status == "FAILED"
  | sort by Created
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: TechnicalName
version: 1.0.0
kind: Scheduled
