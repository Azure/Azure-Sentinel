id: 83779a45-020c-49c0-b5a7-58b2c49bb4d5
name: SailPointIdentityNowEventTypeTechnicalName_CCF
description: |
  'Created to detect new threat events from the data in SailPointIDN_EventsV2.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: SailPointIdentityNowConnector
    dataTypes:
      - SailPointIDN_EventsV2_CL
queryFrequency: 1d
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1133
query: |
  declare query_parameters(lbperiod:timespan = 14d, technicalName:string = "ENTITLEMENT_ADD_FAILED", type:string = 'ACCESS_ITEM');
    SailPointIDN_EventsV2_CL
    | where TimeGenerated > ago(lbperiod)
    | where EventType == type
    | where TechnicalName == technicalName
    | where Status == "FAILED"
    | sort by Created
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: TechnicalName
version: 1.0.0
kind: Scheduled
