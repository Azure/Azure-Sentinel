id: 7776650f-ddd8-4b0b-8df3-e433060d6090
name: SailPointIdentityNowUserWithFailedEvent_CCF
description: |
  'Detects any failed event for a particular user.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: SailPointIdentityNowConnector
    dataTypes:
      - SailPointIDN_EventsV2_CL
queryFrequency: 1d
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1133
query: |
  declare query_parameters(lbperiod:timespan = 14d, type:string = "ACCESS_ITEM", actorName:string = "test.tester", targetName:string = "test.tester");
    SailPointIDN_EventsV2_CL
    | where TimeGenerated > ago(lbperiod)
    | where EventType == type
    | where Status == "FAILED"
    | where ActorName == actorName
    | where TargetName == targetName
    | sort by Created
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: TechnicalName
version: 1.0.0
kind: Scheduled
