id: 5c8aabdf-8836-4ec4-921c-905535268630
name: SailPointIdentityNowAlertForTriggers_CCF
description: |
  'Create alerts for SailPoint IdentityNow Event Trigger Service.'
severity: Informational
status: Available
requiredDataConnectors:
  - connectorId: SailPointIdentityNowConnector
    dataTypes:
      - SailPointIDN_EventsV2_CL
queryFrequency: 1d
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
  - Collection
relevantTechniques:
  - T1133
  - T1005
query: |
  declare query_parameters(lbperiod:timespan = 14d, triggerId:string = "idn:aggregation-accounts-collected");
    SailPointIDN_EventsV2_CL
    | where TimeGenerated > ago(lbperiod)
    | where Action == triggerId
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: Action
version: 1.0.0
kind: Scheduled
