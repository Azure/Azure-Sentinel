id: 4fd1b5b1-d923-42ff-9609-55942a133395
name: SailPointIdentityNowFailedEventsBasedOnTime_CCF
description: |
  'Detects failed events based on created time.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: SailPointIdentityNowConnector
    dataTypes:
      - SailPointIDN_EventsV2_CL
queryFrequency: 1d
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1133
query: |
  declare query_parameters(lbperiod:timespan = 14d, createdTime:string = "2020-08-19T20:34:38.676Z");
    SailPointIDN_EventsV2_CL
    | where TimeGenerated > ago(lbperiod)
    | where Status == "FAILED"
    | where Created >= Created
    | sort by Created
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: TechnicalName
version: 1.0.0
kind: Scheduled
