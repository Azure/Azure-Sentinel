id: 1ddb0980-a1cf-4622-ab53-9a554c231ff7
name: SailPointIdentityNowFailedEvents_CCF
description: |
  'Detects all events with status failed.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: SailPointIdentityNowConnector
    dataTypes:
      - SailPointIDN_EventsV2_CL
queryFrequency: 1d
queryPeriod: 14d
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1133
query: |
  declare query_parameters(lbperiod:timespan = 14d);
    SailPointIDN_EventsV2_CL
    | where TimeGenerated > ago(lbperiod) and Status == "FAILED"
    | project TechnicalName, Operation, EventType
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: TechnicalName
version: 1.0.0
kind: Scheduled
