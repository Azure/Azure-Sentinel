id: 1f5d3d5b-3b7b-4c31-9f8d-2e9b7c8c1c2a
Function:
  Title: Parser for Field Effect MDR AROs
  Version: '1.0.0'
  LastUpdated: '2026-02-15'
Category: Microsoft Sentinel Parser
FunctionName: FieldEffect
FunctionAlias: FieldEffect
FunctionQuery: |
  FieldEffectAROAlerts_CL
  | extend
      AlertDisplayName = tostring(Title),
      AlertDescription = tostring(DetailsMarkdown),
      AlertProduct = "Field Effect MDR",
      AlertVendor = "Field Effect",
      AlertSchemaVersion = "0.1",
      AlertType = tostring(AROType),
      AlertSeverity = case(
        Severity =~ "High", "High",
        Severity =~ "Medium", "Medium",
        Severity =~ "Low", "Low",
        Severity =~ "Informational", "Informational",
        "Informational"
      ),
      ConfidenceLevel = case(
        Severity =~ "High", "High",
        Severity =~ "Medium", "Medium",
        Severity =~ "Low", "Low",
        Severity =~ "Informational", "Informational",
        "Informational"
      ),
      AROId = tostring(ID),
      PortalUrl = tostring(PortalUrl),
      Host = tostring(Hostname),
      IPAddress = tostring(IPAddress),
      UserName = tostring(LastUser),
      EventStartTime = TimeGenerated
  | project
      TimeGenerated,
      EventStartTime,
      AlertDisplayName,
      AlertDescription,
      AlertProduct,
      AlertVendor,
      AlertSchemaVersion,
      AlertType,
      AlertSeverity,
      ConfidenceLevel,
      AROId,
      PortalUrl,
      Host,
      IPAddress,
      UserName,
      Severity,
      AROType,
      Title,
      Hostname,
      LastUser,
      DetailsMarkdown,
      DetailsRaw
