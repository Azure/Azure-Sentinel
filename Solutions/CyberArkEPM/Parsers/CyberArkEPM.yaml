id: 40a61269-9d21-41ac-b5ae-d741e4a4ecde
Function:
  Title: Parser for CyberArkEPM
  Version: '1.1.0'
  LastUpdated: '2025-05-01'
Category: Microsoft Sentinel Parser
FunctionName: CyberArkEPM
FunctionAlias: CyberArkEPM
FunctionQuery: |
    CyberArkEPM_Events_CL
    | extend EventVendor = 'CyberArk',
             EventProduct = 'Endpoint Privilege Manager',
             EventSchemaVersion = '0.2',
             EventCount = TotalEvents
    | project-rename EventSubType = CyberArkEventType,
                     ThreatProtectionAction = PolicyAction,
                     EventEndTime = LastEventDate,
                     EventStartTime = FirstEventDate,
                     ActorUsername = UserName,
                     ActingProcessFileInternalName = FileName,
                     ActingProcessName = FilePath,
                     EventSourceName = SourceName,
                     EventSourceType = SourceType,
                     DvcId = EpmAgentId
    | extend EventMessage = tostring(AdditionalFields.displayName),
             Evidences = tostring(AdditionalFields.evidences),
             ActingProcessCommandLine = tostring(AdditionalFields.processCommandLine),
             FileLocation = tostring(AdditionalFields.fileLocation),
             AppType = tostring(AdditionalFields.applicationType),
             UserIsAdmin = tobool(AdditionalFields.userIsAdmin),
             ActingProcessFileCompany = tostring(AdditionalFields.company),
             Justification = tostring(AdditionalFields.justification)