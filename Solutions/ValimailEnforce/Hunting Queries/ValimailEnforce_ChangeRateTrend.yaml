id: ce30ce49-2eaf-483c-85cd-c27a645d5355
name: Valimail Enforce - Configuration Change Rate Trend
description: |
  Hunt for configuration change and user addition activity grouped by user and
  domain over hourly buckets. Use this to establish baselines, spot unusual
  spikes, and investigate specific users or domains flagged by the
  corresponding analytics rule.
tactics:
  - Impact
  - DefenseEvasion
  - PrivilegeEscalation
relevantTechniques:
  - T1562
  - T1098
  - T1078
requiredDataConnectors:
  - connectorId: ValimailEnforce
    dataTypes:
      - ValimailEnforceEvents_CL
query: |
  // Configuration change activity per user per hour; flag buckets exceeding the threshold
  let threshold = 3;
  let timeframe = 7d;
  ValimailEnforceEvents_CL
  | where PerformedAt > ago(timeframe)
  | where EventCategory in (
      "DMARCPolicy",
      "SPFConfiguration",
      "DKIMConfiguration",
      "DomainManagement",
      "UserManagement"
    )
  | summarize
      ChangeCount    = count(),
      HighValueCount = countif(IsHighValueEvent == true),
      Actions        = make_set(EventType),
      Categories     = make_set(EventCategory),
      Domains        = make_set(Subject),
      DomainCount    = dcount(Subject)
    by User, TimeBucket = bin(PerformedAt, 1h)
  | extend
      ExceedsThreshold = ChangeCount > threshold,
      ChangesPerMin    = round(todouble(ChangeCount) / 60.0, 2),
      AccountName      = tostring(split(User, "@")[0]),
      AccountDomain    = tostring(split(User, "@")[1])
  | project
      TimeBucket,
      User,
      AccountName,
      AccountDomain,
      ChangeCount,
      HighValueCount,
      DomainCount,
      ChangesPerMin,
      ExceedsThreshold,
      Domains,
      Actions,
      Categories
  | order by TimeBucket desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: User
      - identifier: Name
        columnName: AccountName
      - identifier: UPNSuffix
        columnName: AccountDomain
version: 1.0.0
