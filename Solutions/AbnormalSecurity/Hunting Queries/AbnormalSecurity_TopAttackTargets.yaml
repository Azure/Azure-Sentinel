id: 9dbf1df0-03cd-4c5a-ba22-4f10b82ac90a
name: Abnormal Security - Most-targeted recipients
description: |
  'Aggregates Abnormal Security threats by recipient to reveal the most-targeted
  users over the hunting window. A spike for a single recipient can indicate a
  focused campaign against a high-value target.'
requiredDataConnectors:
  - connectorId: AbnormalSecurityPush
    dataTypes:
      - ABNORMAL_SECURITY_THREAT_LOG_CL
tactics:
  - InitialAccess
  - Reconnaissance
relevantTechniques:
  - T1566
query: |
  ABNORMAL_SECURITY_THREAT_LOG_CL
  | extend RecipientEmail = abx_body_abx_body_recipient_address_s
  | where isnotempty(RecipientEmail)
  | summarize
      ThreatCount = count(),
      DistinctAttackTypes = dcount(abx_body_abx_body_attack_type_s),
      AttackTypes = make_set(abx_body_abx_body_attack_type_s, 10),
      LastSeen = max(TimeGenerated)
      by RecipientEmail
  | where ThreatCount > 1
  | sort by ThreatCount desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: RecipientEmail
version: 1.0.0
