id: f8d819ef-7c3a-499a-a8ef-33737ce9a146
name: Abnormal Security - Newly observed vendor domains
description: |
  'Lists vendor domains that first appear in Abnormal Security vendor cases within the
  hunting window. A newly observed vendor domain tied to a case can be an early signal
  of vendor email compromise or impersonation.'
requiredDataConnectors:
  - connectorId: AbnormalSecurityPush
    dataTypes:
      - ABNORMAL_SECURITY_VENDOR_CASE_CL
tactics:
  - InitialAccess
relevantTechniques:
  - T1566
query: |
  ABNORMAL_SECURITY_VENDOR_CASE_CL
  | extend
      VendorDomain = abx_body_abx_body_vendorDomain_s,
      VendorCaseId = abx_body_abx_body_vendorCaseId_g,
      FirstObserved = abx_body_abx_body_firstObservedTime_t
  | where isnotempty(VendorDomain)
  | summarize FirstObserved = min(FirstObserved), Cases = make_set(VendorCaseId, 10), CaseCount = count() by VendorDomain
  | sort by FirstObserved desc
entityMappings:
  - entityType: DNS
    fieldMappings:
      - identifier: DomainName
        columnName: VendorDomain
version: 1.0.0
