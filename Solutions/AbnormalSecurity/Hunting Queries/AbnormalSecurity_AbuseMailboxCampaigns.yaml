id: 71d3da2b-2cd4-46ee-8436-438e0a9e243a
name: Abnormal Security - User-reported email campaigns
description: |
  'Groups user-reported Abuse Mailbox submissions by campaign to show which reported
  campaigns affected the most recipients. Useful to gauge the spread of a phishing
  campaign that employees flagged.'
requiredDataConnectors:
  - connectorId: AbnormalSecurityPush
    dataTypes:
      - ABNORMAL_SECURITY_ABUSE_MAILBOX_CL
tactics:
  - InitialAccess
relevantTechniques:
  - T1566
query: |
  ABNORMAL_SECURITY_ABUSE_MAILBOX_CL
  | where abx_body_abx_body_reported_b == true
  | extend
      CampaignId = abx_body_abx_body_campaign_id_s,
      Judgement = abx_body_abx_body_judgement_s,
      Subject = abx_body_abx_body_subject_s
  | where isnotempty(CampaignId)
  | summarize
      ReportCount = count(),
      Recipients = dcount(abx_body_abx_body_recipient_address_s),
      Judgements = make_set(Judgement, 5),
      Subjects = make_set(Subject, 5),
      LastReported = max(TimeGenerated)
      by CampaignId
  | sort by ReportCount desc
version: 1.0.0
