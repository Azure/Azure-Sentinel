id: b341a0db-0925-40de-b03e-fe5b350b4a7a
name: Abnormal Security - Threats still in the mailbox
description: |
  'Surfaces Abnormal Security threats whose remediation status indicates the message
  has not been removed from the mailbox (not auto-remediated and not post-remediated).
  Hunt for attacks that may still be reachable by recipients.'
requiredDataConnectors:
  - connectorId: AbnormalSecurityPush
    dataTypes:
      - ABNORMAL_SECURITY_THREAT_LOG_CL
tactics:
  - InitialAccess
relevantTechniques:
  - T1566
query: |
  ABNORMAL_SECURITY_THREAT_LOG_CL
  | where abx_body_abx_body_auto_remediated_b == false
      and abx_body_abx_body_post_remediated_b == false
  | extend
      RecipientEmail = abx_body_abx_body_recipient_address_s,
      SenderEmail = abx_body_abx_body_from_address_s,
      Subject = abx_body_abx_body_subject_s,
      AttackType = abx_body_abx_body_attack_type_s,
      RemediationStatus = abx_body_abx_body_remediation_status_s,
      MessageId = abx_body_abx_body_internet_message_id_s
  | project TimeGenerated, RecipientEmail, SenderEmail, Subject, AttackType, RemediationStatus, MessageId
  | sort by TimeGenerated desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: RecipientEmail
  - entityType: MailMessage
    fieldMappings:
      - identifier: Recipient
        columnName: RecipientEmail
      - identifier: NetworkMessageId
        columnName: MessageId
version: 1.0.0
