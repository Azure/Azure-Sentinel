        Urls = abx_body_abx_body_urls_s,
        UrlCount = abx_body_abx_body_url_count_d,
        AttachmentNames = abx_body_abx_body_attachment_names_s,
        AttachmentCount = abx_body_abx_body_attachment_count_d,
        SummaryInsights = abx_body_abx_body_summary_insights_s,
        PortalUrl = abx_body_abx_body_abx_portal_url_s
