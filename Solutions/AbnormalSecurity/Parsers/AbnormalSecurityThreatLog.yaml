        SenderAddress = abx_body_abx_body_from_address_s,
        SenderDomain = abx_body_abx_body_sender_domain_s,
        SenderIpAddress = abx_body_abx_body_sender_ip_address_s,
        RecipientAddress = abx_body_abx_body_recipient_address_s,
        ToAddresses = abx_body_abx_body_to_addresses_s,
        ReceivedTime = abx_body_abx_body_received_time_t,
        AttackType = abx_body_abx_body_attack_type_s,
        AttackStrategy = abx_body_abx_body_attack_strategy_s,
        AttackVector = abx_body_abx_body_attack_vector_s,
