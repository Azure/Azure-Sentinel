id: 2a4b8c7d-5e0f-4a1b-9c3d-6f7a8b9c0d1e
Function:
  Title: Parser for Elastic Agent Logs (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentLogsCCF
FunctionAlias: ElasticAgentLogsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamType == 'logs'
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'Agent Logs'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // Log Information
        LogLevel,
        LogLogger,
        LogOffset,
        LogPath,
        LogOriginFileLine,
        LogOriginFileName,
        InputType,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentHostname,
        AgentId,
        AgentType,
        ElasticAgentId,
        ElasticAgentVersion,
        ElasticAgentProcess,
        // Service Information
        ServiceId,
        ServiceName,
        ServiceType,
        // ECS Information
        EcsVersion,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
