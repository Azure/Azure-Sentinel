id: 7e9f3d2b-0c5a-4e6f-9b8d-1a2c3d4e5f67
Function:
  Title: Parser for Elastic Agent CPU Metrics (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentCpuMetricsCCF
FunctionAlias: ElasticAgentCpuMetricsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamDataset == 'system.cpu'
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'CPU Metrics'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // CPU Metrics
        SystemCpuCores,
        SystemCpuTotalNormPct,
        SystemCpuTotalPct,
        SystemCpuUserNormPct,
        SystemCpuUserPct,
        SystemCpuSystemNormPct,
        SystemCpuSystemPct,
        SystemCpuIdleNormPct,
        SystemCpuIdlePct,
        SystemCpuNicePct,
        SystemCpuNiceNormPct,
        SystemCpuIowaitPct,
        SystemCpuIowaitNormPct,
        SystemCpuSoftirqPct,
        SystemCpuSoftirqNormPct,
        SystemCpuStealPct,
        SystemCpuStealNormPct,
        SystemCpuIrqPct,
        SystemCpuIrqNormPct,
        // Host CPU Usage
        HostCpuUsage,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentId,
        ElasticAgentId,
        ElasticAgentVersion,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
