id: 8f094e3c-1d6b-4f70-9c9e-2b3d4e5f6a78
Function:
  Title: Parser for Elastic Agent Memory Metrics (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentMemoryMetricsCCF
FunctionAlias: ElasticAgentMemoryMetricsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamDataset == 'system.memory'
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'Memory Metrics'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // Memory Metrics
        SystemMemoryTotal,
        SystemMemoryFree,
        SystemMemoryUsedBytes,
        SystemMemoryUsedPct,
        SystemMemoryActualFree,
        SystemMemoryActualUsedBytes,
        SystemMemoryActualUsedPct,
        SystemMemoryCached,
        // Swap Memory Metrics
        SystemMemorySwapFree,
        SystemMemorySwapTotal,
        SystemMemorySwapUsedBytes,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentId,
        ElasticAgentId,
        ElasticAgentVersion,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
