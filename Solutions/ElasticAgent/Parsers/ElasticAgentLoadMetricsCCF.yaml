id: 3a5b9c8d-6e1f-4a2b-9c4d-7a8b9c0d1e2f
Function:
  Title: Parser for Elastic Agent System Load Metrics (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentLoadMetricsCCF
FunctionAlias: ElasticAgentLoadMetricsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamDataset == 'system.load' or isnotempty(MonitoringMetricsSystemLoad1)
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'System Load Metrics'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // System Load Metrics
        MonitoringMetricsSystemLoad1,
        MonitoringMetricsSystemLoad5,
        MonitoringMetricsSystemLoad15,
        MonitoringMetricsSystemLoadNorm,
        // CPU Cores for context
        SystemCpuCores,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentId,
        ElasticAgentId,
        ElasticAgentVersion,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
