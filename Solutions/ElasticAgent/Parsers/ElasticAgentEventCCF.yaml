id: 6d8f2c1a-9b4e-4f3d-8a7c-5e2b1d0c9f8e
Function:
  Title: Parser for ElasticAgentEvent (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentEventCCF
FunctionAlias: ElasticAgentEventCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventSchemaVersion = 0.2
    | extend EventCount = 1
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventSchemaVersion,
        EventCount,
        // Agent Information
        AgentName,
        AgentEphemeralId,
        AgentType,
        AgentVersion,
        AgentHostname,
        AgentId,
        // Beat Information
        BeatId,
        BeatType,
        BeatStateManagementEnabled,
        BeatStateOutputName,
        BeatStateModuleCount,
        BeatStateQueueName,
        BeatStatsRuntimeGoroutines,
        BeatStatsLibbeatOutputType,
        BeatStatsLibbeatOutputWrite,
        BeatStatsLibbeatOutputRead,
        BeatStatsLibbeatOutputEvents,
        BeatStatsUptimeMs,
        // Service Information
        ServiceId,
        ServiceAddress,
        ServiceName,
        ServiceType,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // ECS Information
        EcsVersion,
        // Elastic Agent Information
        ElasticAgentId,
        ElasticAgentVersion,
        ElasticAgentSnapshot,
        ElasticAgentProcess,
        // Event Information
        EventDataset,
        EventModule,
        EventDuration,
        EventProductVersion,
        Tags,
        // Host Information
        HostHostname,
        DvcHostname,
        HostArchitecture,
        DvcId,
        DvcIpAddr,
        SrcMacAddr,
        HostContainerized,
        HostCpuUsage,
        HostOsCodename,
        HostOsFamily,
        HostOsKernel,
        DvcOs,
        HostOsPlatform,
        HostOsType,
        DvcOsVersion,
        // Log Information
        LogLevel,
        LogLogger,
        LogOffset,
        LogPath,
        LogOriginFileLine,
        LogOriginFileName,
        InputType,
        // CPU Metrics
        SystemCpuCores,
        SystemCpuIdleNormPct,
        SystemCpuIdlePct,
        SystemCpuSystemNormPct,
        SystemCpuSystemPct,
        SystemCpuTotalNormPct,
        SystemCpuTotalPct,
        SystemCpuUserNormPct,
        SystemCpuUserPct,
        SystemCpuNicePct,
        SystemCpuNiceNormPct,
        SystemCpuIowaitPct,
        SystemCpuIowaitNormPct,
        SystemCpuSoftirqPct,
        SystemCpuSoftirqNormPct,
        SystemCpuStealPct,
        SystemCpuStealNormPct,
        SystemCpuIrqPct,
        SystemCpuIrqNormPct,
        // Memory Metrics
        SystemMemoryActualFree,
        SystemMemoryActualUsedBytes,
        SystemMemoryActualUsedPct,
        SystemMemoryFree,
        SystemMemoryTotal,
        SystemMemoryUsedBytes,
        SystemMemoryUsedPct,
        SystemMemoryCached,
        SystemMemorySwapFree,
        SystemMemorySwapTotal,
        SystemMemorySwapUsedBytes,
        // Filesystem Metrics
        SystemFilesystemFree,
        SystemFilesystemTotal,
        SystemFilesystemAvailable,
        SystemFilesystemUsedBytes,
        SystemFilesystemUsedPct,
        SystemFilesystemDeviceName,
        SystemFilesystemType,
        SystemFilesystemMountPoint,
        SystemFilesystemFiles,
        SystemFilesystemFreeFiles,
        // Network Metrics
        SystemNetworkName,
        SystemNetworkInBytes,
        SystemNetworkInPackets,
        SystemNetworkInErrors,
        SystemNetworkInDropped,
        SystemNetworkOutBytes,
        SystemNetworkOutPackets,
        SystemNetworkOutErrors,
        SystemNetworkOutDropped,
        // Process Metrics
        SystemProcessCpuSystemTicks,
        SystemProcessCpuSystemTimeMs,
        SystemProcessCpuTotalTicks,
        SystemProcessCpuTotalTimeMs,
        SystemProcessCpuTotalValue,
        SystemProcessCpuUserTicks,
        SystemProcessCpuUserTimeMs,
        SystemProcessMemorySize,
        SystemProcessFdOpen,
        SystemProcessFdLimitHard,
        SystemProcessFdLimitSoft,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Monitoring Metrics - Beat
        MonitoringMetricsBeatMemstatsMemorySys,
        MonitoringMetricsBeatMemstatsGcNext,
        MonitoringMetricsBeatMemstatsMemoryAlloc,
        MonitoringMetricsBeatMemstatsMemoryTotal,
        MonitoringMetricsBeatMemstatsRss,
        MonitoringMetricsBeatRuntimeGoroutines,
        MonitoringMetricsBeatCpuSystem,
        MonitoringMetricsBeatCpuUser,
        MonitoringMetricsBeatCpuTotal,
        MonitoringMetricsBeatHandlesLimit,
        MonitoringMetricsBeatHandlesOpen,
        MonitoringMetricsBeatInfoUptime,
        MonitoringMetricsBeatInfoEphemeralId,
        MonitoringMetricsBeatInfoVersion,
        MonitoringEcsVersion,
        // Monitoring Metrics - System Load
        MonitoringMetricsSystemLoadNorm,
        MonitoringMetricsSystemLoad1,
        MonitoringMetricsSystemLoad5,
        MonitoringMetricsSystemLoad15,
        // Monitoring Metrics - Libbeat
        MonitoringMetricsLibbeatConfigModule,
        MonitoringMetricsLibbeatOutputWrite,
        MonitoringMetricsLibbeatOutputRead,
        MonitoringMetricsLibbeatOutputEvents,
        MonitoringMetricsLibbeatPipelineClients,
        MonitoringMetricsLibbeatPipelineEvents,
        MonitoringMetricsLibbeatPipelineQueue,
        // Monitoring Metrics - Metricbeat
        MonitoringMetricsMetricbeatSystemFilesystem,
        MonitoringMetricsMetricbeatSystemCpu,
        MonitoringMetricsMetricbeatSystemMemory,
        MonitoringMetricsMetricbeatSystemNetwork,
        // Network Traffic
        SrcBytes,
        SrcPackets,
        DstBytes,
        DstPackets,
        // Connector Information
        ConnectorName
