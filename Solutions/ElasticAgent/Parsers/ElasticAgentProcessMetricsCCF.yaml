id: 1a3b7c6f-4d9e-4a0b-bf2c-5e6a7b8c9d0e
Function:
  Title: Parser for Elastic Agent Process Metrics (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentProcessMetricsCCF
FunctionAlias: ElasticAgentProcessMetricsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamDataset == 'system.process'
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'Process Metrics'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // Process Information
        ElasticAgentProcess,
        // Process CPU Metrics
        SystemProcessCpuTotalTicks,
        SystemProcessCpuTotalTimeMs,
        SystemProcessCpuTotalValue,
        SystemProcessCpuUserTicks,
        SystemProcessCpuUserTimeMs,
        SystemProcessCpuSystemTicks,
        SystemProcessCpuSystemTimeMs,
        // Process Memory Metrics
        SystemProcessMemorySize,
        // Process File Descriptor Metrics
        SystemProcessFdOpen,
        SystemProcessFdLimitHard,
        SystemProcessFdLimitSoft,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentId,
        ElasticAgentId,
        ElasticAgentVersion,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
