id: 9a1b5f4d-2e7c-4a8b-9d0f-3c4e5f6a7b89
Function:
  Title: Parser for Elastic Agent Network Metrics (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentNetworkMetricsCCF
FunctionAlias: ElasticAgentNetworkMetricsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamDataset == 'system.network'
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'Network Metrics'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        SrcMacAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // Network Interface Information
        SystemNetworkName,
        // Inbound Traffic
        SystemNetworkInBytes,
        SystemNetworkInPackets,
        SystemNetworkInErrors,
        SystemNetworkInDropped,
        // Outbound Traffic
        SystemNetworkOutBytes,
        SystemNetworkOutPackets,
        SystemNetworkOutErrors,
        SystemNetworkOutDropped,
        // Host Network Traffic
        SrcBytes,
        SrcPackets,
        DstBytes,
        DstPackets,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentId,
        ElasticAgentId,
        ElasticAgentVersion,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
