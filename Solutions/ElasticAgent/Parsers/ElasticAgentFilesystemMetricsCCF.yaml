id: 0a2b6c5e-3f8d-4a9b-ae1c-4d5f6a7b8c9d
Function:
  Title: Parser for Elastic Agent Filesystem Metrics (CCF Connector)
  Version: '1.0.0'
  LastUpdated: '2026-05-07'
Category: Microsoft Sentinel Parser
FunctionName: ElasticAgentFilesystemMetricsCCF
FunctionAlias: ElasticAgentFilesystemMetricsCCF
FunctionQuery: |
    ElasticAgentLogsV2_CL
    | where DataStreamDataset == 'system.filesystem'
    | extend EventVendor = 'Elastic'
    | extend EventProduct = 'Elastic Agent'
    | extend EventType = 'Filesystem Metrics'
    | project
        TimeGenerated,
        EventVendor,
        EventProduct,
        EventType,
        // Host Information
        HostHostname,
        DvcHostname,
        DvcId,
        DvcIpAddr,
        DvcOs,
        DvcOsVersion,
        HostArchitecture,
        HostOsFamily,
        HostOsPlatform,
        HostOsType,
        // Filesystem Metrics
        SystemFilesystemMountPoint,
        SystemFilesystemDeviceName,
        SystemFilesystemType,
        SystemFilesystemTotal,
        SystemFilesystemFree,
        SystemFilesystemAvailable,
        SystemFilesystemUsedBytes,
        SystemFilesystemUsedPct,
        SystemFilesystemFiles,
        SystemFilesystemFreeFiles,
        // Data Stream Information
        DataStreamType,
        DataStreamDataset,
        DataStreamNamespace,
        // Agent Information
        AgentName,
        AgentVersion,
        AgentId,
        ElasticAgentId,
        ElasticAgentVersion,
        // Metricset Information
        MetricsetName,
        MetricsetPeriod,
        // Event Information
        EventDataset,
        EventModule,
        Tags,
        ConnectorName
