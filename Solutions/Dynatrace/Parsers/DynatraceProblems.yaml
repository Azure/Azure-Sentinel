id: ca4646fe-4278-4dcb-9be7-f0e2d53bbaa1
Function:
  Title: Parser for DynatraceProblems
  Version: '2.0.0'
  LastUpdated: '2026-04-02'
Category: Microsoft Sentinel Parser
FunctionName: DynatraceProblems
FunctionAlias: DynatraceProblems
FunctionQuery: |
    let DynatraceProblemsV1 = view() {
        DynatraceProblems_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Application Monitoring',
            Severity = case(severityLevel_s == 'ERROR', 'High',
                           severityLevel_s == 'INFO', 'Informational',
                           'Medium'),
            ProblemId = problemId_s,
            AffectedEntities = affectedEntities_s,
            ImpactedEntities = impactedEntities_s,
            ManagementZones = managementZones_s,
            DisplayId = displayId_s,
            EndTime = endTime_d,
            EntityTags = entityTags_s,
            ImpactLevel = impactLevel_s,
            StartTime = startTime_d,
            Status = status_s,
            Title = title_s,
            SeverityLevel = severityLevel_s
    };
    let DynatraceProblemsV2 = view() {
        DynatraceProblemsV2_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Application Monitoring',
            Severity = case(severityLevel == 'ERROR', 'High',
                           severityLevel == 'INFO', 'Informational',
                           'Medium'),
            ProblemId = problemId,
            AffectedEntities = tostring(affectedEntities),
            ImpactedEntities = tostring(impactedEntities),
            ManagementZones = tostring(managementZones),
            DisplayId = displayId,
            EndTime = endTimeUtc,
            EntityTags = tostring(entityTags),
            ImpactLevel = impactLevel,
            StartTime = startTimeUtc,
            Status = status,
            Title = problemTitle,
            SeverityLevel = severityLevel
    };
    union isfuzzy=true DynatraceProblemsV1, DynatraceProblemsV2
