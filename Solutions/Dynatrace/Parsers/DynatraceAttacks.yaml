id: fc6d1ab7-a088-4b9e-8ea1-b95584172c33
Function:
  Title: Parser for DynatraceAttacks
  Version: '2.0.0'
  LastUpdated: '2026-04-02'
Category: Microsoft Sentinel Parser
FunctionName: DynatraceAttacks
FunctionAlias: DynatraceAttacks
FunctionQuery: |
    let DynatraceAttacksV1 = view() {
        DynatraceAttacks_CL
        | extend request_host_s = column_ifexists('request_host_s', '')
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Application Security',
            Severity = 'High',
            AttackId = attackId_s,
            AttackType = attackType_s,
            DisplayId = displayId_s,
            DisplayName = displayName_s,
            State = state_s,
            TimeStamp = timestamp_d,
            url = request_url_s,
            host = request_host_s,
            sourceIp = attacker_sourceIp_s,
            managementZones = managementZones_s
    };
    let DynatraceAttacksV2 = view() {
        DynatraceAttacksV2_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Application Security',
            Severity = 'High',
            AttackId = attackId,
            AttackType = attackType,
            DisplayId = displayId,
            DisplayName = displayName,
            State = state,
            TimeStamp = TimeGenerated,
            url = tostring(request['url']),
            host = tostring(request['host']),
            sourceIp = tostring(attacker['sourceIp']),
            managementZones = tostring(managementZones)
    };
    union isfuzzy=true DynatraceAttacksV1, DynatraceAttacksV2
