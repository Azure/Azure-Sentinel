id: 09c9ae71-329c-4343-815d-b755206d9f32
Function:
  Title: Parser for DynatraceSecurityProblems
  Version: '2.0.0'
  LastUpdated: '2026-04-02'
Category: Microsoft Sentinel Parser
FunctionName: DynatraceSecurityProblems
FunctionAlias: DynatraceSecurityProblems
FunctionQuery: |
    let DynatraceSecurityProblemsV1 = view() {
        DynatraceSecurityProblems_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Application Security',
            Severity = case(riskAssessment_riskLevel_s == 'CRITICAL', 'High',
                           riskAssessment_riskLevel_s == 'HIGH', 'Medium',
                           riskAssessment_riskLevel_s == 'MEDIUM', 'Low',
                           'Informational'),
            SecurityProblemId = securityProblemId_s,
            CVEIds = cveIds_s,
            DisplayId = displayId_s,
            ExternalVulnerabilityId = externalVulnerabilityId_s,
            FirstSeenTimeStamp = unixtime_milliseconds_todatetime(firstSeenTimestamp_d),
            LastUpdatedTimeStamp = unixtime_milliseconds_todatetime(lastUpdatedTimestamp_d),
            Muted = muted_b,
            PackageName = packageName_s,
            DAVISRiskLevel = riskAssessment_riskLevel_s,
            DAVISRiskScore = riskAssessment_riskScore_d,
            DAVISRiskVector = riskAssessment_riskVector_s,
            DAVISVulnerableFunctionUsage = riskAssessment_vulnerableFunctionUsage_s,
            DAVISExposure = riskAssessment_exposure_s,
            DAVISDataAssets = riskAssessment_dataAssets_s,
            DAVISPublicExploit = riskAssessment_publicExploit_s,
            Status = status_s,
            Technology = technology_s,
            Title = title_s,
            Url = url_s,
            VulnerabilityType = vulnerabilityType_s,
            ManagementZones = managementZones_s
    };
    let DynatraceSecurityProblemsV2 = view() {
        DynatraceSecurityProblemsV2_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Application Security',
            Severity = case(tostring(riskAssessment['riskLevel']) == 'CRITICAL', 'High',
                           tostring(riskAssessment['riskLevel']) == 'HIGH', 'Medium',
                           tostring(riskAssessment['riskLevel']) == 'MEDIUM', 'Low',
                           'Informational'),
            SecurityProblemId = securityProblemId,
            CVEIds = tostring(cveIds),
            DisplayId = displayId,
            ExternalVulnerabilityId = externalVulnerabilityId,
            FirstSeenTimeStamp = unixtime_milliseconds_todatetime(tolong(firstSeenTimestamp)),
            LastUpdatedTimeStamp = unixtime_milliseconds_todatetime(tolong(lastUpdatedTimestamp)),
            Muted = muted,
            PackageName = '',
            DAVISRiskLevel = tostring(riskAssessment['riskLevel']),
            DAVISRiskScore = toreal(riskAssessment['riskScore']),
            DAVISRiskVector = tostring(riskAssessment['riskVector']),
            DAVISVulnerableFunctionUsage = tostring(riskAssessment['vulnerableFunctionUsage']),
            DAVISExposure = tostring(riskAssessment['exposure']),
            DAVISDataAssets = tostring(riskAssessment['dataAssets']),
            DAVISPublicExploit = tostring(riskAssessment['publicExploit']),
            Status = status,
            Technology = technology,
            Title = securityProblemTitle,
            Url = url,
            VulnerabilityType = vulnerabilityType,
            ManagementZones = tostring(managementZones)
    };
    union isfuzzy=true DynatraceSecurityProblemsV1, DynatraceSecurityProblemsV2
