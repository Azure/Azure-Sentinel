id: b157a58b-39ce-44c2-8a2f-7f2a8eff104a
Function:
  Title: Parser for DynatraceAuditLogs
  Version: '2.0.1'
  LastUpdated: '2026-04-28'
Category: Microsoft Sentinel Parser
FunctionName: DynatraceAuditLogs
FunctionAlias: DynatraceAuditLogs
FunctionQuery: |
    let DynatraceAuditLogsV1 = view() {
        DynatraceAuditLogs_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Audit',
            Severity = 'Informational',
            LogId = logId_s,
            EnvironmentId = environmentId_s,
            EventType = eventType_s,
            Category = '',
            UserOrigin = userOrigin_s,
            UserType = userType_s,
            User = user_s,
            Success = success_b,
            TimeStamp = unixtime_milliseconds_todatetime(timestamp_d)
    };
    let DynatraceAuditLogsV2 = view() {
        DynatraceAuditLogsV2_CL
        | project
            TimeGenerated,
            EventVendor = 'Dynatrace',
            EventProduct = 'Audit',
            Severity = 'Informational',
            LogId = logId,
            EnvironmentId = environmentId,
            EventType = eventType,
            Category = category,
            UserOrigin = userOrigin,
            UserType = userType,
            User = user,
            Success = success,
            TimeStamp = TimeGenerated
    };
    union isfuzzy=true DynatraceAuditLogsV1, DynatraceAuditLogsV2
