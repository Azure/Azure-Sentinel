id: b16f13ae-343b-9513-e684-469cdf9471b2
name: "UniFi Site Manager: New WAN2 (secondary) issue recorded"
description: |
  Identifies a new issue index on the secondary WAN failover link. Fires only on newly-recorded issue indexes, not while existing issues persist.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: UniFiSiteManagerConnectorDefinition
    dataTypes:
      - Unifi_SiteManager_Sites_CL
queryFrequency: 15m
queryPeriod: 45m
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Impact
relevantTechniques:
  - T1498
query: |
  let prev = Unifi_SiteManager_Sites_CL
            | where TimeGenerated between (ago(30m) .. ago(15m))
            | summarize arg_max(TimeGenerated, *) by tostring(siteId)
            | mv-expand pi = todynamic(tostring(siteStatistics.wans.WAN2.wanIssues))
            | extend siteId_s = tostring(siteId), prevIdx = tolong(pi.index)
            | distinct siteId_s, prevIdx;
        Unifi_SiteManager_Sites_CL
        | where TimeGenerated > ago(15m)
        | summarize arg_max(TimeGenerated, *) by tostring(siteId)
        | where isnotempty(tostring(siteStatistics.wans.WAN2))
        | extend siteId_s = tostring(siteId), siteName = tostring(meta.name)
        | mv-expand issue = todynamic(tostring(siteStatistics.wans.WAN2.wanIssues))
        | extend idx = tolong(issue.index)
        | join kind=leftanti prev on $left.siteId_s == $right.siteId_s, $left.idx == $right.prevIdx
        | extend Activity = strcat('New WAN2 issue index ', idx, ' on secondary WAN (downtime=', tostring(issue.wanDowntime), ' highLatency=', tostring(issue.highLatency), ')')
        | project TimeGenerated, siteId, siteName, Activity, IssueIndex=idx, IssueDetail=issue
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: siteName
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AllEntities
    groupByEntities: []
kind: Scheduled
version: 1.0.0
