id: c8875ebb-cc6e-14e4-4216-d8b06fd92c90
name: "UniFi Site Manager: Site Health Critical"
description: |
  Identifies when a site has multiple offline devices, indicating significant site-level issues such as a power outage, network failure, or infrastructure problem.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: UniFiSiteManagerConnectorDefinition
    dataTypes:
      - Unifi_SiteManager_Sites_CL
queryFrequency: 15m
queryPeriod: 30m
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Impact
relevantTechniques:
  - T1489
  - T1499
query: |
  // UniFi Site Health Critical Detection
  // Author: Fetch Labs (https://sentinel.blog)
  let OfflineThreshold = 3;
  Unifi_SiteManager_Sites_CL
  | where TimeGenerated > ago(30m)
  | summarize arg_max(TimeGenerated, *) by siteId
  | extend 
      siteName = tostring(meta.name),
      timezone = tostring(meta.timezone),
      totalDevices = toint(siteStatistics.counts.totalDevice),
      offlineDevices = toint(siteStatistics.counts.offlineDevice),
      wifiClients = toint(siteStatistics.counts.wifiClient),
      wiredClients = toint(siteStatistics.counts.wiredClient)
  | where offlineDevices >= OfflineThreshold
  | extend 
      AvailabilityPct = round(100.0 * (totalDevices - offlineDevices) / totalDevices, 1),
      TotalClients = wifiClients + wiredClients
  | project
      TimeGenerated,
      SiteId = siteId,
      SiteName = siteName,
      TotalDevices = totalDevices,
      OfflineDevices = offlineDevices,
      OnlineDevices = totalDevices - offlineDevices,
      AvailabilityPct,
      TotalClients,
      WiFiClients = wifiClients,
      WiredClients = wiredClients,
      Timezone = timezone
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: SiteName
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: true
    lookbackDuration: PT4H
    matchingMethod: AllEntities
    groupByEntities: []
kind: Scheduled
version: 1.0.0
