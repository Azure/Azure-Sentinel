id: 17d09e1b-8a3f-776b-6981-dbe2cc74d097
name: "UniFi Cloud: New WAN issue index recorded"
description: |
  UniFi recorded a NEW WAN-side issue (new `wans.WAN.wanIssues[].index`) not seen in the previous poll. Fires once per new issue index - not repeatedly while a persistent issue is unresolved. May indicate ISP problems, hardware fault, or active DoS pressure on the gateway.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: UniFiSiteManagerConnectorDefinition
    dataTypes:
      - Unifi_Cloud_Sites_CL
queryFrequency: 15m
queryPeriod: 45m
triggerOperator: GreaterThan
triggerThreshold: 0
tactics:
  - Impact
relevantTechniques:
  - T1498
query: |
  let prev = Unifi_Cloud_Sites_CL
            | where TimeGenerated between (ago(30m) .. ago(15m))
            | summarize arg_max(TimeGenerated, *) by tostring(siteId)
            | mv-expand pi = todynamic(tostring(siteStatistics.wans.WAN.wanIssues))
            | extend siteId_s = tostring(siteId), prevIdx = tolong(pi.index)
            | distinct siteId_s, prevIdx;
        Unifi_Cloud_Sites_CL
        | where TimeGenerated > ago(15m)
        | summarize arg_max(TimeGenerated, *) by tostring(siteId)
        | extend siteId_s = tostring(siteId),
                 siteName = tostring(meta.name)
        | mv-expand issue = todynamic(tostring(siteStatistics.wans.WAN.wanIssues))
        | extend idx = tolong(issue.index)
        | join kind=leftanti prev on $left.siteId_s == $right.siteId_s, $left.idx == $right.prevIdx
        | extend Activity = strcat('New WAN issue index ', idx, ' on site (downtime=', tostring(issue.wanDowntime), ' highLatency=', tostring(issue.highLatency), ')'),
                 peakMs = toint(issue.latencyMaxMs)
        | project TimeGenerated, siteId, siteName, Activity, IssueIndex=idx, PeakLatencyMs=peakMs, IssueDetail=issue
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: siteName
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AllEntities
    groupByEntities: []
kind: Scheduled
version: 1.0.0
