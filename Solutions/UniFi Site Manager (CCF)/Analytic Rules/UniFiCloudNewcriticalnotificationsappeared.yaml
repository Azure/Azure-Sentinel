id: e4b75722-7239-f247-558f-d2e851ea0b38
name: "UniFi Cloud: New critical notifications appeared"
description: |
  UniFi critical-notification count INCREASED since the previous poll, meaning at least one new critical-severity alarm appeared. Fires only on the increase, not while existing criticals persist unacknowledged.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: UniFiSiteManagerConnectorDefinition
    dataTypes:
      - Unifi_Cloud_Sites_CL
queryFrequency: 15m
queryPeriod: 45m
triggerOperator: GreaterThan
triggerThreshold: 0
tactics:
  - Impact
relevantTechniques:
  - T1499
query: |
  let prev = Unifi_Cloud_Sites_CL
            | where TimeGenerated between (ago(30m) .. ago(15m))
            | summarize arg_max(TimeGenerated, *) by tostring(siteId)
            | project siteId_s = tostring(siteId),
                      prevCritical = toint(siteStatistics.counts.criticalNotification);
        Unifi_Cloud_Sites_CL
        | where TimeGenerated > ago(15m)
        | summarize arg_max(TimeGenerated, *) by tostring(siteId)
        | extend siteId_s = tostring(siteId),
                 siteName = tostring(meta.name),
                 CriticalCount = toint(siteStatistics.counts.criticalNotification)
        | join kind=inner prev on siteId_s
        | where CriticalCount > prevCritical
        | extend NewCriticals = CriticalCount - prevCritical
        | extend Activity = strcat(NewCriticals, ' new critical notification(s) - count went ', prevCritical, ' -> ', CriticalCount)
        | project TimeGenerated, siteId, siteName, Activity, prevCritical, CriticalCount, NewCriticals
entityMappings:
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: siteName
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AllEntities
    groupByEntities: []
kind: Scheduled
version: 1.0.0
