id: 731e5ac4-7fe1-4b06-9941-532f2e008bb3
name: Claroty - Threat detected
description: Detects Claroty events where EventOriginalType or EventType contains 'Threat', identifying Threat-related activity
  and surfacing the destination IP address for investigation.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: Claroty
    dataTypes:
      - ClarotyEvent
  - connectorId: ClarotyAma
    dataTypes:
      - ClarotyEvent
  - connectorId: CefAma
    dataTypes:
      - CommonSecurityLog
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
  - Reconnaissance
relevantTechniques:
  - T1018
  - T1595
query: |
  ClarotyEvent
  | where EventOriginalType has 'Threat' or EventType has 'Threat'
  | project TimeGenerated, DstIpAddr
  | extend IPCustomEntity = DstIpAddr
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Claroty Treat detected on {{IPCustomEntity}}
  alertDescriptionFormat: Claroty event type {{EventType}} or original type {{EventOriginalType}} matched Treat on {{IPCustomEntity}}
customDetails:
  EventOriginalType: EventOriginalType
  EventType: EventType
  TimeGenerated: TimeGenerated
version: 1.0.5
kind: Scheduled
