id: 3882ffbf-6228-4e1f-ab8f-8d79a26da0fb
name: Claroty - Write and Execute operations
description: Query searches for operations with Write and Execute accesses.
status: Available
requiredDataConnectors:
- connectorId: CefAma
  dataTypes:
  - CommonSecurityLog
tactics:
- InitialAccess
- Execution
- Impact
relevantTechniques:
- T1190
- T1204
- T1106
query: |-
  ClarotyEvent
  | where TimeGenerated > ago(24h)
  | where isnotempty(CategoryAccess)
  | where tolower(CategoryAccess) in ("execute", "write")
  | extend IPCustomEntity = DstIpAddr
entityMappings:
- entityType: IP
  fieldMappings:
  - identifier: Address
    columnName: IPCustomEntity
version: 1.0.1
