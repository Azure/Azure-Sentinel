id: 15569b45-4c34-4693-bf99-841e76b5da65
name: Claroty - PLC logins
description: 'Query searches for PLC login security alerts.'
severity: High
requiredDataConnectors:
  - connectorId: CefAma
    dataTypes:
      - CommonSecurityLog
tactics:
  - InitialAccess
  - CredentialAccess
relevantTechniques:
  - T1190
  - T1078
  - T1078.001
query: |
  ClarotyEvent
  | where TimeGenerated > ago(24h)
  | where EventOriginalType =~ 'Alert'
  | where EventType has 'Login'
  | project TimeGenerated, DstIpAddr
  | extend IPCustomEntity = DstIpAddr
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
version: 1.0.1
