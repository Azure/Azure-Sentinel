id: 8038c683-f4dc-481e-94c6-f906d880b0ec
name: Claroty - Conflict assets
description: 'Query searches for conflicting assets.'
status: Available
requiredDataConnectors:
- connectorId: CefAma
  dataTypes:
  - CommonSecurityLog
tactics:
- InitialAccess
- Discovery
relevantTechniques:
- T1016
- T1190
- T1613
query: |-
  ClarotyEvent
  | where TimeGenerated > ago(24h)
  | where EventOriginalType has 'New Conflict Asset' or EventType has 'New Conflict Asset'
  | project TimeGenerated, DstIpAddr
  | extend IPCustomEntity = DstIpAddr
entityMappings:
- entityType: IP
  fieldMappings:
  - identifier: Address
    columnName: IPCustomEntity
version: 1.0.1
