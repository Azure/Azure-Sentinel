id: fad6cb81-9a05-4acb-9c5b-a7c62af28034
name: Claroty - Unresolved alerts
description: |-
  'Query searches for Claroty alerts with unresolved status to identify alerts that remain open for investigation.''
severity: Medium
requiredDataConnectors:
  - connectorId: CefAma
    dataTypes:
      - CommonSecurityLog
tactics:
  - InitialAccess
  - Discovery
- Impact
relevantTechniques:
  - T1190
  - T1082
  - T1499
query: |
  ClarotyEvent
  | where TimeGenerated > ago(24h)
  | where EventOriginalType =~ 'Alert'
  | where ResolvedAs =~ 'Unresolved'
  | extend IPCustomEntity = DstIpAddr
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
version: 1.0.1
