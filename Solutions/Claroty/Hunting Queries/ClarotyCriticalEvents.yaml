id: a81f3a44-049c-409d-8b98-b78aa256dacf
name: Claroty - Critical Events
description: 'Query searches for critical severity events.'
severity: High
requiredDataConnectors:
  - connectorId: CefAma
    dataTypes:
      - CommonSecurityLog
tactics:
  - InitialAccess
  - Impact
relevantTechniques:
  - T1190
  - T0889
query: |
  ClarotyEvent
  | where TimeGenerated > ago(24h)
  | where EventSeverity == '5'
  | extend IPCustomEntity = DstIpAddr
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
version: 1.0.1
