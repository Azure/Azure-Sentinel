id: 627a4ff1-036b-4375-a9f9-288d5e1d7d37
name: Snowflake - Possible privileges discovery activity
description: |
  'Detects possible Snowflake privileges Discovery activity when a SHOW query contains both SHOW and ROLES, which
  may indicate enumeration of roles and privilege structure by a user. This rule is intended to highlight Discovery behavior
  associated with account and role enumeration in Snowflake.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
relevantTechniques:
  - T1087
query: |
  Snowflake
  | where QueryType =~ 'SHOW'
  | where QueryText has_all ('SHOW', 'ROLES')
  | extend AccountCustomEntity = tostring(TargetUsername)
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
customDetails:
  SnowflakeQueryText: QueryText
version: 1.0.2
kind: Scheduled
