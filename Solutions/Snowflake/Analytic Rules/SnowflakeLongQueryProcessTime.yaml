id: 1376f5e5-855a-4f88-8591-19eba4575a0f
name: Snowflake - Abnormal query process time
description: |
  'Detects Snowflake queries with abnormal process time when QueryTotalElapsedTime exceeds the hardcoded threshold
  of 10000. Use this rule to identify unusually long-running queries that may indicate performance issues, workload abuse,
  or resource exhaustion.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Impact
relevantTechniques:
  - T1499
query: |
  let threshold = 10000;
  Snowflake
  | where QueryTotalElapsedTime > threshold
  | extend AccountCustomEntity = TargetUsername
  | project QueryTotalElapsedTime, TargetUsername, AccountCustomEntity
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Snowflake long query detected for {{AccountCustomEntity}}
  alertDescriptionFormat: Snowflake query exceeded the abnormal process time threshold of 10000 for {{AccountCustomEntity}}
customDetails:
  QueryProcessTime: QueryTotalElapsedTime
  TargetUser: TargetUsername
version: 1.0.2
kind: Scheduled
