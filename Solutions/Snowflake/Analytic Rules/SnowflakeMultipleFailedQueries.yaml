id: 5f8a81d9-7d27-4ff5-a0ce-4285ee02c2c8
name: Snowflake - Multiple failed queries
description: |
  'Detects multiple failed queries in short timeframe.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
relevantTechniques:
  - T1518
  - T1082
  - T1059.001
query: |
    let threshold = 50;
    Snowflake
    | where QueryExecutionStatus !~ 'SUCCESS'
    | summarize FailedQueryCount = count() by TargetUsername, bin(TimeGenerated, 5m)
    | where FailedQueryCount > threshold
    | extend AccountCustomEntity = TargetUsername
    | extend StartTime = bin_TimeGenerated, EndTime = bin_TimeGenerated + 5m
    | project StartTime, EndTime, TargetUsername, FailedQueryCount, threshold, AccountCustomEntity
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Snowflake failed queries detected for {{TargetUsername}}
  alertDescriptionFormat: Detected {{FailedQueryCount}} failed Snowflake queries for {{TargetUsername}} in the last 5 minutes,
    exceeding the threshold of {{threshold}}.
customDetails:
  FailedQueryCount: FailedQueryCount
  Threshold: threshold
  TargetUsername: TargetUsername
version: 1.0.3
kind: Scheduled

