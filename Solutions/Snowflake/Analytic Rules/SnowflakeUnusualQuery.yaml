id: 1dd1d9e5-3ebf-43cb-be07-6082d5eabe79
name: Snowflake - Unusual query
description: |
  'Detects successful Snowflake SELECT queries that begin with SELECT * and maps the executing account for SOC triage.
  Use this rule to identify potentially unusual broad data retrieval behavior in Snowflake.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Collection
relevantTechniques:
  - T1119
query: |
  Snowflake
  | where QueryType =~ 'SELECT'
  | where QueryExecutionStatus =~ 'SUCCESS'
  | where QueryText startswith @'SELECT *'
  | extend AccountCustomEntity = TargetUsername
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Snowflake unusual query by {{AccountCustomEntity}}
  alertDescriptionFormat: Successful SELECT query starting with SELECT * was observed for {{AccountCustomEntity}}.
customDetails:
  QueryType: QueryType
  QueryExecutionStatus: QueryExecutionStatus
  QueryText: QueryText
suppressionEnabled: true
suppressionDuration: 1h
version: 1.0.2
kind: Scheduled
