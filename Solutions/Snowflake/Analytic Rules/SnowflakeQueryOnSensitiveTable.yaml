id: f258fa0c-e26c-4e2b-94fb-88b6cef0ca6e
name: Snowflake - Query on sensitive or restricted table
description: |
  'Detects successful Snowflake SELECT queries against a sensitive or restricted table. The rule evaluates Snowflake
  query activity, restricts results to successful SELECT statements, extracts the referenced table name from QueryText, and
  alerts when the table matches the sensitive table list defined in the query.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Collection
relevantTechniques:
  - T1119
query: |
  let r_tbl = dynamic(['table_name']);
  Snowflake
  | where QueryType =~ 'SELECT'
  | where QueryExecutionStatus =~ 'SUCCESS'
  | extend tbl = extract(@'(FROM|from)\s(\S+)\s', 2, QueryText)
  | where tbl in~ (r_tbl)
  | extend AccountCustomEntity = TargetUsername
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Snowflake query on sensitive table by {{TargetUsername}}
  alertDescriptionFormat: 'Successful SELECT query executed against a sensitive or restricted table. User: {{TargetUsername}}.
    Table: {{tbl}}.'
customDetails:
  TargetUsername: TargetUsername
  TableName: tbl
  QueryType: QueryType
  QueryExecutionStatus: QueryExecutionStatus
version: 1.0.2
kind: Scheduled
