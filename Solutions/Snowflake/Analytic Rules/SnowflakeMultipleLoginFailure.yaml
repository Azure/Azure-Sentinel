id: e05cc333-d499-430f-907c-7f28a9e4d1b5
name: Snowflake - Multiple login failures by user
description: |
  'Detects multiple login failures by user.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1078
  - T1078.004
query: |
  let threshold = 10;
  Snowflake
  | where EventType =~ 'LOGIN'
  | where LoginIsSuccess == 'No'
  | summarize count_ = count() by TargetUsername, bin(TimeGenerated, 5m)
  | where count_ > threshold
  | extend AccountCustomEntity = TargetUsername
  | project TimeGenerated, TargetUsername, count_, threshold, AccountCustomEntity
entityMappings:
- entityType: Account
  fieldMappings:
  - identifier: Name
    columnName: AccountCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Snowflake multiple login failures for {{TargetUsername}}
  alertDescriptionFormat: '{{count_}} login failures exceeded the threshold of {{threshold}} in a 5-minute window for user
    {{TargetUsername}}'
version: 1.0.3
kind: Scheduled
