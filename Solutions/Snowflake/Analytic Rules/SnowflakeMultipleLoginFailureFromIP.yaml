id: b7d22407-1391-4256-b09a-414a9719443c
name: Snowflake - Multiple login failures from single IP
description: |
  'Detects Mmltiple login failures from single IP.'
severity: High
status: Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - InitialAccess
relevantTechniques:
  - T1078
query: |
  let threshold = 10;
  Snowflake
    | where EventType =~ 'LOGIN'
    | where tostring(LoginIsSuccess) =~ 'No'
    | summarize FailedLogins = count() by SrcDvcIpAddr, bin(TimeGenerated, 5m)
    | where FailedLogins > threshold
    | extend IPCustomEntity = SrcDvcIpAddr
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
alertDetailsOverride:
  alertDisplayNameFormat: Snowflake multiple login failures from IP {{IPCustomEntity}}
  alertDescriptionFormat: Detected {{FailedLogins}} failed Snowflake logins from IP {{IPCustomEntity}} in a 5-minute bucket.
customDetails:
  FailedLogins: FailedLogins
  BucketTime: TimeGenerated
version: 1.0.3
kind: Scheduled
