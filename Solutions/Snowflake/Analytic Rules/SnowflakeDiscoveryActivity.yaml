id: 09b8dfc7-87b0-4215-b34b-bab363d685cb
name: Snowflake - Possible discovery activity
description: |
  'Detects possible Snowflake Discovery activity by alerting when a user account performs more than the configured
  threshold of successful SHOW queries within a 5-minute window.'
severity: Medium
status : Available
requiredDataConnectors:
  - connectorId: Snowflake
    dataTypes:
      - Snowflake
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
relevantTechniques:
  - T1526
query: |
  let threshold = 20;
  Snowflake
  | where QueryType =~ 'SHOW'
  | where QueryExecutionStatus =~ 'SUCCESS'
  | summarize count() by TargetUsername, bin(TimeGenerated, 5m)
  | where count_ > threshold
  | extend AccountCustomEntity = TargetUsername
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
customDetails:
  EventCount: EventCount
  Threshold: Threshold
  TargetUsername: TargetUsername
version: 1.0.3
kind: Scheduled
