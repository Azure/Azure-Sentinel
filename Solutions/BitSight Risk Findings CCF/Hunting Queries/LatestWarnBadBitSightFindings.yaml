id: 84754362-3771-4d1c-9064-dd257fe516e6
name: Latest WARN and BAD BitSight findings
description: |
  Returns the most recent WARN and BAD BitSight findings across all monitored companies.
requiredDataConnectors:
  - connectorId: BitSight
    dataTypes:
      - BitsightRiskFindings_CL
tactics:
  - Impact
  - CommandAndControl
relevantTechniques:
  - T1071
  - T1485
query: |
  BitsightRiskFindings_CL
  | where normalized_risk_state in ("warn", "bad")
  | summarize arg_max(TimeGenerated, *) by finding_uid
  | extend CloudApplicationName = tostring(company_name),
      CloudApplicationId = tostring(company_guid)
  | project TimeGenerated, company_name, company_guid, risk_vector_label, normalized_risk_state, severity, severity_category, first_seen, last_seen, finding_uid, CloudApplicationName, CloudApplicationId
  | order by TimeGenerated desc
entityMappings:
  - entityType: CloudApplication
    fieldMappings:
      - identifier: Name
        columnName: CloudApplicationName
      - identifier: AppId
        columnName: CloudApplicationId
version: 1.0.0
