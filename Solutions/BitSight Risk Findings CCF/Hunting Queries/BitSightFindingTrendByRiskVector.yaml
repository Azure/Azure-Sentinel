id: f6a771f1-ffed-400d-93d4-3ecbff7812ca
name: BitSight finding trend by risk vector
description: |
  Trends WARN and BAD BitSight findings by company and risk vector over time.
requiredDataConnectors:
  - connectorId: BitSight
    dataTypes:
      - BitsightRiskFindings_CL
tactics:
  - Impact
  - CommandAndControl
relevantTechniques:
  - T1071
  - T1485
query: |
  BitsightRiskFindings_CL
  | where normalized_risk_state in ("warn", "bad")
  | summarize Findings=count() by bin(TimeGenerated, 1d), company_name, company_guid, risk_vector_label, normalized_risk_state
  | extend CloudApplicationName = tostring(company_name),
      CloudApplicationId = tostring(company_guid)
  | order by TimeGenerated asc
entityMappings:
  - entityType: CloudApplication
    fieldMappings:
      - identifier: Name
        columnName: CloudApplicationName
      - identifier: AppId
        columnName: CloudApplicationId
version: 1.0.0
