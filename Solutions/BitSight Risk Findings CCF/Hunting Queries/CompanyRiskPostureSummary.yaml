id: 12fa8c71-3b27-4c21-abd8-1ebd5cedbb67
name: Company risk posture summary from BitSight findings
description: |
  Summarizes WARN and BAD findings per company and risk vector to support triage.
requiredDataConnectors:
  - connectorId: BitSight
    dataTypes:
      - BitsightRiskFindings_CL
tactics:
  - Impact
  - CommandAndControl
relevantTechniques:
  - T1071
  - T1485
query: |
  BitsightRiskFindings_CL
  | summarize arg_max(TimeGenerated, *) by finding_uid
  | where normalized_risk_state in ("warn", "bad")
  | summarize Findings=count() by company_name, company_guid, risk_vector_label, normalized_risk_state
  | extend CloudApplicationName = tostring(company_name),
      CloudApplicationId = tostring(company_guid)
  | order by company_name asc, Findings desc
entityMappings:
  - entityType: CloudApplication
    fieldMappings:
      - identifier: Name
        columnName: CloudApplicationName
      - identifier: AppId
        columnName: CloudApplicationId
version: 1.0.0
