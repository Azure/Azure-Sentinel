id: a1b2c3d4-e5f6-4078-9012-3456789abcde
name: Deleted a Custom Field Mapping profile
description: |
  'Deleted a Custom Field Mapping profile from SOC Prime platform'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: SOCPrimeAuditLogsDataConnector
    dataTypes:
      - SOCPrimeAuditLogs_CL
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562.001
query: |
  SOCPrimeAuditLogs_CL
  | where EventName == "Deleted a Custom Field Mapping profile"
  | project TimeGenerated, EventName, UserEmail, UserName, SourceIp, Uri, Type
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: UserName
      - identifier: Name
        columnName: UserEmail
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SourceIp
version: 1.0.0
kind: Scheduled