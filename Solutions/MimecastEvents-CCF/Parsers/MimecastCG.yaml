id: 1a2b3c4d-5e6f-7a8b-9c0d-1e2f3a4b5c6d
Function:
  Title: Parser for Mimecast SEG Cloud Gateway (CCF Push)
  Version: "1.0.0"
  LastUpdated: "2026-07-06"
Category: Microsoft Sentinel Parser
FunctionName: MimecastCG
FunctionAlias: MimecastCG
FunctionQuery: |
  // Source: MimecastEvents_CL, mimecastEventType == "seg_cg"
  // Note: email_ttp_ap rows (SEG attachment-protect) are routed to MimecastTTPAttachment, not here.
  // Timestamp: payload.timestamp is epoch milliseconds (real); converted in DCR transform.
  // Dedup key: processingId (unique per SEG row). aggregateId groups logical events — not used for dedup.
  // Sample-verified: YES (Seg_Cg_CL records observed with Logtype email_receipt/email_process/email_spam)
  let MimecastCG_view = view() {
      MimecastEvents_CL
      | where mimecastEventType == "seg_cg"
      | extend _b = todynamic(mimecast_body)
      | project
          ["Time Generated"]                = TimeGenerated,
          ["Event Time"]                    = tostring(datetime(1970-01-01) + tolong(_b.timestamp) * 1ms),
          ["Processing ID"]                 = mimecastEventId,
          ["Aggregate ID"]                  = aggregateId,
          ["Account ID"]                    = accountId,
          ["Log Type"]                      = mimecastLogtype,
          ["Sub Type"]                      = mimecastSubtype,
          ["Direction"]                     = tostring(_b.direction),
          ["Route"]                         = route,
          ["Sender Envelope"]               = tostring(_b.senderEnvelope),
          ["Sender Domain"]                 = tostring(_b.senderDomain),
          ["Sender IP"]                     = senderIp,
          ["Sender Header"]                 = tostring(_b.senderHeader),
          ["Recipients"]                    = tostring(_b.recipients),
          ["Message ID"]                    = messageId,
          ["Subject"]                       = subject,
          ["Action"]                        = action,
          ["Hold Reason"]                   = tostring(_b.holdReason),
          ["Delivered"]                     = tostring(_b.delivered),
          ["Delivery Attempts"]             = tostring(_b.deliveryAttempts),
          ["Delivery Errors"]               = tostring(_b.deliveryErrors),
          ["Destination IP"]                = tostring(_b.destinationIp),
          ["Host Name"]                       = tostring(_b.Hostname),
          ["TLS Used"]                      = tostring(_b.tlsUsed),
          ["TLS Version"]                   = tostring(_b.tlsVersion),
          ["TLS Cipher"]                    = tostring(_b.tlsCipher),
          ["Email Size"]                    = tostring(_b.emailSize),
          ["Number of Attachments"]         = tostring(_b.numberAttachments),
          ["Total of Size Attachments"]     = tostring(_b.totalSizeAttachments),
          ["Attachments"]                   = tostring(_b.attachments),
          ["Url Category"]                  = tostring(_b.urlCategory),
          ["Scan Results"]                  = scanResult,
          ["Tagged Malicious"]              = tostring(_b.taggedMalicious),
          ["Tagged External"]               = tostring(_b.taggedExternal),
          ["Similar Domain"]                = tostring(_b.similarDomain),
          ["Monitored Domain Source"]       = tostring(_b.monitoredDomainSource),
          ["Similar Internal Domain"]       = tostring(_b.similarInternalDomain),
          ["Similar Custom External Domain"]= tostring(_b.similarCustomExternalDomain),
          ["Similar Mimecast External Domain"] = tostring(_b.similarMimecastExternalDomain),
          ["New Domain"]                    = tostring(_b.newDomain),
          ["Custom Name Match"]             = tostring(_b.customNameMatch),
          ["Reply Mismatch"]                = tostring(_b.replyMismatch),
          ["Internal User Name"]            = tostring(_b.internalUserName),
          ["Items Detected"]                = tostring(_b.itemsDetected),
          ["Custom Threat Dictionary"]      = tostring(_b.customThreatDictionary),
          ["Mimecast Threat Dictionary"]    = tostring(_b.mimecastThreatDictionary),
          ["Virus Found"]                   = tostring(_b.virusFound),
          ["Sha256"]                        = tostring(_b.sha256),
          ["Sha1"]                          = tostring(_b.sha1),
          ["Md5"]                           = tostring(_b.md5),
          ["File Name"]                     = tostring(_b.fileName),
          ["File Extension"]                = tostring(_b.fileExtension),
          ["Rejection Type"]                = tostring(_b.rejectionType),
          ["Rejection Code"]                = tostring(_b.rejectionCode),
          ["Rejection Info"]                = tostring(_b.rejectionInfo),
          ["Spam Info"]                     = tostring(_b.spamInfo),
          ["Spam Processing Detail"]        = tostring(_b.spamProcessingDetail),
          ["Partition"]                     = tostring(_b.partition),
          ["Offset"]                        = tostring(_b.offset)
  };
  MimecastCG_view
