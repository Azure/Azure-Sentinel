id: 3c4d5e6f-7a8b-9c0d-1e2f-3a4b5c6d7e8f
Function:
  Title: Parser for Mimecast TTP URL Protect (CCF Push)
  Version: "1.0.0"
  LastUpdated: "2026-07-06"
Category: Microsoft Sentinel Parser
FunctionName: MimecastTTPUrl
FunctionAlias: MimecastTTPUrl
FunctionQuery: |
  // Source: MimecastEvents_CL, mimecastEventType == "ttp_url"
  // Timestamp: payload.date = ISO-8601 with timezone offset (e.g. "2024-01-15T08:32:11+00:00")
  // Dedup key: SYNTHETIC — strcat(messageId|url|date). No native id field observed on TTP URL records.
  // Sample-verified: YES (Ttp_Url_CL records observed)
  let MimecastTTPUrl_view = view() {
      MimecastEvents_CL
      | where mimecastEventType == "ttp_url"
      | extend _b = todynamic(mimecast_body)
      | project
          ["Time Generated"]          = TimeGenerated,
          ["Event Time"]              = eventTime,
          ["Mimecast Event ID"]       = "ttp_url",
          ["Mimecast Event Category"] = "ttp_url",
          ["User Email Address"]      = recipientAddress,
          ["From User Email Address"] = senderAddress,
          ["Url"]                     = url,
          ["Category"]                = tostring(_b.category),
          ["Ttp Definition"]          = tostring(_b.ttpDefinition),
          ["Subject"]                 = subject,
          ["Action"]                  = action,
          ["Admin Override"]          = tostring(_b.adminOverride),
          ["User Override"]           = tostring(_b.userOverride),
          ["Scan Result"]             = scanResult,
          ["Sending IP"]              = senderIp,
          ["User Awareness Action"]   = tostring(_b.userAwarenessAction),
          ["Route"]                   = route,
          ["Message ID"]              = messageId,
          ["Creation Method"]         = tostring(_b.creationMethod),
          ["Actions"]                 = tostring(_b.actions),
          ["Email Parts Description"] = tostring(_b.emailPartsDescription),
          ["Tag Map Url Reputation Scan Type"] = tostring(_b.tagMap_UrlReputationScan_Type),
          ["Tag Map Url Reputation Scan Url"]  = tostring(_b.tagMap_UrlReputationScan_Url),
          ["Tag Map Url Reputation Scan Status"] = tostring(_b.tagMap_UrlReputationScan_Status),
          ["Tag Map Url Reputation Scan Url Block"] = tostring(_b.tagMap_UrlReputationScan_UrlBlock),
          ["Tag Map Advanced Phishing Credential Theft Evidence"] = tostring(_b.tagMap_AdvancedPhishing_CredentialTheftEvidence),
          ["Tag Map Advanced Phishing Credential Theft Tags"]     = tostring(_b.tagMap_AdvancedPhishing_CredentialTheftTags),
          ["Tag Map Customer Managed Urls Managed Url Entry"]     = tostring(_b.tagMap_CustomerManagedUrls_ManagedUrlEntry),
          ["Tag Map Customer Managed Urls Blocklisted"]           = tostring(_b.tagMap_CustomerManagedUrls_Blocklisted),
          ["Tag Map Customer Managed Urls Status"]                = tostring(_b.tagMap_CustomerManagedUrls_Status),
          ["Tag Map Dangerous File Ext Content Check Dangerous Mimetypes Url File Download"] = tostring(_b.tagMap_DangerousFileExt_ContentCheck_DangerousMimetypesUrlFileDownload),
          ["Tag Map Dangerous File Ext Content Check Dangerous Exts Url File Download"]     = tostring(_b.tagMap_DangerousFileExt_ContentCheck_DangerousExtsUrlFileDownload),
          ["Tag Map Dangerous File Ext Status"]                   = tostring(_b.tagMap_DangerousFileExt_Status),
          ["Tag Map Dangerous File Ext Inspect File Exts"]        = tostring(_b.tagMap_DangerousFileExt_Inspect_FileExts),
          ["Tag Map Dangerous File Ext Inspect Mime Types"]       = tostring(_b.tagMap_DangerousFileExt_Inspect_MimeTypes),
          ["Tag Map Av Scanning Content Check Av Signature Name"] = tostring(_b.tagMap_AvScanning_ContentCheck_AvSignatureName),
          ["Tag Map Av Scanning Content Check Av Signature File Exts"] = tostring(_b.tagMap_AvScanning_ContentCheck_AvSignatureFileExts),
          ["Advanced Phishing Result Credential Theft Brands"]    = tostring(_b.advancedPhishingResult_CredentialTheftBrands),
          ["Advanced Phishing Result Credential Theft Evidence"]  = tostring(_b.advancedPhishingResult_CredentialTheftEvidence),
          ["Advanced Phishing Result Credential Theft Tags"]      = tostring(_b.advancedPhishingResult_CredentialTheftTags)
  };
  MimecastTTPUrl_view
