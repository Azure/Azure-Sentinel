id: ba94166a-427e-453e-b772-d539a8bcd6fe
Function:
  Title: Parser for MimecastDLP
  Version: '1.0.0'
  LastUpdated: '2026-07-06'
Category: Microsoft Sentinel Parser
FunctionName: MimecastDLP
FunctionAlias: MimecastDLP
FunctionQuery: |
    MimecastEvents_CL
    | where mimecastEventType == 'seg_dlp'
    | summarize arg_max(TimeGenerated, *) by mimecastEventId
    | extend d = todynamic(mimecast_body)
    | project TimeGenerated,
        senderAddress = tostring(d.senderAddress), recipientAddress = tostring(d.recipientAddress),
        subject = tostring(d.subject), eventTime = todatetime(d.eventTime),
        route = tostring(d.route), policy = tostring(d.policy),
        action = tostring(d.action), messageId = tostring(d.messageId)
