id: 3a665ce4-b824-4a79-861b-c9f80ab4daba
name: SOCRadar Incident Correlation
description: |
  'Correlate SOCRadar alarms with Microsoft Sentinel incidents to track import status and identify gaps.'
description-detailed: |
  'This query examines Microsoft Sentinel incidents tagged with SOCRadar label to provide a summary of incident status and classification.
  Use this to verify that imported alarms are being properly triaged and to identify any gaps in the sync process.
  Unresolved incidents may indicate threats that have not been addressed by your security team.'
requiredDataConnectors:
  - connectorId: AzureSentinel
    dataTypes:
      - SecurityIncident
tactics:
  - InitialAccess
  - Reconnaissance
relevantTechniques:
  - T1078
  - T1590
severity: Medium
query: |
  SecurityIncident
  | where Labels has "SOCRadar"
  | summarize Count=count() by Status, Classification
  | extend AccountCustomEntity = strcat(Status, " - ", Classification)
  | order by Count desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: AccountCustomEntity
version: 1.0.0
