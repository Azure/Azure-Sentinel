id: afae44e5-e2e2-4f0e-9535-2aeb3766a847
name: SOCRadar Audit Analysis
description: |
  'Analyze SOCRadar audit log events by type to monitor the health of import and sync operations.'
description-detailed: |
  'This query summarizes SOCRadar audit log events to help detect errors or unexpected patterns in the integration workflow.
  Regular monitoring of audit events ensures that the SOCRadar integration is functioning correctly
  and alarms are being imported and synced without failures.'
requiredDataConnectors:
  - connectorId: SOCRadarAlarms
    dataTypes:
      - SOCRadarAuditLog_CL
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1562
severity: Low
query: |
  SOCRadarAuditLog_CL
  | summarize Count=count() by EventType
  | extend AccountCustomEntity = EventType
  | order by Count desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: AccountCustomEntity
version: 1.0.0
