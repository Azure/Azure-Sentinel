id: ffa80945-44de-4900-bda5-9f1410c60166
name: SOCRadar Critical Alarms
description: |
  'Hunt for high and critical severity SOCRadar alarms that may require immediate attention.'
description-detailed: |
  'This query filters SOCRadar alarms to show only High and Critical severity items.
  Use this to prioritize investigation of the most impactful threats detected by SOCRadar XTI platform
  including leaked credentials, brand impersonation, dark web mentions, and attack surface exposures.'
requiredDataConnectors:
  - connectorId: SOCRadarAlarms
    dataTypes:
      - SOCRadar_Alarms_CL
tactics:
  - InitialAccess
  - Impact
relevantTechniques:
  - T1078
  - T1566
severity: High
query: |
  SOCRadar_Alarms_CL
  | where Severity in ("High", "Critical")
  | project TimeGenerated, AlarmId, Title, AlarmMainType, AlarmSubType, Severity, Status
  | extend AccountCustomEntity = AlarmId, URLCustomEntity = strcat("https://platform.socradar.com/alarm/", AlarmId)
  | order by TimeGenerated desc
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: FullName
        columnName: AccountCustomEntity
  - entityType: URL
    fieldMappings:
      - identifier: Url
        columnName: URLCustomEntity
version: 1.0.0
