id: ca3c0ec6-eceb-4db0-8ca9-b12eea4f491c
Function:
  Title: Parser for ContrastADR
  Version: '1.1.0'
  LastUpdated: '2026-03-25'
Description: This file is to parse the data from Contrast ADR platform
Category: Microsoft Sentinel Parser
FunctionName: ContrastADR
FunctionAlias: ContrastADR
FunctionQuery: |
  let ContrastADRAttackEvents  = view () { 
      ContrastADRAttackEvents_CL
      | extend
          EventUid = column_ifexists("eventUuid", ""),
          IpAddr = column_ifexists("sourceIp", ""),
          SrcIpAddr = column_ifexists("sourceIp", ""),
          EventSeverity = column_ifexists("severity", ""),
          AlertSeverity = column_ifexists("severity", ""),
          EventResult = column_ifexists("result", ""),
          Rule = column_ifexists("rule", ""),
          ThreatId = column_ifexists("rule", ""),
          DvcId = column_ifexists("application_id", ""),
          Dvc = column_ifexists("application_name", ""),
          DvcInterface = column_ifexists("server_id", ""),
          DvcHostname = column_ifexists("server_name", ""),
          DvcDescription = column_ifexists("environment", ""),
          ThreatFirstReportedTime = column_ifexists("detectedTime", ""),
          Url = column_ifexists("attackPayload_url", ""),
          HttpRequestMethod = column_ifexists("request_method", ""),
          DvcAction = column_ifexists("request_method", ""),
          AlertName = column_ifexists("attackPayload_attackerInput_name", ""),
          AlertType = column_ifexists("attackPayload_attackerInput_inputType", ""),
          AlertVerdict = column_ifexists("attackPayload_attackerInput_confirmedAttack", ""),
          FilePath = column_ifexists("attackPayload_attackerInput_documentPath", ""),
          Query = column_ifexists("vectorAnalysis_vectorFields", dynamic([])),
          ProcessName = column_ifexists("codeLocation_method", ""),
          CloudProvider = column_ifexists("cloudProvider", ""),
          CloudResourceId = column_ifexists("cloudResourceId", "")
      | project 
          EventUid,
          IpAddr,
          SrcIpAddr,
          EventSeverity,
          AlertSeverity,
          EventResult,
          Rule,
          ThreatId,
          DvcId,
          Dvc,
          DvcInterface,
          DvcHostname,
          DvcDescription,
          ThreatFirstReportedTime,
          Url,
          HttpRequestMethod,
          DvcAction,
          AlertName,
          AlertType,
          AlertVerdict,
          FilePath,
          Query,
          ProcessName,
          CloudProvider,
          CloudResourceId
  };
  ContrastADRAttackEvents
