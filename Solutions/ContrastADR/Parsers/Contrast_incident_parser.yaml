id: ca3c0ec6-eceb-4db0-8ca9-b12eea4f491c
Function:
  Title: Parser for ContrastADR Incident Schema
  Version: '1.1.0'
  LastUpdated: '2026-03-25'
Description: This file is to parse the data from Contrast ADR platform
Category: Microsoft Sentinel Parser
FunctionName: ContrastADR_Incident
FunctionAlias: ContrastADR_Incident
FunctionQuery: |
  let ContrastADRIncidents  = view () { 
      ContrastADRIncidents_CL
      | extend 
          EventUid = column_ifexists("incidentId", ""),
          AlertName = column_ifexists("incidentName", ""),
          ThreatFirstReportedTime = column_ifexists("createdTime", ""),
          EventSeverity = column_ifexists("severity", ""),
          Url = column_ifexists("url", ""),
          RuleDescription = column_ifexists("summary", ""),
          Rule = column_ifexists("relatedRules", ""),
          AlertStatus = column_ifexists("status", ""),
          AttackRemediationSteps = column_ifexists("recommendedActions", "")
      | project 
          EventUid,
          AlertName,
          ThreatFirstReportedTime,
          EventSeverity,
          Url,
          RuleDescription,
          Rule,
          AlertStatus,
          AttackRemediationSteps
  };
  ContrastADRIncidents
