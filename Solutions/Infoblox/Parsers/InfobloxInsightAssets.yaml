id: cf2319ed-c0a3-4f20-a0fe-5bcf6d5b8ced
Function:
  Title: Parser for InfobloxInsightAssets
  Version: '1.0.0'
  LastUpdated: '2026-07-17'
Category: Microsoft Sentinel Parser
FunctionName: InfobloxInsightAssets
FunctionAlias: InfobloxInsightAssets
FunctionQuery: |
    InfobloxInsightAssets_CL
    | where InfobloxInsightLogType == "Asset"
    | extend
    InfobloxInsightID=column_ifexists('InfobloxInsightID', ''),
    InfobloxInsightLogType=column_ifexists('InfobloxInsightLogType', ''),
    SourceMACAddress=column_ifexists('mac_address', ''),
    EventCount=column_ifexists('total_events', ''),
    SourceIP=column_ifexists('ip_address', ''),
    LastSeen=column_ifexists('last_detected', ''),
    FirstSeen=column_ifexists('first_detected', ''),
    SourceUserName=column_ifexists('users', ''),
    Location=column_ifexists('locations', ''),
    DeviceName=column_ifexists('device_name', ''),
    Description=column_ifexists('description', ''),
    IsVerified=column_ifexists('is_verified', ''),
    IsRisky=column_ifexists('is_risky', ''),
    Indicators=column_ifexists('indicators', '')
    | project
    TimeGenerated,
    InfobloxInsightID,
    InfobloxInsightLogType,
    SourceMACAddress,
    EventCount,
    SourceIP,
    LastSeen,
    FirstSeen,
    SourceUserName,
    Location,
    DeviceName,
    Description,
    IsVerified,
    IsRisky,
    Indicators