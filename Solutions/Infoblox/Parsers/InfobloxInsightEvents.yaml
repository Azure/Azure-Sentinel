id: 8ec4cc47-a722-4266-8490-ce21b33301ce
Function:
  Title: Parser for InfobloxInsightEvents
  Version: '1.0.0'
  LastUpdated: '2026-07-17'
Category: Microsoft Sentinel Parser
FunctionName: InfobloxInsightEvents
FunctionAlias: InfobloxInsightEvents
FunctionQuery: |
    InfobloxInsightEvents_CL
    | where InfobloxInsightLogType == "Event"
    | extend
    InfobloxInsightID=column_ifexists('InfobloxInsightID', ''),
    InfobloxInsightLogType=column_ifexists('InfobloxInsightLogType', ''),
    ThreatConfidence=column_ifexists('threat_confidence', ''),
    DeviceName=column_ifexists('device_name', ''),
    SourceMACAddress=column_ifexists('mac_address', ''),
    InfobloxB1Network=column_ifexists('source', ''),
    InfobloxB1SrcOSVersion=column_ifexists('os_version', ''),
    InfobloxB1PolicyAction=column_ifexists('action', ''),
    InfobloxB1PolicyName=column_ifexists('policy', ''),
    SourceIP=column_ifexists('device_ip', ''),
    DestinationDnsDomain=column_ifexists('query', ''),
    InfobloxDNSQType=column_ifexists('query_type', ''),
    ThreatClass=column_ifexists('tclass', ''),
    ThreatProperty=column_ifexists('tproperty', ''),
    Detected = todatetime(trim_end(@"\+(.*?)", column_ifexists('detected_at', ''))),
    ThreatIndicator=iff(isnotempty(column_ifexists('indicator', '')), column_ifexists('indicator', ''), column_ifexists('query', '')),
    SourceUserName=column_ifexists('user', ''),
    DNSResponse=column_ifexists('response', ''),
    DNSView=column_ifexists('dns_view', ''),
    DeviceRegion=column_ifexists('device_region', ''),
    DeviceCountry=column_ifexists('device_country', ''),
    ResponseRegion=column_ifexists('response_region', ''),
    ResponseCountry=column_ifexists('response_country', ''),
    InfobloxB1FeedName=column_ifexists('feed', ''),
    InfobloxB1DHCPFingerprint=column_ifexists('dhcp_fingerprint', ''),
    ThreatLevel=column_ifexists('threat_level', ''),
    ThreatFamily=column_ifexists('tfamily', ''),
    ThreatActor=column_ifexists('actor_name', '')
    | project
    TimeGenerated,
    InfobloxInsightID,
    InfobloxInsightLogType,
    ThreatConfidence,
    DeviceName,
    SourceMACAddress,
    InfobloxB1Network,
    InfobloxB1SrcOSVersion,
    InfobloxB1PolicyAction,
    InfobloxB1PolicyName,
    SourceIP,
    DestinationDnsDomain,
    InfobloxDNSQType,
    ThreatClass,
    ThreatProperty,
    Detected,
    ThreatIndicator,
    SourceUserName,
    DNSResponse,
    DNSView,
    DeviceRegion,
    DeviceCountry,
    ResponseRegion,
    ResponseCountry,
    InfobloxB1FeedName,
    InfobloxB1DHCPFingerprint,
    ThreatLevel,
    ThreatFamily,
    ThreatActor