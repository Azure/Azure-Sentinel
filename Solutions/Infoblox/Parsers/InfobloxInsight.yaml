id: 3458118d-dfbc-4da2-8869-065effea1af7
Function:
  Title: Parser for InfobloxInsight
  Version: '1.0.0'
  LastUpdated: '2026-07-17'
Category: Microsoft Sentinel Parser
FunctionName: InfobloxInsight
FunctionAlias: InfobloxInsight
FunctionQuery: |
    InfobloxInsight_CL
    | where InfobloxInsightLogType == "Insight"
    | extend
      InfobloxInsightID=column_ifexists('insight_id', ''),
      InfobloxInsightLogType=column_ifexists('InfobloxInsightLogType', ''),
      Name=column_ifexists('name', ''),
      Description=column_ifexists('description', ''),
      Status=column_ifexists('status', ''),
      Priority=column_ifexists('severity', ''),
      DateCreated=column_ifexists('date_created', ''),
      EvaluationStartDate=column_ifexists('evaluation_start_date', ''),
      EvaluationEndDate=column_ifexists('evaluation_end_date', ''),
      TotalEvents=toint(column_ifexists('total_events', '')),
      TotalAssets=toint(column_ifexists('total_assets', '')),
      TotalIndicators=toint(column_ifexists('total_indicators', '')),
      TotalUsers=toint(column_ifexists('total_users', '')),
      TotalVerifiedAssets=toint(column_ifexists('total_verified_assets', '')),
      TotalUnverifiedAssets=toint(column_ifexists('total_unverified_assets', '')),
      ExpiringInDays=toint(column_ifexists('expiring_in_days', '')),
      ThreatProperties=column_ifexists('threat_properties', ''),
      TimeSavedSeconds=toint(column_ifexists('time_saved_seconds', '')),
      DataObservedVia=column_ifexists('DataObservedVia', ''),
      InsightDetail= column_ifexists('InsightDetail', ''),
      TopIndicators=column_ifexists('top_indicators', ''),
      TopAssets=column_ifexists('top_assets', ''),
      ThreatActor=column_ifexists('threat_actors', ''),
      Overview=column_ifexists('overview', ''),
      KeyRecommendations=column_ifexists('key_recommendations', '')
    | extend IncidentSeverity = case(Priority=="Critical", "High",
                        Priority=="High", "High",
                        Priority=="Medium", "Medium",
                        Priority =="Low","Low",
                        Priority =="Info","Informational",
                        "N/A" ),
            FirstSeen=DateCreated,
            EventsCount=TotalEvents
    | project
      TimeGenerated,
      InfobloxInsightID,
      InfobloxInsightLogType,
      Name,
      Description,
      Status,
      Priority,
      DateCreated,
      EvaluationStartDate,
      EvaluationEndDate,
      TotalEvents,
      TotalAssets,
      TotalIndicators,
      TotalUsers,
      TotalVerifiedAssets,
      TotalUnverifiedAssets,
      ExpiringInDays,
      ThreatProperties,
      TimeSavedSeconds,
      DataObservedVia,
      InsightDetail,
      TopIndicators,
      TopAssets,
      ThreatActor,
      Overview,
      KeyRecommendations,
      IncidentSeverity,
      FirstSeen,
      EventsCount