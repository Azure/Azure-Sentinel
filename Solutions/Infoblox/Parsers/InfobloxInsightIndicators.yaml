id: 1d19de92-c7a1-4cb2-876e-79a2c90f5a6c
Function:
  Title: Parser for InfobloxInsightIndicators
  Version: '1.0.0'
  LastUpdated: '2026-07-17'
Category: Microsoft Sentinel Parser
FunctionName: InfobloxInsightIndicators
FunctionAlias: InfobloxInsightIndicators
FunctionQuery: |
    let IPRegex = '[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}\\.[0-9]{1,3}';
    InfobloxInsightIndicators_CL
    | where InfobloxInsightLogType == "Indicator"
    | extend
    InfobloxInsightID=column_ifexists('InfobloxInsightID', ''),
    InfobloxInsightLogType=column_ifexists('InfobloxInsightLogType', ''),
    Status=column_ifexists('status', dynamic([])),
    EventCount=column_ifexists('total_events', ''),
    ThreatIndicator=column_ifexists('threat_indicator', ''),
    DestinationDnsDomain=column_ifexists('threat_indicator', ''),
    LastSeen=column_ifexists('last_detected', ''),
    FirstSeen=column_ifexists('first_detected', ''),
    ThreatActor=column_ifexists('threat_actors', ''),
    Detected=column_ifexists('detected_at', ''),
    VerifiedAssets=column_ifexists('verified_assets', ''),
    UnverifiedAssets=column_ifexists('unverified_assets', ''),
    SourceUserName=column_ifexists('users', ''),
    Description=column_ifexists('description', '')
    | extend isIP = isnotempty(extract(IPRegex, 0, ThreatIndicator))
    | extend ThreatLevel_Score=toint(column_ifexists('threat_level', ''))
    | extend ThreatLevel= case(ThreatLevel_Score==3, "High",
                       ThreatLevel_Score==2, "Medium",
                       ThreatLevel_Score==1, "Low",
                       ThreatLevel_Score == 0,"Info",
                       "N/A" )
    | extend ThreatConfidence_Score=toint(column_ifexists('confidence_level', ''))
    | extend ThreatConfidence= case(ThreatConfidence_Score==3, "High",
                       ThreatConfidence_Score==2, "Medium",
                       ThreatConfidence_Score==1, "Low",
                       ThreatConfidence_Score == 0,"Info",
                       "N/A" )
    | project
      TimeGenerated,
      InfobloxInsightID,
      InfobloxInsightLogType,
      Status,
      EventCount,
      ThreatIndicator,
      DestinationDnsDomain,
      LastSeen,
      FirstSeen,
      ThreatActor,
      Detected,
      VerifiedAssets,
      UnverifiedAssets,
      SourceUserName,
      Description,
      isIP,
      ThreatLevel_Score,
      ThreatLevel,
      ThreatConfidence_Score,
      ThreatConfidence