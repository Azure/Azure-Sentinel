id: 9b1a3b3e-7e16-4a3b-8a8f-7f1f2b1c0b02
name: Utimaco ESKM - New source IPs connecting to KMIP
description: |
  Identifies new client IPs connecting to Utimaco ESKM in the last 24 hours that were not seen in the prior 14 days.
description-detailed: |
  New source IPs against a key management appliance can indicate a newly onboarded service, a misconfigured client, or an unauthorized application reaching cryptographic material.
requiredDataConnectors:
  - connectorId: UtimacoESKMConnector
    dataTypes:
      - UtimacoESKMKmipServerLogs_CL
tactics:
  - InitialAccess
relevantTechniques:
  - T1133
query: |
  let lookback = 14d;
  let recent = 24h;
  let historical = UtimacoESKMKmipServerLogs_CL
      | where TimeGenerated between (ago(lookback) .. ago(recent))
      | where isnotempty(IP)
      | summarize by IP;
  UtimacoESKMKmipServerLogs_CL
  | where TimeGenerated > ago(recent)
  | where isnotempty(IP)
  | summarize EventCount = count(), FirstSeen = min(TimeGenerated), LastSeen = max(TimeGenerated), Users = make_set(User, 25), Operations = make_set(Operation, 50) by IP
  | join kind=leftanti (historical) on IP
  | extend IPCustomEntity = IP
entityMappings:
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: IPCustomEntity
version: 1.0.0
