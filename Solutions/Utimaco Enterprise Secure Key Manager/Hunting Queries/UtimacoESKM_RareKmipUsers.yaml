id: 9b1a3b3e-7e16-4a3b-8a8f-7f1f2b1c0b01
name: Utimaco ESKM - Rare KMIP users in the last 24 hours
description: |
  'Surfaces KMIP user accounts seen on Utimaco ESKM within the last 24 hours that were NOT observed in the prior 14 days. New or rarely-seen accounts may indicate a newly provisioned credential, lateral movement, or an unauthorized integration.'
requiredDataConnectors:
  - connectorId: UtimacoESKMConnector
    dataTypes:
      - UtimacoESKMKmipServerLogs_CL
tactics:
  - InitialAccess
  - Persistence
relevantTechniques:
  - T1078
query: |
  let lookback = 14d;
  let recent = 24h;
  let historical = UtimacoESKMKmipServerLogs_CL
      | where TimeGenerated between (ago(lookback) .. ago(recent))
      | where isnotempty(User)
      | summarize by User;
  UtimacoESKMKmipServerLogs_CL
  | where TimeGenerated > ago(recent)
  | where isnotempty(User)
  | summarize EventCount = count(), FirstSeen = min(TimeGenerated), LastSeen = max(TimeGenerated), SourceIPs = make_set(IP, 25), Operations = make_set(Operation, 50) by User
  | join kind=leftanti (historical) on User
  | extend AccountCustomEntity = User
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
