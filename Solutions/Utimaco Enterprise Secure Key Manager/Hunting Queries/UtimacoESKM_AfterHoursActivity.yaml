id: 9b1a3b3e-7e16-4a3b-8a8f-7f1f2b1c0b04
name: Utimaco ESKM - After-hours KMIP activity
description: |
  Identify KMIP operations against Utimaco ESKM outside typical business hours, defaulting to 20:00-06:00 UTC and weekends.
description-detailed: |
  Useful for hunting opportunistic or insider activity that deliberately avoids working-hours monitoring. Tune the time window and weekday filter for your environment.
requiredDataConnectors:
  - connectorId: UtimacoESKMConnector
    dataTypes:
      - UtimacoESKMKmipServerLogs_CL
tactics:
  - DefenseEvasion
relevantTechniques:
  - T1078
query: |
  let businessStartHourUTC = 6;
  let businessEndHourUTC = 20;
  UtimacoESKMKmipServerLogs_CL
  | where TimeGenerated > ago(7d)
  | where isnotempty(Operation)
  | extend HourOfDay = datetime_part("Hour", TimeGenerated), DayOfWeek = dayofweek(TimeGenerated)
  | where HourOfDay < businessStartHourUTC or HourOfDay >= businessEndHourUTC or DayOfWeek == 0d or DayOfWeek == 6d
  | where isnotempty(User)
  | summarize EventCount = count(), Operations = make_set(Operation, 50), ObjectTypes = make_set(ObjectType, 25), FirstSeen = min(TimeGenerated), LastSeen = max(TimeGenerated), SourceIPs = make_set(IP, 25) by User
  | order by EventCount desc
  | extend AccountCustomEntity = User
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: AccountCustomEntity
version: 1.0.0
