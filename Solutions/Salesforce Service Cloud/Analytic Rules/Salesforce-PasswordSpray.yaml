id: 64d16e62-1a17-4a35-9ea7-2b9fe6f07118
name: Potential Password Spray Attack
description: |
  'This query searches for failed Salesforce login attempts from more than 15 unique users within a 5-minute timeframe
  from the same source IP. This is a potential indication of a password spray attack.'
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: SalesforceServiceCloudCCPDefinition
    dataTypes:
      - SalesforceServiceCloud
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - CredentialAccess
relevantTechniques:
  - T1110
query: |
  let FailureThreshold = 15;
  SalesforceServiceCloud
  | where EventType =~ 'Login' and LoginStatus != 'LOGIN_NO_ERROR'
  | where LoginStatus in~ ('LOGIN_ERROR_INVALID_PASSWORD', 'LOGIN_ERROR_SSO_PWD_INVALID')
  | extend TimestampDerived = todatetime(TimestampDerived)
  | summarize UserCount=dcount(UserId), Users = make_set(UserId, 100) by ClientIp, bin(TimestampDerived, 5m)
  | where UserCount > FailureThreshold
entityMappings:
- entityType: IP
  fieldMappings:
  - identifier: Address
    columnName: ClientIp
alertDetailsOverride:
  alertDisplayNameFormat: Potential Password Spray Attack from {{ClientIp}}
  alertDescriptionFormat: '{{UserCount}} unique users failed login from {{ClientIp}} in {{TimestampDerived}} 5-minute bin;
    threshold is {{FailureThreshold}}.'
customDetails:
  Users: Users
  UserCount: UserCount
  ClientIp: ClientIp
  TimestampDerived: TimestampDerived
  FailureThreshold: FailureThreshold
version: 1.0.5
kind: Scheduled
