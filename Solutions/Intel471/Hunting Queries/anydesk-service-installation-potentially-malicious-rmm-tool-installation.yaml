id: 4103b086-f093-4084-9125-15b9a6c872b8
name: AnyDesk Service Installation - Potentially Malicious RMM Tool Installation
description: |
  Identifies when the AnyDesk service is installed onto a system. This can be legitimate if the organization allows AnyDesk, however if it is not a commonly utilized application, any service installations should be considered suspect.
requiredDataConnectors:
  - connectorId: SecurityEvents
    dataTypes:
      - Event
tactics:
  - CommandAndControl
  - Persistence
  - PrivilegeEscalation
relevantTechniques:
  - T1219
  - T1543.003
query: |
  Event
  | where EventID == "7045"
  | extend EventData = parse_xml(EventData).DataItem.EventData.Data
  | mv-expand bagexpansion=array EventData
  | extend EventName=tostring(EventData['@Name']), EventValue=EventData['#text']
  | evaluate pivot(EventName, any(EventValue), TimeGenerated, Computer, EventID)
  | where ImagePath has "AnyDesk" or ServiceName has_any (  "AnyDesk", "AnyDeskMSI" )
version: 1.0.0
