id: f4db38a6-c577-4006-8bb2-527b159b4937
Function:
  Title: Parser for Palo Alto Cortex XDR Incidents
  Version: '1.0.0'
  LastUpdated: '2026-07-22'
Category: Microsoft Sentinel Parser
FunctionName: PaloAltoCortexXDR_Incidents
FunctionAlias: PaloAltoCortexXDR_Incidents
FunctionQuery: |
    let CcpIncidents = view () {
        PaloAltoCortexXDR_Incidents_CL
        | extend
            TimeGenerated              = column_ifexists("TimeGenerated", datetime(null)),
            IncidentId                 = tostring(column_ifexists("IncidentId", "")),
            IncidentName               = tostring(column_ifexists("IncidentName", "")),
            CreationTime               = todatetime(column_ifexists("CreationTime", datetime(null))),
            ModificationTime           = todatetime(column_ifexists("ModificationTime", datetime(null))),
            DetectionTime              = todatetime(column_ifexists("DetectionTime", datetime(null))),
            Status                     = tostring(column_ifexists("Status", "")),
            Severity                   = tostring(column_ifexists("Severity", "")),
            Description                = tostring(column_ifexists("Description", "")),
            AlertCount                 = toint(column_ifexists("AlertCount", int(null))),
            LowSeverityAlertCount      = toint(column_ifexists("LowSeverityAlertCount", int(null))),
            MedSeverityAlertCount      = toint(column_ifexists("MedSeverityAlertCount", int(null))),
            HighSeverityAlertCount     = toint(column_ifexists("HighSeverityAlertCount", int(null))),
            CriticalSeverityAlertCount = toint(column_ifexists("CriticalSeverityAlertCount", int(null))),
            UserCount                  = toint(column_ifexists("UserCount", int(null))),
            HostCount                  = toint(column_ifexists("HostCount", int(null))),
            ResolveComment             = tostring(column_ifexists("ResolveComment", "")),
            ResolvedTimestamp          = todatetime(column_ifexists("ResolvedTimestamp", datetime(null))),
            XdrUrl                     = tostring(column_ifexists("XdrUrl", "")),
            Starred                    = tobool(column_ifexists("Starred", bool(null))),
            Hosts                      = todynamic(column_ifexists("Hosts", dynamic(null))),
            Users                      = todynamic(column_ifexists("Users", dynamic(null))),
            IncidentSources            = todynamic(column_ifexists("IncidentSources", dynamic(null))),
            WildfireHits               = toint(column_ifexists("WildfireHits", int(null))),
            AlertsGroupingStatus       = tostring(column_ifexists("AlertsGroupingStatus", "")),
            AlertCategories            = todynamic(column_ifexists("AlertCategories", dynamic(null))),
            OriginalTags               = todynamic(column_ifexists("OriginalTags", dynamic(null))),
            Tags                       = todynamic(column_ifexists("Tags", dynamic(null)))
        | project
            TimeGenerated, IncidentId, IncidentName, CreationTime, ModificationTime, DetectionTime,
            Status, Severity, Description, AlertCount, LowSeverityAlertCount, MedSeverityAlertCount,
            HighSeverityAlertCount, CriticalSeverityAlertCount, UserCount, HostCount, ResolveComment,
            ResolvedTimestamp, XdrUrl, Starred, Hosts, Users, IncidentSources, WildfireHits,
            AlertsGroupingStatus, AlertCategories, OriginalTags, Tags
    };
    let LegacyIncidents = view () {
        CortexXDR_Incidents_CL
        | project
            TimeGenerated,
            IncidentId = tostring(column_ifexists("incident_id_s", "")),
            IncidentName = "",
            CreationTime = unixtime_milliseconds_todatetime(tolong(column_ifexists("creation_time_d", real(null)))),
            ModificationTime = unixtime_milliseconds_todatetime(tolong(column_ifexists("modification_time_d", real(null)))),
            DetectionTime = datetime(null),
            Status = tostring(column_ifexists("status_s", "")),
            Severity = tostring(column_ifexists("severity_s", "")),
            Description = tostring(column_ifexists("description_s", "")),
            AlertCount = toint(column_ifexists("alert_count_d", real(null))),
            LowSeverityAlertCount = toint(column_ifexists("low_severity_alert_count_d", real(null))),
            MedSeverityAlertCount = toint(column_ifexists("med_severity_alert_count_d", real(null))),
            HighSeverityAlertCount = toint(column_ifexists("high_severity_alert_count_d", real(null))),
            CriticalSeverityAlertCount = toint(column_ifexists("critical_severity_alert_count_d", real(null))),
            UserCount = toint(column_ifexists("user_count_d", real(null))),
            HostCount = toint(column_ifexists("host_count_d", real(null))),
            ResolveComment = tostring(column_ifexists("resolve_comment_s", "")),
            ResolvedTimestamp = unixtime_milliseconds_todatetime(tolong(column_ifexists("resolved_timestamp_d", real(null)))),
            XdrUrl = tostring(column_ifexists("xdr_url_s", "")),
            Starred = tobool(column_ifexists("starred_b", false)),
            Hosts = todynamic(column_ifexists("hosts_s", "")),
            Users = todynamic(column_ifexists("users_s", "")),
            IncidentSources = todynamic(column_ifexists("incident_sources_s", "")),
            WildfireHits = toint(column_ifexists("wildfire_hits_d", real(null))),
            AlertsGroupingStatus = tostring(column_ifexists("alerts_grouping_status_s", "")),
            AlertCategories = todynamic(column_ifexists("alert_categories_s", "")),
            OriginalTags = todynamic(column_ifexists("original_tags_s", "")),
            Tags = todynamic(column_ifexists("tags_s", ""))
    };
    let EmptyIncidents =
        datatable(
            TimeGenerated: datetime,
            IncidentId: string,
            IncidentName: string,
            CreationTime: datetime,
            ModificationTime: datetime,
            DetectionTime: datetime,
            Status: string,
            Severity: string,
            Description: string,
            AlertCount: int,
            LowSeverityAlertCount: int,
            MedSeverityAlertCount: int,
            HighSeverityAlertCount: int,
            CriticalSeverityAlertCount: int,
            UserCount: int,
            HostCount: int,
            ResolveComment: string,
            ResolvedTimestamp: datetime,
            XdrUrl: string,
            Starred: bool,
            Hosts: dynamic,
            Users: dynamic,
            IncidentSources: dynamic,
            WildfireHits: int,
            AlertsGroupingStatus: string,
            AlertCategories: dynamic,
            OriginalTags: dynamic,
            Tags: dynamic
        )[];
    union isfuzzy=true EmptyIncidents, CcpIncidents, LegacyIncidents
