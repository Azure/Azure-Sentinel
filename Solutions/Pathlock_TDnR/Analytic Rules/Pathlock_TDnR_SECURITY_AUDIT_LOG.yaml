id: 2a3b4c5d-6e7f-4a0b-8c1d-2e3f4a5b6c56
name: Pathlock TDnR - SAP Security Audit Log Events
kind: Scheduled
description: >-
  Detects security-relevant events from the SAP Security Audit Log (SM20), forwarded by Pathlock
  Threat Detection and Response. The Security Audit Log captures critical security events including
  failed logons, authorization failures, and restricted transactions - anomalies here are
  strong indicators of attack activity or insider threats.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: Pathlock_TDnR
    dataTypes:
      - Pathlock_TDnR_CL
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
  - DefenseEvasion
relevantTechniques:
  - T1082
  - T1562
query: |
  Pathlock_TDnR_CL
  | where DataSource == "SECURITY_AUDIT_LOG"
  | project TimeGenerated, Sysid, DataSource, Eventid, Instance, Hostname, Bname,
            Tcode, Report, Area, Subid, SrcIp, DestIp, AffectedUser, LogLine,
            MsgType, MsgId, MsgNo, MessageV1, MessageV2, MessageV3, MessageV4, CentralTs
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: Bname
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: Hostname
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SrcIp
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AnyAlert
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
suppressionDuration: 5h
suppressionEnabled: false
version: 1.0.0
