id: 2a3b4c5d-6e7f-4a0b-8c1d-2e3f4a5b6c72
name: Pathlock TDnR - User Authorization Buffer Manipulation
kind: Scheduled
description: >-
  Detects unauthorized manipulations of the SAP user authorization buffer (USRBF2), forwarded by
  Pathlock Threat Detection and Response. Direct manipulation of the authorization buffer bypasses
  the normal role/profile assignment process and can grant arbitrary privileges to any user without
  leaving a trace in standard authorization management logs.
severity: High
status: Available
requiredDataConnectors:
  - connectorId: Pathlock_TDnR
    dataTypes:
      - Pathlock_TDnR_CL
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - PrivilegeEscalation
  - DefenseEvasion
relevantTechniques:
  - T1548
  - T1562
query: |
  Pathlock_TDnR_CL
  | where DataSource == "USER_AUTH_BUFFER"
  | project TimeGenerated, Sysid, DataSource, Eventid, Instance, Hostname, Bname,
            Tcode, Report, Area, Subid, SrcIp, DestIp, AffectedUser, LogLine,
            MsgType, MsgId, MsgNo, MessageV1, MessageV2, MessageV3, MessageV4, CentralTs
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: Bname
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: Hostname
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SrcIp
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AnyAlert
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
suppressionDuration: 5h
suppressionEnabled: false
version: 1.0.0
