id: 2a3b4c5d-6e7f-4a0b-8c1d-2e3f4a5b6c27
name: Pathlock TDnR - SAP HANA Database Audit Trail
kind: Scheduled
description: >-
  Detects security events from the SAP HANA tenant database audit trail, forwarded by Pathlock Threat
  Detection and Response. HANA audit anomalies may indicate unauthorized database access, privilege
  abuse, or attempts to read sensitive data directly from the HANA database.
severity: Medium
status: Available
requiredDataConnectors:
  - connectorId: Pathlock_TDnR
    dataTypes:
      - Pathlock_TDnR_CL
queryFrequency: 1h
queryPeriod: 1h
triggerOperator: gt
triggerThreshold: 0
tactics:
  - Discovery
  - CredentialAccess
relevantTechniques:
  - T1082
  - T1078
query: |
  Pathlock_TDnR_CL
  | where DataSource == "HANA_AUDIT_TRAIL"
  | project TimeGenerated, Sysid, DataSource, Eventid, Instance, Hostname, Bname,
            Tcode, Report, Area, Subid, SrcIp, DestIp, AffectedUser, LogLine,
            MsgType, MsgId, MsgNo, MessageV1, MessageV2, MessageV3, MessageV4, CentralTs
entityMappings:
  - entityType: Account
    fieldMappings:
      - identifier: Name
        columnName: Bname
  - entityType: Host
    fieldMappings:
      - identifier: HostName
        columnName: Hostname
  - entityType: IP
    fieldMappings:
      - identifier: Address
        columnName: SrcIp
eventGroupingSettings:
  aggregationKind: SingleAlert
incidentConfiguration:
  createIncident: true
  groupingConfiguration:
    enabled: true
    reopenClosedIncident: false
    lookbackDuration: 5h
    matchingMethod: AnyAlert
    groupByEntities: []
    groupByAlertDetails: []
    groupByCustomDetails: []
suppressionDuration: 5h
suppressionEnabled: false
version: 1.0.0
