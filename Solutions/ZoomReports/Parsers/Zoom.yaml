        SrcDvcModelNumber,
        Version,
        ActivityType,
        CustomAttributes,
        CallInNumber,
        CountryName,
        Duration,
        EndTime,
        HostEmail,
        HostName,
        HostId,
        MeetingId,
        MeetingType,
        PhoneNumber,
        Rate,
        SignaledNumber,
        StartTime,
        Total,
        Uuid,
        ReportDate,
        NewUsers
    };
    let ZoomV2_CL_dates_report_view = view () {
        ZoomV2_CL
        | where column_ifexists('EventType', '') == "dates"
        | summarize arg_max(TimeGenerated, *) by column_ifexists('ReportDate', '')
    };
    let ZoomV2_CL_other_reports_view = view () {
        ZoomV2_CL
        | where column_ifexists('EventType', '') != "dates"
    };
