id: 249f522d-995b-439f-910a-12741f7c0d8b
Function:
  Title: Parser for Zoom
  Version: '2.0.0'
  LastUpdated: '2025-04-27'
Category: Microsoft Sentinel Parser
FunctionName: Zoom
FunctionAlias: Zoom
FunctionQuery: |
    let Zoom_CL_dates_report_view = view () {
        Zoom_CL 
        | where event_type_s == "dates"
        | summarize arg_max(TimeGenerated, *) by date_s
    };
    let Zoom_CL_other_reports_view = view () {
        Zoom_CL 
        | where event_type_s != "dates"
    };
    let Zoom_CL_all_reports_view = view () { 
        union isfuzzy=true Zoom_CL_dates_report_view, Zoom_CL_other_reports_view
        | extend
        Date=column_ifexists('date_s', ''),
        EventDay=column_ifexists('date_s', ''),
        NewUsersCount=column_ifexists('new_users_d', ''),
        MeetingsCount=column_ifexists('meetings_d', ''),
        ParticipantsCount=column_ifexists('participants_d', ''),
        MeetingMinutes=column_ifexists('meeting_minutes_d', ''),
        EventType=column_ifexists('event_type_s', ''),
        EventName=column_ifexists('event_name_s', ''),
        EventMessage=column_ifexists('event_name_s', ''),
        Id=column_ifexists('id_s', ''),
        UserIdentity=column_ifexists('id_s', ''),
        Email=column_ifexists('email_s', ''),
        UserEmail=column_ifexists('email_s', ''),
        UserName=column_ifexists('user_name_s', ''),
        UserType=column_ifexists('type_d', ''),
        Dept=column_ifexists('dept_s', ''),
        Department=column_ifexists('dept_s', ''),
        LastClientVersion=column_ifexists('last_client_version_s', ''),
        DvcModelNumber=column_ifexists('last_client_version_s', ''),
        EventEndTime=column_ifexists('last_login_time_t', ''),
        LastLoginTime=column_ifexists('last_login_time_t', ''),
        CreateTime=column_ifexists('create_time_t', ''),
        EventCreationTime=column_ifexists('create_time_t', ''),
        Usage=column_ifexists('usage_s', ''),
        PlanUsage=column_ifexists('plan_usage_s', ''),
        FreeUsage=column_ifexists('free_usage_s', ''),
        Time=column_ifexists('time_t', ''),
        EventOriginalTime=column_ifexists('time_t', ''),
        Operator=column_ifexists('operator_s', ''),
        CategoryType=column_ifexists('category_type_s', ''),
        Action=column_ifexists('action_s', ''),
        EventOriginalMessage=column_ifexists('operation_detail_s', ''),
        OperationDetail=column_ifexists('operation_detail_s', ''),
        EventResult=column_ifexists('type_s', ''),
        IpAddress=column_ifexists('ip_address_s', ''),
        SrcIpAddr=column_ifexists('ip_address_s', ''),
        ClientType=column_ifexists('client_type_s', ''),
        SrcDvcModelName=column_ifexists('client_type_s', ''),
        SrcDvcModelNumber=column_ifexists('version_s', ''),
        Version=column_ifexists('version_s', ''),
        ActivityType='',
        CustomAttributes=dynamic(null),
        CallInNumber='',
        CountryName='',
        Duration=real(null),
        EndTime=datetime(null),
        HostEmail='',
        HostName='',
        HostId='',
        MeetingId=real(null),
        MeetingType='',
        PhoneNumber='',
        Rate=real(null),
        SignaledNumber='',
        StartTime=datetime(null),
        Total=real(null),
        Uuid='',
        ReportDate='',
        NewUsers=real(null),
        EventVendor="Zoom",
                    EventProduct="Zoom Reports"
        | project
                    TimeGenerated, 
                    EventVendor,
                    EventProduct,
                    Date,
        EventDay,
        NewUsersCount,
        MeetingsCount,
        ParticipantsCount,
        MeetingMinutes,
        EventType,
        EventName,
        EventMessage,
        Id,
        UserIdentity,
        Email,
        UserEmail,
        UserName,
        UserType,
        Dept,
        Department,
        LastClientVersion,
        DvcModelNumber,
        EventEndTime,
        LastLoginTime,
        CreateTime,
        EventCreationTime,
        Usage,
        PlanUsage,
        FreeUsage,
        Time,
        EventOriginalTime,
        Operator,
        CategoryType,
        Action,
        EventOriginalMessage,
        OperationDetail,
        EventResult,
        IpAddress,
        SrcIpAddr,
        ClientType,
        SrcDvcModelName,
        SrcDvcModelNumber,
        Version,
        ActivityType,
        CustomAttributes,
        CallInNumber,
        CountryName,
        Duration,
        EndTime,
        HostEmail,
        HostName,
        HostId,
        MeetingId,
        MeetingType,
        PhoneNumber,
        Rate,
        SignaledNumber,
        StartTime,
        Total,
        Uuid,
        ReportDate,
        NewUsers
    };
    let ZoomV2_CL_dates_report_view = view () {
        ZoomV2_CL
        | where EventType == "dates"
        | summarize arg_max(TimeGenerated, *) by ReportDate
    };
    let ZoomV2_CL_other_reports_view = view () {
        ZoomV2_CL
        | where EventType != "dates"
    };
    let ZoomV2_CL_all_reports_view = view () {
        union isfuzzy=true ZoomV2_CL_dates_report_view, ZoomV2_CL_other_reports_view
        | extend
        Date=column_ifexists('ReportDate', ''),
        EventDay=column_ifexists('ReportDate', ''),
        NewUsersCount=tostring(column_ifexists('NewUsers', '')),
        MeetingsCount=tostring(column_ifexists('Meetings', '')),
        ParticipantsCount=tostring(column_ifexists('Participants', '')),
        EventMessage=column_ifexists('EventName', ''),
        UserIdentity=column_ifexists('Id', ''),
        UserEmail=column_ifexists('Email', ''),
        Department=column_ifexists('Dept', ''),
        DvcModelNumber=column_ifexists('LastClientVersion', ''),
        EventEndTime=column_ifexists('LastLoginTime', ''),
        EventCreationTime=column_ifexists('CreateTime', ''),
        EventOriginalTime=column_ifexists('Time', ''),
        EventOriginalMessage=column_ifexists('OperationDetail', ''),
        EventResult=column_ifexists('ActivityType', ''),
        UserType=column_ifexists('ActivityType', ''),
        SrcIpAddr=column_ifexists('IpAddress', ''),
        SrcDvcModelName=column_ifexists('ClientType', ''),
        SrcDvcModelNumber=column_ifexists('Version', ''),
        EventVendor="Zoom",
        EventProduct="Zoom Reports"
        | project
                    TimeGenerated, 
                    EventVendor,
                    EventProduct,
                    Date,
        EventDay,
        NewUsersCount,
        MeetingsCount,
        ParticipantsCount,
        MeetingMinutes,
        EventType,
        EventName,
        EventMessage,
        Id,
        UserIdentity,
        Email,
        UserEmail,
        UserName,
        UserType,
        Dept,
        Department,
        LastClientVersion,
        DvcModelNumber,
        EventEndTime,
        LastLoginTime,
        CreateTime,
        EventCreationTime,
        Usage,
        PlanUsage,
        FreeUsage,
        Time,
        EventOriginalTime,
        Operator,
        CategoryType,
        Action,
        EventOriginalMessage,
        OperationDetail,
        EventResult,
        IpAddress,
        SrcIpAddr,
        ClientType,
        SrcDvcModelName,
        SrcDvcModelNumber,
        Version,
        ActivityType,
        CustomAttributes,
        CallInNumber,
        CountryName,
        Duration,
        EndTime,
        HostEmail,
        HostName,
        HostId,
        MeetingId,
        MeetingType,
        PhoneNumber,
        Rate,
        SignaledNumber,
        StartTime,
        Total,
        Uuid,
        ReportDate,
        NewUsers
    };
    union isfuzzy=true Zoom_CL_all_reports_view, ZoomV2_CL_all_reports_view