id: c2acc93e-23c8-4d0c-87d7-eee7064e8fec
name: PRODAFT USTA - Infostealer exposure across corporate identities
description: |
  'Summarizes corporate credential exposure from PRODAFT USTA Account Takeover Prevention
  tickets, grouped by company and victim country, with the distinct victim hosts and the
  malware families involved. Useful for spotting concentrations of infostealer activity
  affecting your identities.'
requiredDataConnectors:
  - connectorId: PRODAFTUstaATPCCPDefinition
    dataTypes:
      - PRODAFTUstaCompromisedCredentials_CL
tactics:
  - CredentialAccess
relevantTechniques:
  - T1555
query: |
  PRODAFTUstaCompromisedCredentials
  | where IsCorporate == true
  | summarize
      Credentials = count(),
      Identities = dcount(Username),
      Hosts = dcount(VictimComputerName),
      MalwareFamilies = make_set(VictimMalware, 25),
      FirstSeen = min(Created),
      LastSeen = max(Created)
      by CompanyName, VictimCountry
  | sort by Credentials desc
version: 1.0.0
