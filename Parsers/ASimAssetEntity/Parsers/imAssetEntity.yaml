Parser:
  Title: Asset Entity ASIM filtering parser
  Version: '0.1.0'
  LastUpdated: Mar 03, 2026
Product:
  Name: Source agnostic
Normalization:
  Schema: AssetEntity
  Version: '0.1.0'
References:
- Title: ASIM Asset Entity Schema
  Link: https://aka.ms/ASimAssetEntityDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
Description: |
    This ASIM parser supports filtering and normalizing Asset Entity logs from all supported sources to the ASIM 'AssetEntity' normalized schema.
ParserName: imAssetEntity
EquivalentBuiltInParser: _Im_AssetEntity
Parsers:
  - _Im_AssetEntity_Empty
ParserParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: entityid_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: entityname_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: assettype_in
    Type: string
    Default: '*'
  - Name: path_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: assetowner_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: entitysource_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: pack
    Type: bool
    Default: false
ParserQuery: |
  let DisabledParsers=materialize(_GetWatchlist('ASimDisabledParsers') | where SearchKey in ('Any', 'ExcludeimAssetEntity') | extend SourceSpecificParser=column_ifexists('SourceSpecificParser','') | distinct SourceSpecificParser | where isnotempty(SourceSpecificParser));
  let vimBuiltInDisabled=toscalar('ExcludevimAssetEntity' in (DisabledParsers) or 'Any' in (DisabledParsers)); 
  let parser=(
    starttime: datetime=datetime(null), 
    endtime: datetime=datetime(null), 
    entityid_has_any: dynamic=dynamic([]),
    entityname_has_any: dynamic=dynamic([]),
    assettype_in: string='*',
    path_has_any: dynamic=dynamic([]),
    assetowner_has_any: dynamic=dynamic([]),
    entitysource_has_any: dynamic=dynamic([]),
    pack:bool=false)
  {
  union isfuzzy=true
    vimAssetEntityEmpty
  };
  parser (starttime=starttime, endtime=endtime, entityid_has_any=entityid_has_any, entityname_has_any=entityname_has_any, assettype_in=assettype_in, path_has_any=path_has_any, assetowner_has_any=assetowner_has_any, entitysource_has_any=entitysource_has_any, pack=pack)
