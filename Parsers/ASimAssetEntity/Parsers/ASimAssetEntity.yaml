Parser:
  Title: Asset Entity ASIM parser
  Version: "0.1.0"
  LastUpdated: Mar 03, 2026
Product:
  Name: Source agnostic
Normalization:
  Schema: AssetEntity
  Version: '0.1.0'
References:
- Title: ASIM Asset Entity Schema
  Link: https://aka.ms/ASimAssetEntityDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
Description: |
  This ASIM parser supports normalizing Asset Entity logs from all supported sources to the ASIM Asset Entity normalized schema.
ParserName: ASimAssetEntity
EquivalentBuiltInParser: _ASim_AssetEntity
Parsers:
  - _Im_AssetEntity_Empty
ParserParams:
  - Name: pack
    Type: bool
    Default: false
ParserQuery: |
  let DisabledParsers=materialize(_GetWatchlist('ASimDisabledParsers') | where SearchKey in ('Any', 'ExcludeASimAssetEntity') | extend SourceSpecificParser=column_ifexists('SourceSpecificParser','') | distinct SourceSpecificParser| where isnotempty(SourceSpecificParser));
  let ASimBuiltInDisabled=toscalar('ExcludeASimAssetEntity' in (DisabledParsers) or 'Any' in (DisabledParsers)); 
  let parser=(pack:bool=false){
  union isfuzzy=true
    vimAlertEventEmpty
  }; 
  parser (pack=pack)
