Parser:
  Title: ASIM Authentication parser for Fortinet - Fortigate
  Version: '0.1.0'
  LastUpdated: Mar 10, 2026
Product:
  Name: Cynerio
Normalization:
  Schema: Authentication
  Version: '0.1.4'
References:
- Title: ASIM Authentication Schema
  Link: https://aka.ms/ASimAuthenticationDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
- Title: FortiGate Documentation
  Link: 
    https://docs.fortinet.com/
Description: |
  This ASIM parser supports normalizing Fortinet - Fortigate administrator authentication logs to the ASIM Authentication normalized schema.
ParserName: ASimAuthenticationCynerioCynerio
EquivalentBuiltInParser: _ASim_Authentication_CynerioCynerio
ParserParams:
  - Name: disabled
    Type: bool
    Default: false
ParserQuery: |
  CynerioEvent_CL
  | extend
      EventProduct = "Cynerio",
      EventVendor = "Cynerio"