Parser:
  Title: Authentication ASIM filtering parser for Cisco FTD Syslog Message
  Version: '0.1.0'
  LastUpdated: Jun 29, 2026
Product:
  Name: Cisco FTD
Normalization:
  Schema: Authentication
  Version: '0.1.4'
References:
- Title: ASIM Authentication Schema
  Link: https://aka.ms/ASimAuthenticationDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
- Title: About Cisco FTD System Log Messages
  Link: https://www.cisco.com/c/en/us/td/docs/security/firepower/Syslogs/fptd_syslog_guide/about.html
Description: |
  This ASIM filtering parser supports normalizing authentication events, collected from Cisco FTD devices using the AMA agent into Syslog to the ASIM Authentication schema.
ParserName: vimAuthenticationCiscoFTD
EquivalentBuiltInParser: _Im_Authentication_CiscoFTD
ParserParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: username_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: targetappname_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: srcipaddr_has_any_prefix
    Type: dynamic
    Default: dynamic([])
  - Name: srchostname_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: eventtype_in
    Type: dynamic
    Default: dynamic([])
  - Name: eventresultdetails_in
    Type: dynamic
    Default: dynamic([])
  - Name: eventresult
    Type: string
    Default: '*'
  - Name: disabled
    Type: bool
    Default: false
ParserQuery: |
  let parser = (
    starttime: datetime=datetime(null), 
    endtime: datetime=datetime(null), 
    username_has_any: dynamic = dynamic([]),
    targetappname_has_any: dynamic = dynamic([]),
    srcipaddr_has_any_prefix: dynamic = dynamic([]),
    srchostname_has_any: dynamic = dynamic([]),
    eventtype_in: dynamic = dynamic([]),
    eventresultdetails_in: dynamic = dynamic([]),
    eventresult: string = '*',
    disabled: bool=false) {
  let FTDLogs = Syslog
  | where not(disabled)
  | where (isnull(starttime) or TimeGenerated >= starttime)
    and (isnull(endtime) or TimeGenerated <= endtime)
    and (array_length(targetappname_has_any) == 0)
    and (array_length(eventtype_in) == 0 or "Logon" in~ (eventtype_in))
  | where SyslogMessage startswith "%FTD-5-199017"
  | where (array_length(srchostname_has_any) == 0 or HostName has_any (srchostname_has_any))
    and (array_length(srcipaddr_has_any_prefix) == 0 or has_any_ipv4_prefix(SyslogMessage, srcipaddr_has_any_prefix))
    and ((array_length(username_has_any) == 0) or SyslogMessage has_any (username_has_any))
  | extend EventType = "Logon";
  let LogonSuccessful = FTDLogs
  | where SyslogMessage has "Accepted password"
  | parse SyslogMessage with * "Accepted password for " TargetUsername " from " SrcIpAddr " port " SrcPortNumber:int " " *
  | extend EventResult = "Success";
  let LogonFailure = FTDLogs
  | where SyslogMessage has "Failed password"
  | parse SyslogMessage with * "Failed password for invalid user " TargetUsername " from " SrcIpAddr " port " SrcPortNumber:int " " *
  | extend EventResult = "Failure",
    EventResultDetails = "Incorrect password";
  union LogonSuccessful, LogonFailure
  | where (eventresult == "*" or eventresult =~ EventResult)
    and (array_length(eventresultdetails_in) == 0 or EventResultDetails in~ (eventresultdetails_in))
    and (array_length(username_has_any) == 0 or TargetUsername has_any (username_has_any))
    and (array_length(srcipaddr_has_any_prefix) == 0 or has_any_ipv4_prefix(SrcIpAddr, srcipaddr_has_any_prefix))
  | extend temp_isMatchTargetUsername = TargetUsername has_any(username_has_any)
  | extend ASimMatchingUsername = case(
    array_length(username_has_any) == 0, "-",
    temp_isMatchTargetUsername, "TargetUsername",
    "No match"
  )
  | extend
    EventVendor = "Cisco",
    EventProduct = "FTD",
    EventSchema = "Authentication",
    EventSchemaVersion = "0.1.4",
    EventStartTime = TimeGenerated,
    EventEndTime = TimeGenerated,
    EventCount = int(1),
    Type = "Syslog",
    DvcHostname = coalesce(Computer, HostName)
  | project-rename
    TargetIpAddr = HostIP,
    EventOriginalSeverity = SeverityLevel,
    EventOriginalResultDetails = SyslogMessage
  | extend
    EventSeverity = _ASIM_LookupSyslogSeverityLevel(EventOriginalSeverity),
    TargetUsernameType = "Simple",
    User = TargetUsername,
    IpAddr = SrcIpAddr,
    Dvc = TargetIpAddr
  | project
    TimeGenerated,
    Type,
    EventVendor,
    EventProduct,
    EventSchema,
    EventSchemaVersion,
    EventStartTime,
    EventEndTime,
    EventCount,
    EventType,
    EventResult,
    DvcHostname,
    TargetIpAddr,
    EventOriginalSeverity,
    EventSeverity,
    TargetUsername,
    SrcIpAddr,
    SrcPortNumber,
    EventOriginalResultDetails,
    EventResultDetails,
    TargetUsernameType,
    User,
    IpAddr,
    Dvc,
    ASimMatchingUsername
  };
  parser(starttime=starttime,
        endtime=endtime,
        username_has_any=username_has_any,
        targetappname_has_any=targetappname_has_any,
        srcipaddr_has_any_prefix=srcipaddr_has_any_prefix,
        srchostname_has_any=srchostname_has_any,
        eventtype_in=eventtype_in,
        eventresultdetails_in=eventresultdetails_in,
        eventresult=eventresult,
        disabled=disabled)