Parser:
  Title: Audit Event ASIM parser for Azure Key Vault
  Version: '0.1.0'
  LastUpdated: March 4, 2026
Product:
  Name: Azure Key Vault
Normalization:
  Schema: AuditEvent
  Version: '0.1.2'
References:
- Title: ASIM Audit Event Schema
  Link: https://aka.ms/ASimAuditEventDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
Description: |
  This ASIM parser supports normalizing Audit Event activity in Azure Key Vault)
ParserName: ASimAuditEventAAzureKeyVault
EquivalentBuiltInParser: _ASim_AuditEvent_AzureKeyVault
ParserParams:
  - Name: disabled
    Type: bool
    Default: false
ParserQuery: |
  let KeyVaultOperationLookup = datatable (OperationName:string, EventType:string)
    [
        "VaultGet", "Read",
        "VaultPut", "Set",
        "VaultDelete", "Delete",
        "VaultPatch", "Set",
        "VaultList", "Read",
        "SecretGet", "Read",
        "SecretSet", "Set",
        "SecretDelete", "Delete",
        "SecretList", "Read",
        "SecretPurge", "Delete",
        "SecretBackup", "Read",
        "SecretRestore", "Set",
        "SecretRecover", "Set",
        "KeyGet", "Read",
        "KeyCreate", "Create",
        "KeyDelete", "Delete",
        "KeyList", "Read",
        "KeyUpdate", "Set",
        "KeyPurge", "Delete",
        "KeyBackup", "Read",
        "KeyRestore", "Set",
        "KeyRecover", "Set",
        "KeySign", "Execute",
        "KeyVerify", "Execute",
        "KeyWrap", "Execute",
        "KeyUnwrap", "Execute",
        "KeyEncrypt", "Execute",
        "KeyDecrypt", "Execute",
        "CertificateGet", "Read",
        "CertificateCreate", "Create",
        "CertificateDelete", "Delete",
        "CertificateList", "Read",
        "CertificateUpdate", "Set",
        "CertificatePurge", "Delete",
        "CertificateRecover", "Set",
        "CertificateImport", "Create",
        "Authentication", "Execute",
        "BackupCreate", "Create",
        "BackupStatus", "Read",
        "ListNetworkSecurityPerimeterConfiguration", "Read",
        "ListPrivateEndpointConnections", "Read",
        "AccessPolicyMerge", "Set"
    ];
    let KeyVaultObjectTypeLookup = datatable (OperationName:string, ObjectType:string)
    [
        "VaultGet", "Vault",
        "VaultPut", "Vault",
        "VaultDelete", "Vault",
        "VaultPatch", "Vault",
        "VaultList", "Vault",
        "SecretGet", "Secret",
        "SecretSet", "Secret",
        "SecretDelete", "Secret",
        "SecretList", "Secret",
        "SecretPurge", "Secret",
        "SecretBackup", "Secret",
        "SecretRestore", "Secret",
        "SecretRecover", "Secret",
        "KeyGet", "Key",
        "KeyCreate", "Key",
        "KeyDelete", "Key",
        "KeyList", "Key",
        "KeyUpdate", "Key",
        "KeyPurge", "Key",
        "KeyBackup", "Key",
        "KeyRestore", "Key",
        "KeyRecover", "Key",
        "KeySign", "Key",
        "KeyVerify", "Key",
        "KeyWrap", "Key",
        "KeyUnwrap", "Key",
        "KeyEncrypt", "Key",
        "KeyDecrypt", "Key",
        "CertificateGet", "Certificate",
        "CertificateCreate", "Certificate",
        "CertificateDelete", "Certificate",
        "CertificateList", "Certificate",
        "CertificateUpdate", "Certificate",
        "CertificatePurge", "Certificate",
        "CertificateRecover", "Certificate",
        "CertificateImport", "Certificate",
        "Authentication", "Vault",
        "BackupCreate", "Vault",
        "BackupStatus", "Vault"
    ];
    let AzDiagnostics = (disabled:bool=false){
        AzureDiagnostics
        | where not(disabled)
        | where ResourceType == "VAULTS"
        | where Category == "AuditEvent"
        | extend HttpStatusCode = toint(httpStatusCode_d)
        | extend
            ActorUsername = identity_claim_http_schemas_xmlsoap_org_ws_2005_05_identity_claims_upn_s,
            ActorUsernameType = iff(isnotempty(identity_claim_http_schemas_xmlsoap_org_ws_2005_05_identity_claims_upn_s), "UPN", ""),
            ActorUserId = identity_claim_http_schemas_microsoft_com_identity_claims_objectidentifier_g,
            ActorUserIdType = case(
                isnotempty(identity_claim_http_schemas_microsoft_com_identity_claims_objectidentifier_g), "AADID",
                isnotempty(identity_claim_appid_g), "AADID",
                ""
            )
        | extend Object = coalesce(id_s, requestUri_s, OperationName)
    };
    let ResourceSpecific = (disabled:bool=false){
        AZKVAuditLogs
        | where not(disabled)
        | extend Identity_claims = todynamic(Identity).claim
        | extend
            ActorUsername = tostring(Identity_claims["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/upn"]),
            ActorUsernameType = iff(isnotempty(tostring(Identity_claims["http://schemas.xmlsoap.org/ws/2005/05/identity/claims/upn"])), "UPN", ""),
            ActorUserId = Identity_claims["http://schemas.microsoft.com/identity/claims/objectidentifier"],
            ActorUserIdType = case(
                isnotempty(tostring(Identity_claims["http://schemas.microsoft.com/identity/claims/objectidentifier"])), "AADID",
                isnotempty(tostring(Identity_claims.appid)), "AADID",
                ""
            )
        | extend Object = coalesce(Id, RequestUri, OperationName)
    };
    let Combined = (disabled:bool=false) {
        union AzDiagnostics(disabled), ResourceSpecific(disabled)
        | lookup KeyVaultOperationLookup on OperationName
        | extend EventType = iff(isempty(EventType), "Other", EventType)
        | lookup KeyVaultObjectTypeLookup on OperationName
        | extend ObjectType = iff(isempty(ObjectType), "Other", ObjectType)
        | extend
            EventCount = int(1),
            EventStartTime = TimeGenerated,
            EventEndTime = TimeGenerated,
            EventProduct = "Azure Key Vault",
            EventVendor = "Microsoft",
            EventSchemaVersion = "0.1.2",
            EventSchema = "AuditEvent",
            TargetAppName = "Azure Key Vault",
            TargetAppType = "CSP",
            Operation = OperationName
        | project-rename
            SrcIpAddr = CallerIPAddress,
            EventOriginalUid = CorrelationId,
            DvcId = _ResourceId
        | extend
            DvcIdType = iff(isnotempty(DvcId), "AzureResourceID", "")
        | extend
            IpAddr = SrcIpAddr,
            User = ActorUsername,
            Application = TargetAppName,
            Dst = TargetAppName,
            Src = SrcIpAddr,
            Dvc = EventProduct,
            EventUid = _ItemId
        | extend
            EventResult = case(
                HttpStatusCode between (200 .. 299), "Success",
                HttpStatusCode >= 400, "Failure",
                "NA"
            ),
            EventResultDetails = case(
                HttpStatusCode == 200, "",
                HttpStatusCode == 201, "Created",
                HttpStatusCode == 202, "Accepted",
                HttpStatusCode == 204, "No content",
                HttpStatusCode == 400, "Bad request",
                HttpStatusCode == 401, "Unauthorized",
                HttpStatusCode == 403, "Unauthorized",
                HttpStatusCode == 404, "Not found",
                HttpStatusCode == 409, "Conflict",
                HttpStatusCode == 429, "Throttled",
                HttpStatusCode >= 500, "Internal error",
                ""
            ),
            EventOriginalResultDetails = strcat("HTTP status code: ", tostring(HttpStatusCode), iff(ResultDescription != "", strcat(", ", ResultDescription), ""))    
        | extend EventSeverity = iff(EventResult == "Failure", "Low", "Informational")
        | project
            TimeGenerated,
            Type,
            EventCount,
            EventStartTime,
            EventEndTime,
            EventType,
            EventResult,
            EventResultDetails,
            EventOriginalResultDetails,
            EventSeverity,
            EventProduct,
            EventVendor,
            EventSchema,
            EventSchemaVersion,
            EventOriginalUid,
            Operation,
            Object,
            ObjectType,
            ActorUsername,
            ActorUsernameType,
            ActorUserIdType,
            TargetAppName,
            TargetAppType,
            SrcIpAddr,
            DvcId,
            DvcIdType,
            IpAddr,
            User,
            Application,
            EventUid,
            Dst,
            Src,
            Dvc
    };
    Combined (disabled)