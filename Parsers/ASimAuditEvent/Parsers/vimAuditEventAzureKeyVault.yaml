Parser:
  Title: Audit Event ASIM filtering parser for Azure Key Vault
  Version: '0.1.0'
  LastUpdated: March 4, 2026
Product:
  Name: Azure Key Vault
Normalization:
  Schema: AuditEvent
  Version: '0.1.2'
References:
- Title: ASIM Audit Event Schema
  Link: https://aka.ms/ASimAuditEventDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
Description: |
  This ASIM parser supports normalizing Audit Event activity in Azure Key Vault. It combines logs from AzureDiagnostics and AZKVAuditLogs tables to provide a comprehensive view of audit events in Azure Key Vault.
ParserName: vimAuditEventAzureKeyVault
EquivalentBuiltInParser: _Im_AuditEvent_AzureKeyVault
ParserParams:
  - Name: disabled
    Type: bool
    Default: false
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: srcipaddr_has_any_prefix
    Type: dynamic
    Default: dynamic([])
  - Name: operation_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: eventtype_in
    Type: dynamic
    Default: dynamic([])
  - Name: eventresult
    Type: string
    Default: '*'
  - Name: actorusername_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: object_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: newvalue_has_any
    Type: dynamic
    Default: dynamic([])
ParserQuery: |
  let KeyVaultOperationLookup = datatable (OperationName:string, EventType:string)
    [
        "VaultGet", "Read",
        "VaultPut", "Set",
        "VaultDelete", "Delete",
        "VaultPatch", "Set",
        "VaultList", "Read",
        "SecretGet", "Read",
        "SecretSet", "Set",
        "SecretDelete", "Delete",
        "SecretList", "Read",
        "SecretPurge", "Delete",
        "SecretBackup", "Read",
        "SecretRestore", "Set",
        "SecretRecover", "Set",
        "KeyGet", "Read",
        "KeyCreate", "Create",
        "KeyDelete", "Delete",
        "KeyList", "Read",
        "KeyUpdate", "Set",
        "KeyPurge", "Delete",
        "KeyBackup", "Read",
        "KeyRestore", "Set",
        "KeyRecover", "Set",
        "KeySign", "Execute",
        "KeyVerify", "Execute",
        "KeyWrap", "Execute",
        "KeyUnwrap", "Execute",
        "KeyEncrypt", "Execute",
        "KeyDecrypt", "Execute",
        "CertificateGet", "Read",
        "CertificateCreate", "Create",
        "CertificateDelete", "Delete",
        "CertificateList", "Read",
        "CertificateUpdate", "Set",
        "CertificatePurge", "Delete",
        "CertificateRecover", "Set",
        "CertificateImport", "Create",
        "Authentication", "Execute",
        "BackupCreate", "Create",
        "BackupStatus", "Read",
        "ListNetworkSecurityPerimeterConfiguration", "Read",
        "ListPrivateEndpointConnections", "Read",
        "AccessPolicyMerge", "Set"
    ];
    let KeyVaultObjectTypeLookup = datatable (OperationName:string, ObjectType:string)
    [
        "VaultGet", "Vault",
        "VaultPut", "Vault",
        "VaultDelete", "Vault",
        "VaultPatch", "Vault",
        "VaultList", "Vault",
        "SecretGet", "Secret",
        "SecretSet", "Secret",
        "SecretDelete", "Secret",
        "SecretList", "Secret",
        "SecretPurge", "Secret",
        "SecretBackup", "Secret",
        "SecretRestore", "Secret",
        "SecretRecover", "Secret",
        "KeyGet", "Key",
        "KeyCreate", "Key",
        "KeyDelete", "Key",
        "KeyList", "Key",
        "KeyUpdate", "Key",
        "KeyPurge", "Key",
        "KeyBackup", "Key",
        "KeyRestore", "Key",
        "KeyRecover", "Key",
        "KeySign", "Key",
        "KeyVerify", "Key",
        "KeyWrap", "Key",
        "KeyUnwrap", "Key",
        "KeyEncrypt", "Key",
        "KeyDecrypt", "Key",
        "CertificateGet", "Certificate",
        "CertificateCreate", "Certificate",
        "CertificateDelete", "Certificate",
        "CertificateList", "Certificate",
        "CertificateUpdate", "Certificate",
        "CertificatePurge", "Certificate",
        "CertificateRecover", "Certificate",
        "CertificateImport", "Certificate",
        "Authentication", "Vault",
        "BackupCreate", "Vault",
        "BackupStatus", "Vault"
    ];
    let AzDiagnostics = (disabled: bool = false, starttime: datetime=datetime(null), endtime: datetime=datetime(null), eventresult: string='*', operation_has_any: dynamic=dynamic([]), eventtype_in: dynamic=dynamic([]), srcipaddr_has_any_prefix: dynamic=dynamic([]), actorusername_has_any: dynamic=dynamic([]), object_has_any: dynamic=dynamic([]), newvalue_has_any: dynamic=dynamic([])){
        AzureDiagnostics
        | where not(disabled)
        | where ResourceType == "VAULTS"
        | where Category == "AuditEvent"
        | where
            (isnull(starttime) or TimeGenerated >= starttime)
            and (isnull(endtime) or TimeGenerated <= endtime)
        | where array_length(newvalue_has_any) == 0
        | where
            (array_length(srcipaddr_has_any_prefix) == 0 or has_any_ipv4_prefix(CallerIPAddress, srcipaddr_has_any_prefix))
            and (array_length(actorusername_has_any) == 0 or identity_claim_http_schemas_xmlsoap_org_ws_2005_05_identity_claims_upn_s has_any (actorusername_has_any))
            and (array_length(operation_has_any) == 0 or OperationName has_any (operation_has_any))
            and (array_length(object_has_any) == 0 or id_s has_any (object_has_any) or requestUri_s has_any (object_has_any))        
        | extend
            EventResult = case(
                httpStatusCode_d between (200 .. 299), "Success",
                httpStatusCode_d >= 400, "Failure",
                "NA"
            ),
            EventResultDetails = case(
                httpStatusCode_d == 200, "",
                httpStatusCode_d == 201, "Created",
                httpStatusCode_d == 202, "Accepted",
                httpStatusCode_d == 204, "No content",
                httpStatusCode_d == 400, "Bad request",
                httpStatusCode_d == 401, "Unauthorized",
                httpStatusCode_d == 403, "Unauthorized",
                httpStatusCode_d == 404, "Not found",
                httpStatusCode_d == 409, "Conflict",
                httpStatusCode_d == 429, "Throttled",
                httpStatusCode_d >= 500, "Internal error",
                ""
            ),
            EventOriginalResultDetails = strcat("HTTP status code: ", tostring(toint(httpStatusCode_d)), iff(ResultDescription != "", strcat(", ", ResultDescription), ""))
        | where (eventresult == "*" or EventResult =~ eventresult)
        | extend EventSeverity = iff(EventResult == "Failure", "Low", "Informational")
        | lookup KeyVaultOperationLookup on OperationName
        | extend EventType = iff(isempty(EventType), "Other", EventType)
        | lookup KeyVaultObjectTypeLookup on OperationName
        | extend ObjectType = iff(isempty(ObjectType), "Other", ObjectType)
        | extend
            ActorUsername = identity_claim_http_schemas_xmlsoap_org_ws_2005_05_identity_claims_upn_s,
            ActorUsernameType = iff(isnotempty(identity_claim_http_schemas_xmlsoap_org_ws_2005_05_identity_claims_upn_s), "UPN", ""),
            ActorUserId = identity_claim_http_schemas_microsoft_com_identity_claims_objectidentifier_g,
            ActorUserIdType = case(
                isnotempty(identity_claim_http_schemas_microsoft_com_identity_claims_objectidentifier_g), "AADID",
                isnotempty(identity_claim_appid_g), "AADID",
                ""
            )
        | extend Object = coalesce(id_s, requestUri_s, OperationName)
    };
    let ResourceSpecific = (disabled: bool = false, starttime: datetime=datetime(null), endtime: datetime=datetime(null), eventresult: string='*', operation_has_any: dynamic=dynamic([]), eventtype_in: dynamic=dynamic([]), srcipaddr_has_any_prefix: dynamic=dynamic([]), actorusername_has_any: dynamic=dynamic([]), object_has_any: dynamic=dynamic([]), newvalue_has_any: dynamic=dynamic([])){
        AZKVAuditLogs
        | where not(disabled)
            and (isnull(starttime) or TimeGenerated >= starttime)
            and (isnull(endtime) or TimeGenerated <= endtime) 
        | where
            (array_length(srcipaddr_has_any_prefix) == 0 or has_any_ipv4_prefix(CallerIpAddress, srcipaddr_has_any_prefix))
            and (array_length(operation_has_any) == 0 or OperationName has_any (operation_has_any))
            and (array_length(object_has_any) == 0 or Id has_any (object_has_any) or RequestUri has_any (object_has_any))            
        | extend
            EventResult = case(
                HttpStatusCode between (200 .. 299), "Success",
                HttpStatusCode >= 400, "Failure",
                "NA"
            ),
            EventResultDetails = case(
                HttpStatusCode == 200, "",
                HttpStatusCode == 201, "Created",
                HttpStatusCode == 202, "Accepted",
                HttpStatusCode == 204, "No content",
                HttpStatusCode == 400, "Bad request",
                HttpStatusCode == 401, "Unauthorized",
                HttpStatusCode == 403, "Unauthorized",
                HttpStatusCode == 404, "Not found",
                HttpStatusCode == 409, "Conflict",
                HttpStatusCode == 429, "Throttled",
                HttpStatusCode >= 500, "Internal error",
                ""
            ),
            EventOriginalResultDetails = strcat("HTTP status code: ", tostring(HttpStatusCode), iff(ResultDescription != "", strcat(", ", ResultDescription), ""))
        | where (eventresult == "*" or EventResult =~ eventresult)
        | extend EventSeverity = iff(EventResult == "Failure", "Low", "Informational")
        | lookup KeyVaultOperationLookup on OperationName
        | extend EventType = iff(isempty(EventType), "Other", EventType)
        | lookup KeyVaultObjectTypeLookup on OperationName
        | extend ObjectType = iff(isempty(ObjectType), "Other", ObjectType)
        | extend IdentityStringReplaced = replace_string(tostring(Identity), "http://schemas.microsoft.com/identity/claims/objectidentifier", "objectidentifier")
        | extend IdentityStringReplaced = replace_string(IdentityStringReplaced, "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/upn", "upn")
        | extend IdentityStringReplaced = replace_string(IdentityStringReplaced, "http://schemas.xmlsoap.org/ws/2005/05/identity/claims/name", "name")
        | extend Identity_claims = todynamic(IdentityStringReplaced).claim
        | extend
            ActorUsername = tostring(Identity_claims.upn),
            ActorUsernameType = iff(isnotempty(tostring(Identity_claims.upn)), "UPN", ""),
            ActorUserId = Identity_claims.objectidentifier,
            ActorUserIdType = case(
                isnotempty(tostring(Identity_claims.objectidentifier)), "AADID",
                isnotempty(tostring(Identity_claims.appid)), "AADID",
                ""
            )
        | where array_length(actorusername_has_any) == 0 or ActorUsername has_any (actorusername_has_any)
        | extend Object = coalesce(Id, RequestUri, OperationName)
    };
    let Combined = (disabled: bool = false, starttime: datetime=datetime(null), endtime: datetime=datetime(null), eventresult: string='*', operation_has_any: dynamic=dynamic([]), eventtype_in: dynamic=dynamic([]), srcipaddr_has_any_prefix: dynamic=dynamic([]), actorusername_has_any: dynamic=dynamic([]), object_has_any: dynamic=dynamic([]), newvalue_has_any: dynamic=dynamic([])) {
        union 
        AzDiagnostics(disabled), 
        ResourceSpecific(disabled)
        | extend
            EventCount = int(1),
            EventStartTime = TimeGenerated,
            EventEndTime = TimeGenerated,
            EventProduct = "Azure Key Vault",
            EventVendor = "Microsoft",
            EventSchemaVersion = "0.1.2",
            EventSchema = "AuditEvent",
            TargetAppName = "Azure Key Vault",
            TargetAppType = "CSP",
            Operation = OperationName
        | project-rename
            SrcIpAddr = CallerIPAddress,
            EventOriginalUid = CorrelationId,
            DvcId = _ResourceId
        | extend
            DvcIdType = iff(isnotempty(DvcId), "AzureResourceID", "")
        | extend
            IpAddr = SrcIpAddr,
            User = ActorUsername,
            Application = TargetAppName,
            Dst = TargetAppName,
            Src = SrcIpAddr,
            Dvc = EventProduct,
            EventUid = _ItemId
        | project
            TimeGenerated,
            Type,
            EventCount,
            EventStartTime,
            EventEndTime,
            EventType,
            EventResult,
            EventResultDetails,
            EventOriginalResultDetails,
            EventSeverity,
            EventProduct,
            EventVendor,
            EventSchema,
            EventSchemaVersion,
            EventOriginalUid,
            Operation,
            Object,
            ObjectType,
            ActorUsername,
            ActorUsernameType,
            ActorUserIdType,
            TargetAppName,
            TargetAppType,
            SrcIpAddr,
            DvcId,
            DvcIdType,
            IpAddr,
            User,
            Application,
            EventUid,
            Dst,
            Src,
            Dvc
    };
    Combined (
        disabled=disabled, 
        starttime=starttime, 
        endtime=endtime, 
        eventresult=eventresult, 
        operation_has_any=operation_has_any, 
        eventtype_in=eventtype_in, 
        srcipaddr_has_any_prefix=srcipaddr_has_any_prefix, 
        actorusername_has_any=actorusername_has_any, 
        object_has_any=object_has_any, 
        newvalue_has_any=newvalue_has_any)