Parser:
  Title: DNS activity ASIM filtering parser for Halcyon
  Version: '0.1.0'
  LastUpdated: Jun 09, 2026
Product:
  Name: Halcyon
Normalization:
  Schema: Dns
  Version: '0.1.7'
References:
- Title: ASIM DNS Schema
  Link: https://aka.ms/ASimDnsDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
- Title: Halcyon Documentation
  Link: https://www.halcyon.ai
Description: |
  This ASIM parser supports filtering and normalizing Halcyon DNS activity events to the ASIM DNS
  normalized schema. These events are generated by Halcyon's DNS-based threat detection and ingested
  into the HalcyonEventsV2_CL table in Microsoft Sentinel.

  Note: The HalcyonEventsV2_CL table must be configured on the Log Analytics workspace's Analytics plan to use this parser. The Basic Logs plan does not support invocation of user-defined functions, which is required for ASIM parser consumption.
Exceptions:
- Field: DvcFQDN
  Warning: Empty value in optional field
  Exception: DvcFQDN is derived when device.hostname is a fully-qualified domain name; when Halcyon emits a short hostname (no domain suffix), DvcFQDN is empty.
- Field: DvcDomain
  Warning: Empty value in recommended field
  Exception: DvcDomain is derived when device.hostname is a fully-qualified domain name; when Halcyon emits a short hostname (no domain suffix), DvcDomain is empty.
ParserName: vimDnsHalcyon
EquivalentBuiltInParser: _Im_Dns_Halcyon
ParserParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: srcipaddr
    Type: string
    Default: '*'
  - Name: domain_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: responsecodename
    Type: string
    Default: '*'
  - Name: response_has_ipv4
    Type: string
    Default: '*'
  - Name: response_has_any_prefix
    Type: dynamic
    Default: dynamic([])
  - Name: eventtype
    Type: string
    Default: 'Query'
  - Name: disabled
    Type: bool
    Default: false
ParserQuery: |
  let parser = (starttime:datetime=datetime(null), endtime:datetime=datetime(null), srcipaddr:string='*', domain_has_any:dynamic=dynamic([]), responsecodename:string='*', response_has_ipv4:string='*', response_has_any_prefix:dynamic=dynamic([]), eventtype:string='Query', disabled:bool=false) {
      // DNS query class name -> numeric class ID lookup (standard DNS CLASS values).
      let DnsClassLookup = datatable(DnsQueryClassName:string, DnsQueryClass:int)
      [
          "IN", 1, "CH", 3, "HS", 4, "NONE", 254, "ANY", 255
      ];
      HalcyonEventsV2_CL
      | where not(disabled)
          and class_uid == 4003                                    // OCSF DnsActivity (constant for class 4003)
          and (isnull(starttime) or coalesce(HalcyonSourceTime, TimeGenerated) >= starttime)
          and (isnull(endtime)   or coalesce(HalcyonSourceTime, TimeGenerated) <= endtime)
      // Halcyon DNS events are always queries (activity_id == 1). The ASIM Dns EventType enum is
      // Query|Status|Notify|Update|DNS Stateful Operations (no Response/Traffic), so all records normalize to "Query".
      | extend EventType = "Query"
      // eventtype filter compares against the computed EventType.
      // 'lookup' is a legacy DNS eventtype alias accepted as match-all for compatibility; the imDns union does not pass it by default.
      | where (eventtype == '*' or eventtype =~ 'lookup' or EventType =~ eventtype)
      // Pushdown filters on raw fields.
      // srcipaddr is not applicable - Halcyon DNS events carry hostname/uid only, no source IP.
      // Short-circuit: if a caller filters by source IP, return no rows rather than unfiltered data.
      | where srcipaddr == '*'
      | where (array_length(domain_has_any) == 0 or tostring(query.hostname) has_any (domain_has_any))
      // answers is a single-object dynamic array {rdata,type,class}; read answers[0].rdata (do not serialize the whole array).
      // response_has_any_prefix is matched per answer family: IPv4 (A) via has_any_ipv4_prefix, IPv6 (AAAA) via ipv6_is_in_any_range.
      // A mixed IPv4/IPv6 prefix list is safe: each record is only tested against the function for its own answer family.
      | where (array_length(response_has_any_prefix) == 0
          or (tostring(answers[0].type) == "A"    and has_any_ipv4_prefix(tostring(answers[0].rdata), response_has_any_prefix))
          or (tostring(answers[0].type) == "AAAA" and ipv6_is_in_any_range(tostring(answers[0].rdata), response_has_any_prefix)))
      | where (response_has_ipv4 == '*' or has_ipv4(tostring(answers[0].rdata), response_has_ipv4))
      | extend DnsQueryClassName = coalesce(tostring(query.['class']), "IN")           // OCSF query.class (constant "IN")
      | lookup kind=leftouter DnsClassLookup on DnsQueryClassName
      | extend
          DnsQuery            = tostring(query.hostname),                              // OCSF query.hostname
          DnsResponseCode     = toint(rcode_id),                                       // OCSF rcode_id (constant 0 = NoError; resolution succeeded)
          DnsResponseCodeName = coalesce(tostring(rcode), tostring(_ASIM_LookupDnsResponseCode(toint(rcode_id)))),  // Halcyon emits rcode "NoError"; datatable fallback on rcode_id
          DnsResponseName     = tostring(answers[0].rdata),
          SrcUsername         = tostring(actor.user.name),
          SrcUserId           = tostring(actor.user.uid),
          SrcProcessName      = tostring(actor.process.file.name),
          SrcProcessId        = tostring(actor.process.pid),
          SrcProcessCommandLine = tostring(actor.process.cmd_line),
          DvcHostname_raw     = tostring(device.hostname),
          DvcId               = tostring(device.uid),
          EventOriginalSeverity = tostring(severity)
      | where (responsecodename == '*' or DnsResponseCodeName =~ responsecodename)
      | invoke _ASIM_ResolveDvcFQDN('DvcHostname_raw')
      | extend
          EventSubType    = case(activity_id == 1, "Request", activity_id == 2, "Response", "Request"),
          // Security verdict drives EventResult/DvcAction, NOT rcode_id (always 0/NoError). Validated against Halcyon
          // security verdict mapping: Block (action_id 2) => Failure/Block, Report (action_id 1) => Success/Allow.
          EventResult     = case(action_id == 2, "Failure", action_id == 1, "Success", "NA"),
          DvcAction       = case(action_id == 2, "Block", action_id == 1, "Allow", ""),
          EventResultDetails = DnsResponseCodeName,
          EventSeverity   = case(
                                EventOriginalSeverity in~ ("Informational", "Info"), "Informational",
                                EventOriginalSeverity =~ "Low", "Low",
                                EventOriginalSeverity =~ "Medium", "Medium",
                                EventOriginalSeverity in~ ("High", "Critical", "Fatal"), "High",
                                EventOriginalSeverity =~ "Unknown", "Informational",
                                "Informational"),
          EventStartTime  = coalesce(HalcyonSourceTime, TimeGenerated),
          Domain          = DnsQuery,
          Dvc             = coalesce(DvcId, DvcHostname_raw),
          DvcIdType       = iff(isnotempty(DvcId), "Other", ""),
          SrcUsernameType = iff(isnotempty(SrcUsername), "Simple", ""),
          SrcUserIdType   = case(
                                isempty(SrcUserId), "",
                                SrcUserId startswith "S-1-", "SID",
                                "Other"),
          // src_endpoint.hostname == device.hostname in Halcyon events, so source-side host fields mirror the resolved device fields.
          SrcHostname     = DvcHostname,                                               // short hostname (ASIM Hostname type - no dots)
          SrcFQDN         = DvcFQDN,                                                    // FQDN when device.hostname is fully-qualified, else empty
          Src             = DvcHostname,                                               // Src alias for Hostname
          Hostname        = DvcHostname,                                               // required alias
          Process         = SrcProcessName,
          User            = SrcUsername,
          // All events in this class are security-flagged detections.
          ThreatCategory  = "Malicious DNS",                                           // reasonable default given source semantics; validate with customers
          ThreatOriginalRiskLevel = tostring(severity)
      | extend
          EventEndTime    = EventStartTime,
          EventCount      = int(1),
          EventUid        = HalcyonEventId,
          EventOriginalUid = HalcyonEventId,
          EventMessage    = tostring(message),
          EventOriginalType = tostring(type_name),
          EventOriginalSubType = tostring(activity_name),
          EventProduct    = "Halcyon",
          EventVendor     = "Halcyon",
          EventSchema     = "Dns",
          EventSchemaVersion = "0.1.7",
          AdditionalFields = bag_pack(
                                "halcyon_dxp_rule",  tostring(unmapped.halcyon_dxp_rule),
                                "halcyon_alert_id",  tostring(unmapped.halcyon_alert_id),
                                "halcyon_tenant_id", tostring(unmapped.halcyon_tenant_id)
                            )
      // Project only ASIM Dns/Common output columns (avoids project-away so new source columns don't leak into output).
      | project
          TimeGenerated,
          Type,
          EventType,
          DnsQueryClassName,
          DnsQueryClass,
          DnsQuery,
          DnsResponseCode,
          DnsResponseCodeName,
          DnsResponseName,
          SrcUsername,
          SrcUserId,
          SrcProcessName,
          SrcProcessId,
          DvcId,
          EventOriginalSeverity,
          DvcHostname,
          DvcFQDN,
          DvcDomain,
          DvcDomainType,
          EventSubType,
          EventResult,
          DvcAction,
          EventResultDetails,
          EventSeverity,
          EventStartTime,
          Domain,
          Dvc,
          DvcIdType,
          SrcUsernameType,
          SrcUserIdType,
          SrcHostname,
          SrcFQDN,
          Src,
          Hostname,
          Process,
          User,
          ThreatCategory,
          ThreatOriginalRiskLevel,
          EventEndTime,
          EventCount,
          EventUid,
          EventOriginalUid,
          EventMessage,
          EventOriginalType,
          EventOriginalSubType,
          EventProduct,
          EventVendor,
          EventSchema,
          EventSchemaVersion,
          AdditionalFields
  };
  parser(starttime=starttime, endtime=endtime, srcipaddr=srcipaddr, domain_has_any=domain_has_any, responsecodename=responsecodename, response_has_ipv4=response_has_ipv4, response_has_any_prefix=response_has_any_prefix, eventtype=eventtype, disabled=disabled)
