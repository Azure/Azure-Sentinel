Parser:
  Title: Agent Event ASIM parser
  Version: "0.1.0"
  LastUpdated: Apr 16, 2026
Product:
  Name: Source agnostic
Normalization:
  Schema: AgentEvent
  Version: '0.1.0'
References:
- Title: ASIM Agent Event Schema
  Link: https://aka.ms/ASimAgentEventDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
Description: |
  This ASIM parser supports normalizing Agent Event logs from all supported sources to the ASIM Agent Event normalized schema.
ParserName: ASimAgentEvent
EquivalentBuiltInParser: _ASim_AgentEvent
Parsers:
  - _Im_AgentEvent_Empty
ParserParams:
  - Name: pack
    Type: bool
    Default: false
ParserQuery: |
  let DisabledParsers=materialize(_GetWatchlist('ASimDisabledParsers') | where SearchKey in ('Any', 'ExcludeASimAgentEvent') | extend SourceSpecificParser=column_ifexists('SourceSpecificParser','') | distinct SourceSpecificParser| where isnotempty(SourceSpecificParser));
  let ASimBuiltInDisabled=toscalar('ExcludeASimAgentEvent' in (DisabledParsers) or 'Any' in (DisabledParsers)); 
  let parser=(pack:bool=false){
  union isfuzzy=true
    vimAgentEventEmpty
  }; 
  parser (pack=pack)