Parser:
  Title: Agent Event ASIM filtering parser
  Version: '0.1.0'
  LastUpdated: Apr 16, 2026
Product:
  Name: Source agnostic
Normalization:
  Schema: AgentEvent
  Version: '0.1.0'
References:
- Title: ASIM Agent Event Schema
  Link: https://aka.ms/ASimAgentEventDoc
- Title: ASIM
  Link: https://aka.ms/AboutASIM
Description: |
    This ASIM parser supports filtering and normalizing Agent Event logs from all supported sources to the ASIM 'AgentEvent' normalized schema.
ParserName: imAgentEvent
EquivalentBuiltInParser: _Im_AgentEvent
Parsers:
  - _Im_AgentEvent_Empty
ParserParams:
  - Name: starttime
    Type: datetime
    Default: datetime(null)
  - Name: endtime
    Type: datetime
    Default: datetime(null)
  - Name: agentid_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: agentname_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: username_has_any
    Type: dynamic
    Default: dynamic([])
  - Name: pack
    Type: bool
    Default: false
ParserQuery: |
  let DisabledParsers=materialize(_GetWatchlist('ASimDisabledParsers') | where SearchKey in ('Any', 'ExcludeimAgentEvent') | extend SourceSpecificParser=column_ifexists('SourceSpecificParser','') | distinct SourceSpecificParser | where isnotempty(SourceSpecificParser));
  let vimBuiltInDisabled=toscalar('ExcludevimAgentEvent' in (DisabledParsers) or 'Any' in (DisabledParsers)); 
  let parser=(
    starttime: datetime=datetime(null), 
    endtime: datetime=datetime(null), 
    agentid_has_any: dynamic=dynamic([]),
    agentname_has_any: dynamic=dynamic([]),
    username_has_any: dynamic=dynamic([]),
    pack:bool=false)
  {
  union isfuzzy=true
    vimAgentEventEmpty
  };
  parser (starttime=starttime, endtime=endtime, agentid_has_any=agentid_has_any, agentname_has_any=agentname_has_any, username_has_any=username_has_any, pack=pack)